<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="theme-color" content="#140b22">
  <title>Calendar Game</title>
  <meta name="application-name" content="Calendar Game">
  <meta name="apple-mobile-web-app-title" content="Calendar Game">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{--bg1:#0b0714;--bg2:#140b22}
    body{background:linear-gradient(180deg,var(--bg1),var(--bg2))}
    .card{background:rgba(26,15,43,.85);border:1px solid rgba(120,53,175,.45)}
    .panel{background:rgba(88,28,135,.25);border:1px solid rgba(120,53,175,.45)}
    .thin{border:1px solid rgba(120,53,175,.35)}
    .surface-button{background:rgba(88,28,135,.32);border-color:rgba(120,53,175,.52);transition:background-color .2s ease-in-out,border-color .2s ease-in-out}
    .surface-button:hover{background:rgba(88,28,135,.48)}
    .surface-toggle{background:rgba(88,28,135,.24);transition:background-color .2s ease-in-out}
    .surface-toggle:hover{background:rgba(88,28,135,.4)}
    .btn-solid{background:#7c3aed;color:#fff;transition:background-color .2s ease-in-out,box-shadow .2s ease-in-out}
    .btn-solid:hover{background:#6d28d9}
    .btn-solid:focus-visible{outline:2px solid rgba(196,181,253,.55);outline-offset:2px}
    .btn-solid[aria-disabled="true"],.btn-solid:disabled{opacity:.6;cursor:not-allowed}
    button,input,select{-webkit-tap-highlight-color:transparent}
    button{touch-action:manipulation}
    @keyframes flashPulse{0%{background:var(--bg0)}
      80%{background:var(--bg0)}
      100%{background:transparent}}
    .flash-good{--bg0:rgba(16,185,129,.55);animation:flashPulse .45s ease-in-out}
    .flash-bad{--bg0:rgba(239,68,68,.55);animation:flashPulse .45s ease-in-out}
    .chip{background:rgba(120,53,175,.25);border:1px solid rgba(120,53,175,.45);padding:.25rem .5rem;border-radius:.75rem;font-size:12px}
    .bar{height:6px;border-radius:6px;overflow:hidden;background:rgba(120,53,175,.25);border:1px solid rgba(120,53,175,.45)}
    .bar>span{display:block;height:100%;background:linear-gradient(90deg,#a855f7,#7c3aed)}
    .expander{transition:max-height .25s ease-in-out;overflow:hidden;will-change:max-height}
  </style>
</head>
<body class="text-purple-50">
  <div id="root" class="min-h-screen w-full">Loading…</div>
  <pre id="errors" style="display:none;white-space:pre-wrap;background:#2b0f3a;border:1px solid #7e22ce;color:#fca5a5;padding:.75rem;border-radius:.75rem;margin:1rem;max-width:64rem"></pre>

  <script>
    const __errBox = () => document.getElementById('errors');
    const __hideErr = () => { const x=__errBox(); if(x){ x.style.display='none'; x.textContent=''; } };
    addEventListener('error', e=>{
      const x=__errBox(); if(!x) return;
      x.style.display='block';
      const loc = e.filename? `\n at ${e.filename}:${e.lineno}:${e.colno}` : '';
      x.textContent = `⚠️ ${e.message||String(e)}${loc}\n${e.error?.stack||''}`;
    });
    addEventListener('unhandledrejection', e=>{
      const x=__errBox(); if(!x) return;
      x.style.display='block';
      const msg = e.reason?.message || String(e.reason);
      x.textContent = `⚠️ Promise rejection: ${msg}\n${e.reason?.stack||''}`;
    });
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="env,react">
    const {useEffect,useMemo,useRef,useState,useId,useCallback} = React;

    /* ---------- Calendar helpers ---------- */
    const MONTH=["January","February","March","April","May","June","July","August","September","October","November","December"];
    const MONTH_ABBR=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const DAY=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const DOOMSDAY_MONTH={common:[4,0,0,3,5,1,3,6,2,4,0,2],leap:[3,6,0,3,5,1,3,6,2,4,0,2]};

    /* ---------- Manual method helpers ---------- */
    const METHOD_MONTH_CODES={1:6,2:2,3:2,4:5,5:0,6:3,7:5,8:1,9:4,10:6,11:2,12:4};
    const METHOD_AB_BEGINNER_MAP=new Map([[0,0],[1,-2],[2,3],[3,1]]);
    const METHOD_AB_ADVANCED_MAP={
      even:new Map([[0,0],[1,-2],[2,3],[3,1],[4,0],[5,-2],[6,3],[7,1],[8,0],[9,-2]]),
      odd:new Map([[0,3],[1,1],[2,0],[3,-2],[4,3],[5,1],[6,0],[7,-2],[8,3],[9,1]])
    };
    const METHOD_CD_BEGINNER_ORDER=[0,12,24,36,48,60,72,84,96];
    const METHOD_CD_BEGINNER_MAP=new Map([[0,0],[12,1],[24,2],[36,3],[48,4],[60,-2],[72,-1],[84,0],[96,1]]);
    const METHOD_CD_ADVANCED_LEAP_ORDER=[0,4,8,12,16,20,24,28,32,36,40,44,48,52,56,60,64,68,72,76,80,84,88,92,96];
    const METHOD_CD_ADVANCED_LEAP_MAP=new Map([
      [0,0],[4,-2],[8,3],[12,1],[16,-1],[20,4],[24,2],[28,0],[32,-2],[36,3],[40,1],[44,-1],[48,4],[52,2],[56,0],[60,-2],[64,3],[68,1],[72,-1],[76,4],[80,2],[84,0],[88,-2],[92,3],[96,1]
    ]);
    const METHOD_CD_ADVANCED_ZERO_YEARS=new Set([0,6,17,23,28,34,45,51,56,62,73,79,84,90]);
    const YEAR_OPTION_DEFAULT=9;
    const DAY_OPTION_COUNT=7;
    const MONTH_OPTION_COUNT=7;
    const toAstro = y => y>0?y:1-Math.abs(y);
    const isLeap = y => { y=toAstro(y); return y%400===0 || (y%4===0 && y%100!==0); };
    const dim = (y,m)=> m===2 ? (isLeap(y)?29:28) : [4,6,9,11].includes(m)?30:31;
    function jdnGregorian(y,m,d){ const a=Math.floor((14-m)/12),y2=y+4800-a,m2=m-3+12*a; return d+Math.floor((153*m2+2)/5)+365*y2+Math.floor(y2/4)-Math.floor(y2/100)+Math.floor(y2/400)-32045; }
    const wday=(y,m,d)=> ((jdnGregorian(toAstro(y),m,d)+1)%7+7)%7;
    const fmtYear = y => y>0?String(y):`${Math.abs(y)} BC`;
    const fmt=(y,m,d)=> `${MONTH[m-1]} ${d}, ${fmtYear(y)}`;
    const rint=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
    function randomDate(minY,maxY){ for(;;){ let y=rint(minY,maxY); if(y===0) continue; let m=rint(1,12), d=rint(1,dim(y,m)); if(d<=dim(y,m)) return {y,m,d}; } }
    const blankDedTypeStore = ()=>({year:null,month:null,day:null});

    const normalizeMod = value => ((value%7)+7)%7;
    const canonicalizeMod = value => {
      const mod=normalizeMod(value);
      return mod>3?mod-7:mod;
    };

    function yearParts(y){
      const fourDigit=((y%10000)+10000)%10000;
      const a=Math.floor(fourDigit/1000);
      const ab=Math.floor(fourDigit/100);
      const b=Math.floor((fourDigit%1000)/100);
      const cd=fourDigit%100;
      const bcd=fourDigit%1000;
      const abcd=fourDigit;
      return {a,ab,b,cd,bcd,abcd};
    }

    function formatSigned(value){
      return value<0?`-${Math.abs(value)}`:`${value}`;
    }

    function formatAddition(prev,add,{applySpeedTips=true,canonicalize=true,zeroText}={}){
      let display=add;
      if(canonicalize){
        display=canonicalizeMod(display);
      }
      if(applySpeedTips){
        if(display===3 && prev>=4) display=-4;
        if(display===-3 && prev<=2) display=4;
      }
      const after=((prev+display)%7+7)%7;
      let expression;
      if(display===0){
        expression=zeroText ?? `${prev} + 0 = ${after}`;
      }else{
        const symbol=display<0?'-':'+';
        expression=`${prev} ${symbol} ${Math.abs(display)} = ${after}`;
      }
      return {after,display,expression};
    }

    const italic = value => <span className="italic">{value}</span>;

    function getBeginnerCdInfo(cd){
      let base=METHOD_CD_BEGINNER_ORDER[0];
      let exact=false;
      for(const year of METHOD_CD_BEGINNER_ORDER){
        if(year>cd) break;
        base=year;
        if(year===cd){
          exact=true;
          break;
        }
      }
      const code=METHOD_CD_BEGINNER_MAP.get(base);
      return {base,code,exact};
    }

    function getAdvancedCdInfo(cd){
      if(METHOD_CD_ADVANCED_ZERO_YEARS.has(cd)){
        return {base:cd,code:0,exact:true,isZeroYear:true};
      }
      let base=METHOD_CD_ADVANCED_LEAP_ORDER[0];
      let exact=false;
      for(const year of METHOD_CD_ADVANCED_LEAP_ORDER){
        if(year>cd) break;
        base=year;
        if(year===cd){
          exact=true;
          break;
        }
      }
      const code=METHOD_CD_ADVANCED_LEAP_MAP.get(base);
      return {base,code,exact,isZeroYear:false};
    }

    function computeMethodBreakdown({y,m,d},mode="beginner"){ // returns narrative text + summary
      if(!Number.isFinite(y) || y<=0) return {supported:false,error:"The written method covers AD dates only."};
      const monthCode = METHOD_MONTH_CODES[m] ?? null;
      if(monthCode==null) return {supported:false,error:"Invalid month for the method."};
      const parts=yearParts(y);
      const lines=[];
      const pushLine=node=>lines.push(node);
      let stepNumber=1;
      const pushStep=node=>{
        pushLine(
          <>
            <span className="font-semibold text-purple-100/95">Step {stepNumber}:</span> {node}
          </>
        );
        stepNumber+=1;
      };
      let running=normalizeMod(monthCode);
      pushStep(<>{MONTH[m-1]} month code: {monthCode}.</>);

      const dayMod=normalizeMod(d);
      const dayDisplay=dayMod>3?dayMod-7:dayMod;
      const dayOp=formatAddition(running,dayDisplay);
      pushStep(<>{d} mod 7 = {dayDisplay}: {dayOp.expression}.</>);
      running=dayOp.after;

      const abMod4=normalizeMod(parts.ab);
      let abCodeValue;
      if(mode==="beginner"){
        abCodeValue=METHOD_AB_BEGINNER_MAP.get(abMod4)??0;
        const abOp=formatAddition(running,abCodeValue);
        if(parts.a%2===0){
          pushStep(<>{italic('a')} is even: {parts.b} mod 4 = {abMod4}, which has {italic('ab')} code {formatSigned(canonicalizeMod(abCodeValue))}: {abOp.expression}.</>);
        }else{
          const adjustSign=parts.b<=1?'+':'-';
          pushStep(<>{italic('a')} is odd: ({parts.b} {adjustSign} 2) mod 4 = {abMod4}, which has {italic('ab')} code {formatSigned(canonicalizeMod(abCodeValue))}: {abOp.expression}.</>);
        }
        running=abOp.after;
      }else{
        const parity=parts.a%2===0?"even":"odd";
        const map=parts.a%2===0?METHOD_AB_ADVANCED_MAP.even:METHOD_AB_ADVANCED_MAP.odd;
        abCodeValue=map.get(parts.b)??0;
        const abOp=formatAddition(running,abCodeValue);
        pushStep(<>{italic('a')} is {parity} and {italic('b')} = {parts.b} has {italic('ab')} code {formatSigned(canonicalizeMod(abCodeValue))}: {abOp.expression}.</>);
        running=abOp.after;
      }

      const cd=parts.cd;
      const cdString=cd.toString().padStart(2,'0');
      const addCdLines=(baseLabel,codeValue)=>{
        const codeDisplay=formatSigned(canonicalizeMod(codeValue));
        if(codeValue===0){
          pushLine(<>{baseLabel} has {italic('cd')} code 0: total remains unchanged.</>);
          return;
        }
        const cdOp=formatAddition(running,codeValue);
        pushLine(<>{baseLabel} has {italic('cd')} code {codeDisplay}: {cdOp.expression}.</>);
        running=cdOp.after;
      };

      let cdBase;
      let cdCode;
      let diffBase;
      if(mode==="beginner"){ 
        const info=getBeginnerCdInfo(cd);
        cdBase=info.base;
        cdCode=info.code;
        if(info.exact){
          pushStep(<>{cdString} is a beginner {italic('cd')} year.</>);
          addCdLines(cdString,cdCode);
        }else{
          const baseString=info.base.toString().padStart(2,'0');
          pushStep(<>{cdString} is not a beginner {italic('cd')} year.</>);
          pushLine(<>{baseString} is the closest beginner year less than {cdString}.</>);
          addCdLines(baseString,cdCode);
        }
        diffBase=info.base;
      }else{
        const info=getAdvancedCdInfo(cd);
        cdBase=info.base;
        cdCode=info.code;
        if(info.isZeroYear){
          pushStep(<>{cdString} is a 0 year, so leave your total unchanged.</>);
        }else if(info.exact){
          const cdOp=formatAddition(running,cdCode);
          pushStep(<>{cdString} has {italic('cd')} code {formatSigned(canonicalizeMod(cdCode))}: {cdOp.expression}.</>);
          running=cdOp.after;
        }else{
          const baseString=info.base.toString().padStart(2,'0');
          pushStep(<>{cdString} is not an advanced {italic('cd')} year.</>);
          pushLine(<>{baseString} is the closest leap year less than {cdString}.</>);
          addCdLines(baseString,cdCode);
        }
        diffBase=info.base;
      }

      const diff=cd-diffBase;
      if(mode==="beginner"){
        if(diff===0){
          pushStep(<>The beginner {italic('cd')} year matches the given {italic('cd')} year, so skip this step.</>);
        }else{
          const baseString=diffBase.toString().padStart(2,'0');
          pushStep(<>{cdString} - {baseString} = {diff}.</>);
          const diffMod=normalizeMod(diff);
          if(diffMod===0){
            pushLine(<>{diff} mod 7 = 0: total remains unchanged.</>);
          }else{
            const diffOp=formatAddition(running,diffMod);
            pushLine(<>{diff} mod 7 = {diffMod}: {diffOp.expression}.</>);
            running=diffOp.after;
          }
          const quotient=Math.floor(diff/4);
          if(quotient===0){
            pushLine(<>⌊{diff} / 4⌋ = 0: total remains unchanged.</>);
          }else{
            const qOp=formatAddition(running,quotient);
            pushLine(<>⌊{diff} / 4⌋ = {quotient}: {qOp.expression}.</>);
            running=qOp.after;
          }
        }
      }else{
        const info=getAdvancedCdInfo(cd);
        if(info.isZeroYear){
          pushStep(<>{cdString} is a 0 year, so skip this step.</>);
        }else if(diff===0){
          pushStep(<>{cdString} is an advanced year, so skip this step.</>);
        }else{
          const baseString=diffBase.toString().padStart(2,'0');
          const diffOp=formatAddition(running,diff);
          pushStep(<>{cdString} - {baseString} = {diff}: {diffOp.expression}.</>);
          running=diffOp.after;
        }
      }

      const cdValue=parts.cd;
      const bcdValue=parts.bcd;
      const abcdValue=parts.abcd;
      const cdMod4=cdValue%4;
      const bcdMod100=bcdValue%100;
      const abcdMod400=abcdValue%400;
      const isLeapYear=(cdMod4===0) && (bcdMod100!==0 || abcdMod400===0);
      const monthNeedsAdjust=m===1||m===2;
      if(cdMod4!==0){
        pushStep(<>{cdValue} mod 4 ≠ 0, so it is not a leap year, so skip this step.</>);
      }else if(bcdMod100===0 && abcdMod400!==0){
        pushStep(<>{cdValue} mod 4 = 0, but {bcdValue} mod 100 = 0 and {abcdValue} mod 400 ≠ 0, so it is not a leap year, so skip this step.</>);
      }else if(!monthNeedsAdjust){
        if(abcdMod400===0 && cdValue===0){
          pushStep(<>{cdValue} mod 4 = 0 and {abcdValue} mod 400 = 0, but the date is after February, so skip this step.</>);
        }else{
          pushStep(<>{cdValue} mod 4 = 0 and {cdValue} ≠ 0, but the date is after February, so skip this step.</>);
        }
      }else{
        const leapOp=formatAddition(running,-1,{applySpeedTips:false,canonicalize:false});
        if(abcdMod400===0 && cdValue===0){
          pushStep(<>{cdValue} mod 4 = 0 and {abcdValue} mod 400 = 0, so it is a leap year. Subtract 1: {leapOp.expression}.</>);
        }else{
          pushStep(<>{cdValue} mod 4 = 0 and {cdValue} ≠ 0, so it is a leap year. Subtract 1: {leapOp.expression}.</>);
        }
        running=leapOp.after;
      }

      pushLine(<>Therefore the final answer is {running} = {DAY[running]}.</>);

      return {
        supported:true,
        lines,
        total:running,
        weekday:DAY[running],
        monthCode,
        dayCode:dayMod,
        abCodeDisplay:formatSigned(canonicalizeMod(abCodeValue??0)),
        cdCodeDisplay:formatSigned(canonicalizeMod(cdCode??0)),
        leapYear:isLeapYear,
        cdValue:cd
      };
    }

    function buildMethodBreakdowns(date){
      const beginner=computeMethodBreakdown(date,"beginner");
      const advanced=computeMethodBreakdown(date,"advanced");
      return {beginner,advanced};
    }

    const isTouch=typeof window!=="undefined" && ("ontouchstart" in window || navigator.maxTouchPoints>0 || matchMedia("(pointer:coarse)").matches);
    const isTimer = m => m==="blitz"||m==="sudden"||m==="flash";
    const formatSecondsLabel = (seconds)=>{
      if(!Number.isFinite(seconds)) return "0s";
      const value=Math.max(0,seconds);
      if(value<=0.05) return "0s";
      return `${value.toFixed(1)}s`;
    };
    const blockMinusKey = (event)=>{
      if(event.key==="-" || event.key==="Subtract" || event.key==="Minus"){
        event.preventDefault();
      }
    };
    const blockMinusBeforeInput = (event)=>{
      if(event.data && event.data.includes("-")){
        event.preventDefault();
      }
    };

    /* ---------- atoms ---------- */
    const Stat=({label,value,disabled,onClick,pressed})=>{
      const interactive=typeof onClick==='function';
      const Tag=interactive?'button':'div';
      const props=interactive?{type:'button',onClick,'aria-pressed':typeof pressed==='boolean'?pressed:undefined,'aria-disabled':disabled||undefined}:{};
      const baseClass="px-2.5 py-1.5 rounded-xl panel text-center text-xs sm:text-sm flex flex-col items-center h-full";
      const interactiveClass=interactive?" cursor-pointer focus:outline-none focus:ring-2 focus:ring-purple-400/50 hover:bg-purple-900/40 transition-colors":"";
      return (
        <Tag {...props} className={`${baseClass}${disabled?' opacity-60':''}${interactiveClass}`}>
          <div className="text-[11px] sm:text-[12px] text-purple-200/80 text-center leading-tight flex items-center justify-center min-h-[1.65rem] sm:min-h-[1.85rem]">
            <span>{label}</span>
          </div>
          <div className="mt-auto pt-0.5 text-base sm:text-lg font-semibold tabular-nums">{disabled?'—':value}</div>
        </Tag>
      );
    };
    const StatTwo=({label,left,right,disabled,onClick,pressed})=>{
      const interactive=typeof onClick==='function';
      const Tag=interactive?'button':'div';
      const props=interactive?{type:'button',onClick,'aria-pressed':typeof pressed==='boolean'?pressed:undefined,'aria-disabled':disabled||undefined}:{};
      const baseClass="px-2.5 py-1.5 rounded-xl panel text-center text-xs sm:text-sm flex flex-col items-center h-full";
      const interactiveClass=interactive?" cursor-pointer focus:outline-none focus:ring-2 focus:ring-purple-400/50 hover:bg-purple-900/40 transition-colors":"";
      return (
        <Tag {...props} className={`${baseClass}${disabled?' opacity-60':''}${interactiveClass}`}>
          <div className="text-[11px] sm:text-[12px] text-purple-200/80 text-center leading-tight flex items-center justify-center min-h-[1.65rem] sm:min-h-[1.85rem]">
            <span>{label}</span>
          </div>
          <div className="mt-auto pt-0.5 text-base sm:text-lg font-semibold tabular-nums">{disabled?'—':`${left}/${right}`}</div>
        </Tag>
      );
    };

    /* ======================= App ======================= */
    function App(){
      const [mode,setMode]=useState("classic");
      const modeSelectRef=useRef(null);

      /* era + independent ranges (AD / BC / BOTH) */
      const [era,setEra]=useState('AD');                   // 'AD' | 'BOTH' | 'BC'
      const [adRange,setAdRange]=useState({min:1,max:10000});
      const [bcRange,setBcRange]=useState({min:-10000,max:-1});
      const [bothRange,setBothRange]=useState({min:-10000,max:10000});
      const [minY,setMinY]=useState(1), [maxY,setMaxY]=useState(10000);
      const [minInput,setMinInput]=useState('1');
      const [maxInput,setMaxInput]=useState('10000');
      const minInputId=useId();
      const maxInputId=useId();
      const minInputRef=useRef(null);
      const maxInputRef=useRef(null);

      const [date,setDate]=useState(()=>randomDate(1,10000));
      const [stack,setStack]=useState([]), [dedStack,setDedStack]=useState([]);

      const correct=useMemo(()=>wday(date.y,date.m,date.d),[date]);
      const [guesses,setGuesses]=useState([]);                 // wrong guesses (chips)
      const [msg,setMsg]=useState("");                         // Answer: ...
      const [locked,setLocked]=useState(false);                // lock options after reveal
      const [revealed,setRevealed]=useState(false);            // did reveal on this date?
      const [countedWrong,setCountedWrong]=useState(false);    // has wrong been counted?
      const [calcOpen,setCalcOpen]=useState(false);            // is the calculation panel open?
      const [calcPenaltyActive,setCalcPenaltyActive]=useState(false);
      const calcOpenStatesRef=useRef(new Map());
      const calcPenaltyStatesRef=useRef(new Map());
      const calcScrollRafRef=useRef(null);
      const calcScrollTimeoutRef=useRef(null);
      const rangeRefreshPendingRef=useRef(false);

      /* snapshots when avg-time disabled (per era) */
      const [savedClassicByEra,setSavedClassicByEra]=useState({AD:null,BC:null,BOTH:null});
      const [savedDedByEra,setSavedDedByEra]=useState({AD:null,BC:null,BOTH:null}); /* NEW */
      const [savedDedByType,setSavedDedByType]=useState(()=>blankDedTypeStore());

      /* per-mode stats */
      const blankStats=()=>({played:0,good:0,streak:0,best:0,timeSum:0,timeCnt:0});
      const blankStatsByEra=()=>({AD:blankStats(), BC:blankStats(), BOTH:blankStats()});
      const [statsByMode,setStatsByMode]=useState({classic:blankStatsByEra(), blitz:blankStatsByEra(), sudden:blankStatsByEra(), flash:blankStatsByEra(), deduction:blankStatsByEra()});
      const [blitzRoundStats,setBlitzRoundStats]=useState(()=>blankStats());
      const S = (statsByMode[mode]?.[era]) || blankStats();

      const [statsOff,setStatsOff]=useState(false);
      const [avgTrackingByMode,setAvgTrackingByMode]=useState({
        classic:false,
        deduction:false,
        blitz:true,
        sudden:true,
        flash:true
      });
      const trackClassic = avgTrackingByMode.classic;
      const trackDed = avgTrackingByMode.deduction;
      const trackBlitz = avgTrackingByMode.blitz;
      const trackSudden = avgTrackingByMode.sudden;
      const trackFlash = avgTrackingByMode.flash;
      const getTrackState = (modeKey)=>{
        switch(modeKey){
          case 'classic': return trackClassic;

          case 'blitz': return trackBlitz;
          case 'sudden': return trackSudden;

      const setAvgTracking = (modeKey,value)=>{
        setAvgTrackingByMode(prev=>{

      };
      const setTrackClassic = value=>setAvgTracking('classic',value);
      const setTrackDed = value=>setAvgTracking('deduction',value);
      const setTrackBlitz = value=>setAvgTracking('blitz',value);
      const setTrackSudden = value=>setAvgTracking('sudden',value);
      const setTrackFlash = value=>setAvgTracking('flash',value);
      const setTrackForMode = (modeKey,value)=>{
        switch(modeKey){
          case 'classic':
            setTrackClassic(value);
            break;
          case 'deduction':
            setTrackDed(value);
            break;
          case 'blitz':
            setTrackBlitz(value);
            break;
          case 'sudden':
            setTrackSudden(value);
            break;
          case 'flash':
            setTrackFlash(value);
            break;
          default:
            break;
        }
      };

      const tStartRef=useRef(null);
      const [flash,setFlash]=useState(null);

      /* timers */
      const [blitzSec,setBlitzSec]=useState(60), [blitzRemain,setBlitzRemain]=useState(60), [blitzRunning,setBlitzRunning]=useState(false);
      const blitzStartRef=useRef(null), blitzPausedAtRef=useRef(null), blitzPausedAccRef=useRef(0);
      const [qSec,setQSec]=useState(7), [qRemain,setQRemain]=useState(7);
      const qDeadlineRef=useRef(null), qPausedAtRef=useRef(null), qPausedAccRef=useRef(0);
      const [active,setActive]=useState(false);
      const [showTimerDate,setShowTimerDate]=useState(false);

      /* flash mode */
      const [flashMs,setFlashMs]=useState(1200);
      const [phase,setPhase]=useState('dash'); // 'dash' | 'show' | 'hide'
      const flashTimerRef=useRef(null);
      const [flashRemainMs,setFlashRemainMs]=useState(1200);
      const flashDeadlineRef=useRef(null);
      const endFlashPhase = useCallback(()=>{
        setPhase('hide');
        flashDeadlineRef.current=null;
        setFlashRemainMs(0);
        flashTimerRef.current=null;
      },[]);

      /* deduction */
      const [dedType,setDedType]=useState("day");
      const [ded,setDed]=useState(null);
      const [dedFlash,setDedFlash]=useState(null);
      const [lookupHistory,setLookupHistory]=useState([]);
      const [lookupInput,setLookupInput]=useState("");
      const [lookupOutput,setLookupOutput]=useState("");
      const [lookupCalcDate,setLookupCalcDate]=useState(null);
      const [lookupSelectedHistoryId,setLookupSelectedHistoryId]=useState(null);
      const [lookupCalcOpen,setLookupCalcOpen]=useState(false);
      const prevLookupCalcKeyRef=useRef('none');

      useEffect(()=>{
        const prevKey=prevLookupCalcKeyRef.current;
        const nextKey=lookupCalcDate?`${lookupCalcDate.y}-${lookupCalcDate.m}-${lookupCalcDate.d}`:'none';
        if(prevKey!==nextKey){
          if(prevKey!=='none' && prevKey!==nextKey){
            setLookupCalcOpen(false);
          }
          prevLookupCalcKeyRef.current=nextKey;
        }
      },[lookupCalcDate]);

      const pendingDedSwitchRef=useRef(null);
      const prevModeRef=useRef(mode);

      const inputRef=useRef(null), [input,setInput]=useState("");
      useEffect(()=>{
        if(!isTouch){
          inputRef.current?.focus();
        }else{
          const active=document.activeElement;
          if(active && active!==modeSelectRef.current && active.tagName==='INPUT'){
            active.blur();
          }
        }
      },[date,mode,active]);

      useEffect(()=>{
        setShowTimerDate(false);
      },[mode]);

      /* helpers */
      const updateStats = (mutator)=>{
        setStatsByMode(prev=>{
          const modeStats = {...(prev[mode]||blankStatsByEra())};
          const eraStats = {...(modeStats[era]||blankStats())};
          mutator(eraStats);
          return {...prev, [mode]:{...modeStats, [era]:eraStats}};
        });
      };
      const resetStatsCurrent=()=>{
        setStatsByMode(prev=>{
          const modeStats = {...(prev[mode]||blankStatsByEra())};
          return {...prev, [mode]:{...modeStats, [era]:blankStats()}};
        });
      };
      const setCalcPenalty=(value)=>{ setCalcPenaltyActive(value); calcPenaltyStatesRef.current.set(mode,value); };

      /* avg-time toggle side effects */
      const prevTrackClassic=useRef(trackClassic);
      useEffect(()=>{
        if(!prevTrackClassic.current && trackClassic){
          tStartRef.current=performance.now();
        }
        prevTrackClassic.current=trackClassic;
      },[trackClassic]);
      const prevTrackDed=useRef(trackDed);
      useEffect(()=>{
        if(!prevTrackDed.current && trackDed){
          tStartRef.current=performance.now();
          setSavedDedByType(blankDedTypeStore());
        }else if(prevTrackDed.current && !trackDed){
          const snapshot = ded ? ({
            ded,
            guesses:[...guesses],
            countedWrong,
            msg,
            locked,
            revealed,
            calcPenaltyActive
          }) : null;
          setSavedDedByType(prev=>{
            const base={...blankDedTypeStore(), ...prev};
            base[dedType]=snapshot;
