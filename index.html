                  </ol>
                  <p>Therefore the final answer is 3 = Wednesday.</p>
                  <p className="font-semibold text-purple-100/90">Advanced:</p>
                  <ol className="space-y-1 list-none">
                    <li><span className="font-semibold text-purple-100/95">Step 1:</span> February month code: 2.</li>
                    <li><span className="font-semibold text-purple-100/95">Step 2:</span> 26 mod 7 = -2: 2 - 2 = 0.</li>
                    <li><span className="font-semibold text-purple-100/95">Step 3:</span> <span className="italic">a</span> is odd and <span className="italic">b</span> = 1 has <span className="italic">ab</span> code 1: 0 + 1 = 1.</li>
                    <li><span className="font-semibold text-purple-100/95">Step 4:</span> 92 has <span className="italic">cd</span> code 3 : 1 + 3 = 4.</li>
                    <li><span className="font-semibold text-purple-100/95">Step 5:</span> 92 is an advanced year, so skip this step.</li>
                    <li><span className="font-semibold text-purple-100/95">Step 6:</span> 92 mod 4 = 0 and 92 ≠ 0, so it is a leap year. Subtract 1: 4 - 1 = 3.</li>
                  </ol>
                  <p>Therefore the final answer is 3 = Wednesday.</p>
                </div>
              </div>
              <div className="rounded-xl thin p-3 space-y-2">
                <h4 className="text-sm font-semibold text-purple-100/90">Example 2: July 17, 52266 / July 17, 266</h4>
                <div className="space-y-2 text-[13px] text-purple-100/80">
                  <p className="font-semibold text-purple-100/90">Beginner:</p>
                  <ol className="space-y-1 list-none">
                    <li><span className="font-semibold text-purple-100/95">Step 1:</span> July month code: 5.</li>
                    <li><span className="font-semibold text-purple-100/95">Step 2:</span> 17 mod 7 = 3: 5 - 4 = 1.</li>
                    <li><span className="font-semibold text-purple-100/95">Step 3:</span> <span className="italic">a</span> is even: 2 mod 4 = 2, which has <span className="italic">ab</span> code 3: 1 + 3 = 4.</li>
                    <li><span className="font-semibold text-purple-100/95">Step 4:</span> 66 is not a beginner <span className="italic">cd</span> year. 60 is the closest beginner year less than 66. 60 has <span className="italic">cd</span> code -2: 4 - 2 = 2.</li>
                    <li><span className="font-semibold text-purple-100/95">Step 5:</span> 66 - 60 = 6. 6 mod 7 = 6: 2 - 1 = 1. ⌊6 / 4⌋ = 1: 1 + 1 = 2.</li>
                    <li><span className="font-semibold text-purple-100/95">Step 6:</span> 66 mod 4 ≠ 0, so it is not a leap year, so skip this step.</li>
                  </ol>
                  <p>Therefore the final answer is 2 = Tuesday.</p>
                  <p className="font-semibold text-purple-100/90">Advanced:</p>
                  <ol className="space-y-1 list-none">
                    <li><span className="font-semibold text-purple-100/95">Step 1:</span> July month code: 5.</li>
                    <li><span className="font-semibold text-purple-100/95">Step 2:</span> 17 mod 7 = 3: 5 - 4 = 1.</li>
                    <li><span className="font-semibold text-purple-100/95">Step 3:</span> <span className="italic">a</span> is even and <span className="italic">b</span> = 2 has <span className="italic">ab</span> code 3: 1 + 3 = 4.</li>
                    <li><span className="font-semibold text-purple-100/95">Step 4:</span> 66 is not an advanced <span className="italic">cd</span> year. 64 is the closest leap year less than 66. 64 has <span className="italic">cd</span> code 3: 4 - 4 = 0.</li>
                    <li><span className="font-semibold text-purple-100/95">Step 5:</span> 66 - 64 = 2: 0 + 2 = 2.</li>
                    <li><span className="font-semibold text-purple-100/95">Step 6:</span> 66 mod 4 ≠ 0, so it is not a leap year, so skip this step.</li>
                  </ol>
                  <p>Therefore the final answer is 2 = Tuesday.</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function MethodExplanation({date, onRequestNew}){
      const memoKey = date ? `${date.y}-${date.m}-${date.d}` : "";
      const breakdowns = React.useMemo(()=> date ? buildMethodBreakdowns(date) : null,[memoKey]);
      const [viewMode,setViewMode]=React.useState('advanced');
      React.useEffect(()=>{ setViewMode('advanced'); },[memoKey]);
      if(!date){
        return <div className="text-sm text-purple-200/80">Pick a date first.</div>;
      }
      const beginner=breakdowns?.beginner;
      if(!beginner?.supported){
        return <div className="text-sm text-purple-100/80">{beginner?.error || "The manual method only applies to AD dates."}</div>;
      }
      const advanced=breakdowns.advanced;
      const activeBreakdown = viewMode==='advanced' ? advanced : beginner;
      const weekdayLabel = activeBreakdown?.weekday || beginner?.weekday || '';
      const summaryItems=[
        {label:'Date:',value:fmt(date.y,date.m,date.d)},
        {label:'Weekday:',value:weekdayLabel},
        {label:'Day code:',value:activeBreakdown.dayCode},
        {label:'Month code:',value:activeBreakdown.monthCode},
        {label:'ab code:',value:activeBreakdown.abCodeDisplay},
        {label:'cd code:',value:activeBreakdown.cdCodeDisplay},
        {label:'Leap year:',value:activeBreakdown.leapYear?'Yes':'No'}
      ];
      return (
        <div className="space-y-4">
          <div className="grid items-start gap-3 md:gap-4" style={{gridTemplateColumns:'minmax(0,1fr) auto'}}>
            <div className="text-sm text-purple-100/80 min-w-0 space-y-1">
              {summaryItems.map(item=>(
                <div key={item.label}><span className="font-semibold">{item.label}</span> {item.value}</div>
              ))}
            </div>
            <div className="flex flex-col items-end gap-2 text-sm">
              <div className="flex overflow-hidden rounded-xl border border-purple-700/60">
                <button
                  type="button"
                  onClick={()=>setViewMode('advanced')}
                  className={`px-3 py-1.5 text-xs font-semibold ${viewMode==='advanced'?'btn-solid text-white':'surface-toggle text-purple-100/80'}`}
                >
                  Advanced
                </button>
                <button
                  type="button"
                  onClick={()=>setViewMode('beginner')}
                  className={`px-3 py-1.5 text-xs font-semibold border-l border-purple-700/60 ${viewMode==='beginner'?'btn-solid text-white':'surface-toggle text-purple-100/80'}`}
                >
                  Beginner
                </button>
              </div>
              {typeof onRequestNew === 'function' && (
                <button
                  type="button"
                  onClick={onRequestNew}
                  className="px-3 py-1.5 rounded-xl border surface-button text-xs font-medium"
                >
                  New
                </button>
              )}
            </div>
          </div>
          <div className="space-y-2 text-[13px] text-purple-100/80">
            {activeBreakdown.lines.map((line,idx)=>(
              <p key={idx}>{line}</p>
            ))}
          </div>
        </div>
      );
    }

    function MethodBreakdownSection({date, open:controlledOpen, onOpenChange, onRequestNew, className, buttonClassName, contentClassName}){
      const isControlled = typeof controlledOpen === 'boolean' && typeof onOpenChange === 'function';
      const [internalOpen,setInternalOpen]=React.useState(false);
      const key=date?`${date.y}-${date.m}-${date.d}`:"";
      React.useEffect(()=>{ if(!isControlled) setInternalOpen(false); },[key, isControlled]);
      const hasDate=!!date;
      React.useEffect(()=>{
        if(hasDate) return;
        if(isControlled){
          if(controlledOpen){
            onOpenChange(false);
          }
        }else{
          setInternalOpen(false);
        }
      },[hasDate, isControlled, controlledOpen, onOpenChange]);
      const open = hasDate ? (isControlled ? controlledOpen : internalOpen) : false;
      const toggle = ()=>{
        if(!hasDate) return;
        if(isControlled){
          onOpenChange(!open);
        }else{
          setInternalOpen(v=>!v);
        }
      };
      const outerClass = className ?? 'mt-5';
      const defaultButtonClass = 'w-full md:w-auto px-4 py-2 rounded-xl btn-solid text-sm font-medium';
      const disabledClass = !hasDate ? ' opacity-60 cursor-not-allowed pointer-events-none' : '';
      const buttonClasses = `${buttonClassName ?? defaultButtonClass}${disabledClass}`;
      const contentClasses = contentClassName ?? 'mt-3 rounded-2xl panel p-4';
      return (
        <div className={outerClass||undefined}>
          <button
            type="button"
            onClick={toggle}
            className={buttonClasses}
            aria-disabled={!hasDate}
          >
            {open?"Hide calculations":"Show calculations"}
          </button>
          {(open && hasDate) && (
            <div className={contentClasses}>
              <MethodExplanation date={date} onRequestNew={onRequestNew}/>
            </div>
          )}
        </div>
      );
    }

    /* --------- Lookup component --------- */
    function LookupCard({
      history=[],
      onAddHistory,
      onClearHistory,
      inputValue="",
      onInputChange,
      outputValue="",
      onOutputChange,
      calcDate,
      onCalcDateChange,
      selectedHistoryId,
      onSelectedHistoryIdChange,
      calcOpen=false,
      onCalcOpenChange
    }){
      const lookupIn = typeof inputValue==='string'?inputValue:String(inputValue??'');
      const setLookupIn = typeof onInputChange==='function'?onInputChange:()=>{};
      const lookupOut = typeof outputValue==='string'?outputValue:String(outputValue??'');
      const setLookupOut = typeof onOutputChange==='function'?onOutputChange:()=>{};
      const calcDateValue = calcDate ?? null;
      const setCalcDate = typeof onCalcDateChange==='function'?onCalcDateChange:()=>{};
      const selectedId = selectedHistoryId ?? null;
      const setSelectedId = typeof onSelectedHistoryIdChange==='function'?onSelectedHistoryIdChange:()=>{};
      const calcOpenValue = !!calcOpen;
      const setCalcOpen = typeof onCalcOpenChange==='function' ? (next)=>onCalcOpenChange(!!next) : ()=>{};
      function isLeapY(y){ y = y>0?y:1-Math.abs(y); return y%400===0 || (y%4===0 && y%100!==0); }
      function dimY(y,m){ return m===2 ? (isLeapY(y)?29:28) : [4,6,9,11].includes(m)?30:31; }
      function wdayY(y,m,d){ function jdn(y,m,d){ const a=Math.floor((14-m)/12),y2=y+4800-a,m2=m-3+12*a; return d+Math.floor((153*m2+2)/5)+365*y2+Math.floor(y2/4)-Math.floor(y2/100)+Math.floor(y2/400)-32045; } const toA = y=>y>0?y:1-Math.abs(y); return ((jdn(toA(y),m,d)+1)%7+7)%7; }
      const MONTH=["January","February","March","April","May","June","July","August","September","October","November","December"];
      const DAY=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
      const fmtYear = y => y>0?String(y):`${Math.abs(y)} BC`;
      function runLookup(){
        const s=lookupIn.trim();
        const m = /^(-?\d{1,2})\/(\d{1,2})\/(-?\d{1,5})$/.exec(s);
        if(!m){ setLookupOut("Enter date in month/day/year format, e.g., 7/4/1776. Years allowed −10000…10000 (no year 0)."); return; }
        let mm=+m[1], dd=+m[2], yy=+m[3];
        if(yy===0){ setLookupOut("There is no year 0. Use −1 for 1 BC."); return; }
        if(yy<-10000 || yy>10000){ setLookupOut("Year must be between −10000 and 10000."); return; }
        if(mm<1||mm>12){ setLookupOut("Month must be 1–12."); return; }
        const maxd=dimY(yy,mm);
        if(dd<1||dd>maxd){ setLookupOut(`Day must be 1–${maxd} for ${MONTH[mm-1]}.`); return; }
        const d=DAY[wdayY(yy,mm,dd)];
        const resultText = `${MONTH[mm-1]} ${dd}, ${fmtYear(yy)} is a ${d}.`;
        const entry={
          id:`${Date.now().toString(36)}-${Math.random().toString(36).slice(2,8)}`,
          query:`${mm}/${dd}/${yy}`,
          label:`${MONTH[mm-1]} ${dd}, ${fmtYear(yy)}`,
          weekday:d,
          result:resultText,
          y:yy,
          m:mm,
          d:dd
        };
        setLookupOut(resultText);
        setCalcDate({y:yy,m:mm,d:dd});
        setSelectedId(entry.id);
        if(onAddHistory){
          onAddHistory(entry);
        }
      }
      function clearLookup(){
        setLookupIn("");
        if(document.activeElement) document.activeElement.blur();
        setLookupOut("");
        setCalcDate(null);
        setSelectedId(null);
        setCalcOpen(false);
      }
      const entries = Array.isArray(history)?history:[];
      React.useEffect(()=>{
        if(!selectedId) return;
        if(!entries.some(entry=>entry.id===selectedId)){
          setSelectedId(null);
          setCalcDate(null);
          setLookupOut("");
          setCalcOpen(false);
        }
      },[entries, selectedId]);
      const handleHistorySelect = (entry)=>{
        if(!entry) return;
        setSelectedId(entry.id);
        setLookupOut(entry?.result||"");
        if(entry && typeof entry.y==='number'){ setCalcDate({y:entry.y,m:entry.m,d:entry.d}); }
        if(document.activeElement) document.activeElement.blur();
      };
      const handleClearHistory = ()=>{
        if(onClearHistory) onClearHistory();
        setSelectedId(null);
        setCalcDate(null);
        setLookupOut("");
        setCalcOpen(false);
      };
      const hasHistory = entries.length>0;
      return (
        <div className="mt-1 space-y-4">
          <div className="rounded-2xl panel p-4 space-y-4">
            <div className="flex flex-wrap items-stretch gap-2">
              <input value={lookupIn} onChange={e=>setLookupIn(e.target.value)} placeholder="e.g., 7/4/1776"
                    className="panel rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-400 flex-1 min-w-0"/>
              <button type="button" onClick={()=>runLookup()} className="px-4 py-2 rounded-xl btn-solid text-sm font-medium">Lookup</button>
              <button type="button" onClick={()=>clearLookup()} className="px-4 py-2 rounded-xl bg-zinc-700 text-white text-sm font-medium">Clear</button>
            </div>
            {lookupOut && <div className="text-sm">{lookupOut}</div>}
            <ul className="text-xs text-purple-100/90 space-y-2 list-disc list-inside">
              <li>Format: <b>month/day/year</b> (e.g., <b>7/4/1776</b>).</li>
              <li>BC years: use a leading minus (e.g., <b>-1</b> = <b>1 BC</b>). No year 0.</li>
              <li>Valid range: <b>−10000…10000</b>. Days must be valid for the month.</li>
            </ul>
          </div>
          <div className="rounded-2xl panel p-4 space-y-4">
            <div className="flex items-center justify-between text-[11px] uppercase tracking-wide text-purple-200/70">
              <span>History</span>
              {hasHistory && (
                <button type="button" onClick={()=>handleClearHistory()} className="text-purple-200/70 font-medium">Clear history</button>
              )}
            </div>
            {hasHistory ? (
              <ul className="space-y-2">
                {entries.map(entry=>(
                  <li key={entry.id}>
                    <button type="button" onClick={()=>handleHistorySelect(entry)}
                            className={`w-full text-left px-3 py-2 rounded-xl panel flex items-center justify-between gap-3 text-xs transition ${selectedId===entry.id?'ring-2 ring-purple-400/70 !bg-purple-900/60':'hover:bg-purple-900/60'}`}>
                      <span className="block text-[13px] font-medium text-purple-100/90">{entry.label}</span>
                      <span className="text-[12px] font-semibold text-purple-200/80">{entry.weekday}</span>
                    </button>
                  </li>
                ))}
              </ul>
            ) : (
              <p className="text-sm text-purple-200/70">No lookups yet.</p>
            )}
            <MethodBreakdownSection
              date={calcDateValue}
              className="pt-4 border-t border-purple-500/40"
              buttonClassName="w-full px-4 py-2 rounded-xl btn-solid text-sm font-medium"
              contentClassName="mt-3 rounded-xl panel p-3"
              open={calcOpenValue}
              onOpenChange={setCalcOpen}
            />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
