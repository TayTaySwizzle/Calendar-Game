            id:`${Date.now().toString(36)}-${Math.random().toString(36).slice(2,8)}`,
            query:`${mm}/${dd}/${yy}`,
            label:`${MONTH[mm-1]} ${dd}, ${fmtYear(yy)}`,
            weekday:d,
            result:resultText,
            year:yy,
            month:mm,
            day:dd
          };
          onAddHistory(entry);
        }
      }
      function clearLookup(){ setLookupIn(""); if(document.activeElement) document.activeElement.blur(); setLookupOut(""); setCalcDate(null); setShowCalc(false); }
      const entries = Array.isArray(history)?history:[];
      const handleHistorySelect = (entry)=>{
        setLookupIn(entry?.query||"");
        setLookupOut(entry?.result||"");
        if(entry && typeof entry.year==='number' && typeof entry.month==='number' && typeof entry.day==='number'){
          setCalcDate({y:entry.year,m:entry.month,d:entry.day});
        }else{
          setCalcDate(null);
        }
        setShowCalc(false);
        if(document.activeElement) document.activeElement.blur();
      };
      const handleClearHistory = ()=>{ if(onClearHistory) onClearHistory(); };
      return (
        <div className="mt-1 rounded-2xl panel p-4">
          <div className="flex items-stretch gap-2">
            <input value={lookupIn} onChange={e=>setLookupIn(e.target.value)} placeholder="e.g., 7/4/1776"
                  className="panel rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-400 flex-1 min-w-0"/>
            <button type="button" onClick={()=>runLookup()} className="px-4 py-2 rounded-xl bg-purple-600 text-white text-sm font-medium">Lookup</button>
            <button type="button" onClick={()=>clearLookup()} className="px-4 py-2 rounded-xl bg-zinc-700 text-white text-sm font-medium">Clear</button>
          </div>
          {lookupOut && <div className="mt-3 text-sm">{lookupOut}</div>}
          {calcDate && (
            <div className="mt-3">
              <button type="button" onClick={()=>setShowCalc(v=>!v)} className="px-3 py-2 rounded-xl border border-purple-700/60 bg-purple-900/50 text-sm">
                {showCalc?"Hide calculations":"Show calculations"}
              </button>
            </div>
          )}
          {calcDate && showCalc && <CalculationPanel date={calcDate} compact />}
          <ul className="mt-4 text-xs text-purple-100/90 space-y-2 list-disc list-inside">
            <li>Format: <b>month/day/year</b> (e.g., <b>7/4/1776</b>).</li>
            <li>BC years: use a leading minus (e.g., <b>-1</b> = <b>1 BC</b>). No year 0.</li>
            <li>Valid range: <b>−10000…10000</b>. Days must be valid for the month.</li>
          </ul>
          {entries.length>0 && (
            <div className="mt-5 pt-4 border-t border-purple-500/40">
              <div className="flex items-center justify-between text-[11px] uppercase tracking-wide text-purple-200/70">
                <span>History</span>
                <button type="button" onClick={()=>handleClearHistory()} className="text-purple-200/70 font-medium">Clear history</button>
              </div>
              <ul className="mt-3 space-y-2">
                {entries.map(entry=>(
                  <li key={entry.id}>
                    <button type="button" onClick={()=>handleHistorySelect(entry)}
                            className="w-full text-left px-3 py-2 rounded-xl panel flex items-center justify-between gap-3 text-xs">
                      <span className="block text-[13px] font-medium text-purple-100/90">{entry.label}</span>
                      <span className="text-[12px] font-semibold text-purple-200/80">{entry.weekday}</span>
                    </button>
                  </li>
                ))}
              </ul>
            </div>
          )}
        </div>
      );
    }

    function MethodPage(){
      const example=buildManualBreakdown({y:1992,m:2,d:26});
      const beginnerExampleSteps=example?.beginner?.steps||[];
      const advancedExampleSteps=example?.advanced?.steps||[];
      return (
        <div className="text-left text-sm text-purple-100/90 space-y-8">
          <section>
            <h2 className="text-2xl font-semibold text-purple-50">My Day of the Week Method</h2>
            <p className="mt-2 text-sm text-purple-200/80">Assumes the proleptic Gregorian calendar for all AD dates.</p>
          </section>

          <section className="space-y-3">
            <h3 className="text-lg font-semibold text-purple-50">Definitions</h3>
            <ul className="list-disc list-inside space-y-1">
              <li>Sunday = 0</li>
              <li>Monday = 1</li>
              <li>Tuesday = 2</li>
              <li>Wednesday = 3</li>
              <li>Thursday = 4</li>
              <li>Friday = 5</li>
              <li>Saturday = 6</li>
            </ul>
            <p>Let the year equal <span className="font-semibold">abcd</span>, where <span className="font-semibold">b</span>, <span className="font-semibold">c</span>, and <span className="font-semibold">d</span> are the last three digits and <span className="font-semibold">a</span> is all preceding digits. For very large years, only the last four digits are needed.</p>
            <p><span className="font-semibold">Mod explained:</span> <span className="font-mono">n mod m</span> is the remainder after dividing <span className="font-mono">n</span> by <span className="font-mono">m</span>.</p>
            <div className="space-y-1">
              <div className="font-semibold text-purple-50">Determining mod 4 for 2 digits <span className="font-mono">nm</span>:</div>
              <ul className="list-disc list-inside ml-4 space-y-1">
                <li>If <span className="font-mono">n</span> is even: <span className="font-mono">nm mod 4 = m mod 4</span>.</li>
                <li>If <span className="font-mono">n</span> is odd: <span className="font-mono">nm mod 4 = (m + 2) mod 4</span>.</li>
              </ul>
            </div>
            <p><span className="font-semibold">Leap year:</span> a year is a leap year if <span className="font-mono">mod 4 = 0</span>, unless <span className="font-mono">mod 100 = 0</span> and <span className="font-mono">mod 400 ≠ 0</span>.</p>
            <p><span className="font-semibold">Integer division:</span> <span className="font-mono">⌊n / m⌋</span> is <span className="font-mono">n / m</span> where the remainder is dropped. Equivalently, <span className="font-mono">⌊n / m⌋ = (n - n mod m) / m</span>.</p>
          </section>

          <section className="space-y-3">
            <h3 className="text-lg font-semibold text-purple-50">Counting Using Fingers</h3>
            <p>Counting is done with a mod 7 system. Use the right hand to keep track of the numbers by touching the thumb to seven different segments of the pointer and middle finger:</p>
            <ul className="list-disc list-inside ml-4 space-y-1">
              <li>0 is the outside (by the thumb) of the bottom segment of the pointer finger.</li>
              <li>1 is the bottom segment of the pointer finger.</li>
              <li>2 is the middle segment of the pointer finger.</li>
              <li>3 is the top segment of the pointer finger.</li>
              <li>4 is the bottom segment of the middle finger.</li>
              <li>5 is the middle segment of the middle finger.</li>
              <li>6 is the top segment of the middle finger.</li>
            </ul>
            <p>When adding numbers, simply move the thumb to different parts of your pointer and middle fingers and keep learning patterns.</p>
            <div>
              <div className="font-semibold text-purple-50">Speed tips when adding:</div>
              <ul className="list-disc list-inside ml-4 space-y-1">
                <li>I turn all 6's into -1 and all 5's into -2.</li>
                <li>I can do 3 into -4 from positions 4–6, and I turn adding 4 into -3 from positions 3–6. The gain can be used to add 7 when needed. Otherwise, all additions are straightforward.</li>
              </ul>
            </div>
            <p>Counting like this ensures that only numbers 0–6 are held regardless of what is added or subtracted. The final answer then immediately corresponds to the weekday represented on your hand.</p>
          </section>

          <section className="space-y-5">
            <h3 className="text-lg font-semibold text-purple-50">Reference Codes</h3>
            <div>
              <h4 className="text-sm font-semibold text-purple-200/90 uppercase tracking-wide">Month Codes</h4>
              <div className="mt-2 grid grid-cols-2 sm:grid-cols-3 gap-2">
                {METHOD_MONTH_CODES.map(({month,code})=>(
                  <div key={month} className="panel rounded-xl px-3 py-2">
                    <div className="text-xs text-purple-200/70 uppercase tracking-wide">{month}</div>
                    <div className="text-lg font-semibold text-purple-50">{code}</div>
                  </div>
                ))}
              </div>
            </div>

            <div className="grid md:grid-cols-2 gap-4">
              <div className="rounded-2xl panel p-4">
                <h4 className="text-sm font-semibold text-purple-200/90 uppercase tracking-wide">ab mod 4 Codes – Beginner</h4>
                <table className="mt-2 w-full text-xs">
                  <tbody>
                    {METHOD_AB_CODES_BEGINNER.map(({label,code})=>(
                      <tr key={label}>
                        <td className="py-1 pr-3 text-purple-200/80">{label} →</td>
                        <td className="py-1 font-mono text-purple-50">{manualLabel(code).text}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div className="rounded-2xl panel p-4">
                <h4 className="text-sm font-semibold text-purple-200/90 uppercase tracking-wide">ab mod 4 Codes – Advanced</h4>
                <table className="mt-2 w-full text-xs">
                  <tbody>
                    {METHOD_AB_CODES_ADVANCED.map(({label,code})=>(
                      <tr key={label}>
                        <td className="py-1 pr-3 text-purple-200/80">{label} →</td>
                        <td className="py-1 font-mono text-purple-50">{manualLabel(code).text}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <p className="mt-2 text-[11px] text-purple-200/70">Note that the advanced codes mod 7 simplify to the beginner ones, so you can subtract 7 when helpful.</p>
              </div>
            </div>

            <div className="grid md:grid-cols-2 gap-4">
              <div className="rounded-2xl panel p-4">
                <h4 className="text-sm font-semibold text-purple-200/90 uppercase tracking-wide">Key <span className="font-mono">cd</span> Years – Beginner</h4>
                <table className="mt-2 w-full text-xs">
                  <tbody>
                    {METHOD_KEY_CODES_BEGINNER.map(({year,code})=>(
                      <tr key={year}>
                        <td className="py-1 pr-3 text-purple-200/80">{String(year).padStart(2,'0')} →</td>
                        <td className="py-1 font-mono text-purple-50">{manualLabel(code).text}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div className="rounded-2xl panel p-4">
                <h4 className="text-sm font-semibold text-purple-200/90 uppercase tracking-wide">Advanced key <span className="font-mono">cd</span> additions</h4>
                <table className="mt-2 w-full text-xs">
                  <tbody>
                    {METHOD_KEY_CODES_ADVANCED.map(({year,code})=>(
                      <tr key={year}>
                        <td className="py-1 pr-3 text-purple-200/80">{String(year).padStart(2,'0')} →</td>
                        <td className="py-1 font-mono text-purple-50">{manualLabel(code).text}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </section>

          <section className="space-y-2">
            <h3 className="text-lg font-semibold text-purple-50">Method</h3>
            <ol className="list-decimal list-inside space-y-2">
              <li>Start with the month code.</li>
              <li>Add the day of the month.</li>
              <li>Compute <span className="font-mono">ab mod 4</span>. Subtract the nearest multiple of 7 if needed so the amount you add is between −3 and 3.</li>
              <li>Find the closest key <span className="font-mono">cd</span> year from the reference list (use the advanced entries if you have them memorized). Add its code.</li>
              <li>If the <span className="font-mono">cd</span> value is not itself a key year, subtract the key year you used, add the difference mod 7, and add ⌊difference ÷ 4⌋ for the leap-year steps. Again, subtract 7 as needed to keep the adjustment small.</li>
              <li>If the month is January or February and the year is a leap year, subtract 1 at the end.</li>
            </ol>
          </section>

          <section className="space-y-3">
            <h3 className="text-lg font-semibold text-purple-50">Example: February 26, 1992</h3>
            <p>The steps below follow the beginner path on the left and the advanced memorized values on the right.</p>
            <div className="grid md:grid-cols-2 gap-4">
              <div className="rounded-2xl panel p-4">
                <h4 className="text-sm font-semibold text-purple-200/90 uppercase tracking-wide">Beginner</h4>
                <ol className="mt-2 list-decimal list-inside space-y-2">
                  {beginnerExampleSteps.map((step,idx)=>(
                    <li key={idx}>
                      <div>{step.explanation}</div>
                      <div className="text-[11px] text-purple-200/70">Add {step.addition.text}. Running total: {step.total.text} → {DAY[step.total.mod]}.</div>
                    </li>
                  ))}
                </ol>
                <div className="mt-3 text-[12px] text-purple-200/80">Total: {example?.beginner?.total?.text} → {example?.beginner?.weekday}.</div>
              </div>
              <div className="rounded-2xl panel p-4">
                <h4 className="text-sm font-semibold text-purple-200/90 uppercase tracking-wide">Advanced</h4>
                <ol className="mt-2 list-decimal list-inside space-y-2">
                  {advancedExampleSteps.map((step,idx)=>(
                    <li key={idx}>
                      <div>{step.explanation}</div>
                      <div className="text-[11px] text-purple-200/70">Add {step.addition.text}. Running total: {step.total.text} → {DAY[step.total.mod]}.</div>
                    </li>
                  ))}
                </ol>
                <div className="mt-3 text-[12px] text-purple-200/80">Total: {example?.advanced?.total?.text} → {example?.advanced?.weekday}.</div>
              </div>
            </div>
            <p>The final answer is Wednesday.</p>
          </section>
        </div>
      );
    }

    function CalculationPanel({date, onClose, compact=false, title}){
      const key = date ? `${date.y}-${date.m}-${date.d}` : "none";
      const breakdown = React.useMemo(()=>buildManualBreakdown(date), [key]);
      if(!date){
        return null;
      }
      const heading = title || `Manual breakdown for ${fmt(date.y,date.m,date.d)}`;
      return (
        <div className={`mt-4 rounded-2xl panel ${compact?'p-3':'p-4'}`}>
          <div className="flex items-center justify-between gap-3">
            <h3 className="text-sm font-semibold text-purple-100">{heading}</h3>
            {onClose && (
              <button type="button" onClick={onClose} className="text-xs text-purple-200/70 hover:text-purple-100">Close</button>
            )}
          </div>
          {breakdown.error ? (
            <p className="mt-3 text-sm text-purple-100/80">{breakdown.error}</p>
          ) : (
            <div className="mt-3 space-y-5 text-sm text-purple-100/90">
              <div>
                <div className="font-semibold text-purple-50">Date:</div>
                <div>{fmt(date.y,date.m,date.d)} — numbers map to weekdays with 0 = Sunday, 1 = Monday, …, 6 = Saturday.</div>
              </div>
              <div>
                <h4 className="text-sm font-semibold text-purple-200/90 uppercase tracking-wide">Beginner walkthrough</h4>
                <ol className="mt-2 list-decimal list-inside space-y-2">
                  {breakdown.beginner.steps.map((step,idx)=>(
                    <li key={idx}>
                      <div>{step.explanation}</div>
                      <div className="text-[11px] text-purple-200/70">Add {step.addition.text}. Running total: {step.total.text} → {DAY[step.total.mod]}.</div>
                    </li>
                  ))}
                </ol>
                <div className="mt-2 text-[12px] text-purple-200/80">Beginner total: {breakdown.beginner.total.text} → {breakdown.beginner.weekday}.</div>
              </div>
              <div>
                <h4 className="text-sm font-semibold text-purple-200/90 uppercase tracking-wide">Advanced memory notes</h4>
                {breakdown.advanced.steps.length>0 ? (
                  <ol className="mt-2 list-decimal list-inside space-y-2">
                    {breakdown.advanced.steps.map((step,idx)=>(
                      <li key={idx}>
                        <div>{step.explanation}</div>
                        <div className="text-[11px] text-purple-200/70">Add {step.addition.text}. Running total: {step.total.text} → {DAY[step.total.mod]}.</div>
                      </li>
                    ))}
                  </ol>
                ) : (
                  <p className="mt-2">No advanced shortcuts are memorized for this date—follow the beginner steps.</p>
                )}
                <div className="mt-2 text-[12px] text-purple-200/80">Advanced total: {breakdown.advanced.total.text} → {breakdown.advanced.weekday}.</div>
              </div>
              <p className="text-[11px] text-purple-200/70">Finish by reading the result off your fingers: 0 = Sunday, 1 = Monday, 2 = Tuesday, 3 = Wednesday, 4 = Thursday, 5 = Friday, 6 = Saturday.</p>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
