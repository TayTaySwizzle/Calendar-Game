  <script type="text/babel" data-presets="env,react">
    const {useEffect,useMemo,useRef,useState,useCallback} = React;
    const MONTH=["January","February","March","April","May","June","July","August","September","October","November","December"];
    const MONTH_ABBR=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const DAY=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const DOOMSDAY_MONTH={common:[4,0,0,3,5,1,3,6,2,4,0,2],leap:[3,6,0,3,5,1,3,6,2,4,0,2]};
    const METHOD_MONTH_CODES={1:6,2:2,3:2,4:5,5:0,6:3,7:5,8:1,9:4,10:6,11:2,12:4};
    const METHOD_AB_ADVANCED_MAP={even:new Map([[0,0],[1,-2],[2,3],[3,1],[4,0],[5,-2],[6,3],[7,1],[8,0],[9,-2]]),odd:new Map([[0,3],[1,1],[2,0],[3,-2],[4,3],[5,1],[6,0],[7,-2],[8,3],[9,1]])};
    const METHOD_CD_ADVANCED_LEAP_ORDER=[0,4,8,12,16,20,24,28,32,36,40,44,48,52,56,60,64,68,72,76,80,84,88,92,96];
    const METHOD_CD_ADVANCED_LEAP_MAP=new Map([[0,0],[4,-2],[8,3],[12,1],[16,-1],[20,-3],[24,2],[28,0],[32,-2],[36,3],[40,1],[44,-1],[48,-3],[52,2],[56,0],[60,-2],[64,3],[68,1],[72,-1],[76,-3],[80,2],[84,0],[88,-2],[92,3],[96,1]]);
    const METHOD_CD_ADVANCED_ZERO_YEARS=new Set([0,6,17,23,28,34,45,51,56,62,73,79,84,90]);
    const YEAR_OPTION_DEFAULT=9,DAY_OPTION_COUNT=7,MONTH_OPTION_COUNT=7;
    const THEMES=[{id:'dusk',name:'Dusk'},{id:'midnight',name:'Midnight'},{id:'nebula',name:'Nebula'},{id:'light',name:'Light'},{id:'parchment',name:'Parchment'}];
    const toAstro=y=>y>0?y:1-Math.abs(y);
    const isLeap=y=>{y=toAstro(y);return y%400===0||(y%4===0&&y%100!==0);};
    const dim=(y,m)=>m===2?(isLeap(y)?29:28):[4,6,9,11].includes(m)?30:31;
    function jdnGregorian(y,m,d){const a=Math.floor((14-m)/12),y2=y+4800-a,m2=m-3+12*a;return d+Math.floor((153*m2+2)/5)+365*y2+Math.floor(y2/4)-Math.floor(y2/100)+Math.floor(y2/400)-32045;}
    const wday=(y,m,d)=>((jdnGregorian(toAstro(y),m,d)+1)%7+7)%7;
    const fmtYear=y=>y>0?String(y):`${Math.abs(y)} BC`;
    const fmt=(y,m,d)=>`${MONTH[m-1]} ${d}, ${fmtYear(y)}`;
    const rint=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
    function randomDate(lo,hi){for(;;){let y=rint(lo,hi);if(y===0)continue;let m=rint(1,12),d=rint(1,dim(y,m));if(d<=dim(y,m))return{y,m,d};}}
    const blankDedTypeStore=()=>({year:null,month:null,day:null});
    const normalizeMod7=v=>((v%7)+7)%7;
    const canonicalizeMod=v=>{const m=normalizeMod7(v);return m>3?m-7:m;};
    function calcDayCode(d){const lo=Math.floor(d/7)*7,hi=lo+7,fl=d-lo,fu=d-hi;return Math.abs(fu)<=Math.abs(fl)?fu:fl;}
    function calcCdCode(cd){if(METHOD_CD_ADVANCED_ZERO_YEARS.has(cd))return 0;let b=METHOD_CD_ADVANCED_LEAP_ORDER[0];for(const y of METHOD_CD_ADVANCED_LEAP_ORDER){if(y>cd)break;b=y;}return canonicalizeMod((METHOD_CD_ADVANCED_LEAP_MAP.get(b)??0)+(cd-b));}
    function yearParts(y){const f=((y%10000)+10000)%10000;return{a:Math.floor(f/1000),b:Math.floor((f%1000)/100),cd:f%100};}
    function computeMethodSummary({y,m,d}){if(!Number.isFinite(y)||y<=0)return null;const mc=METHOD_MONTH_CODES[m]??null;if(mc==null)return null;const p=yearParts(y);return{monthCode:mc,dayCode:calcDayCode(d),abCode:(p.a%2===0?METHOD_AB_ADVANCED_MAP.even:METHOD_AB_ADVANCED_MAP.odd).get(p.b)??0,cdCode:calcCdCode(p.cd),leapYear:isLeap(y),weekday:DAY[wday(y,m,d)]};}
    const isTouch=typeof window!=="undefined"&&("ontouchstart" in window||navigator.maxTouchPoints>0||matchMedia("(pointer:coarse)").matches);
    const isTimer=m=>m==="blitz"||m==="sudden"||m==="flash";
    const fmtTime=t=>t!=null?`${t.toFixed(2)}s`:"—";
    const calcAvg=t=>t.length?t.reduce((a,b)=>a+b,0)/t.length:null;
    const calcLast=t=>t.length?t[t.length-1]:null;
    const calcMed=t=>{if(!t.length)return null;const s=[...t].sort((a,b)=>a-b),m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2;};
    const blockMinus=e=>{if(e.key==="-"||e.key==="Subtract"||e.key==="Minus")e.preventDefault();};
    const blockMinusBI=e=>{if(e.data&&e.data.includes("-"))e.preventDefault();};

    function Expander({open,instant,children}){
      const outerRef=useRef(null);
      const innerRef=useRef(null);
      const prevOpenRef=useRef(open);
      useEffect(()=>{
        const el=outerRef.current;if(!el)return;
        const wasOpen=prevOpenRef.current;prevOpenRef.current=open;
        if(open){
          el.style.maxHeight=(innerRef.current?.scrollHeight??0)+16+"px";
        }else if(instant||!wasOpen){
          el.style.maxHeight="0px";
        }else{
          el.style.maxHeight=el.scrollHeight+"px";
          el.getBoundingClientRect();
          el.style.maxHeight="0px";
        }
      },[open,instant]);
      return(<div ref={outerRef} className="expander" style={{maxHeight:"0px"}}><div ref={innerRef}>{children}</div></div>);
    }

    const Stat=({label,value,disabled,onClick,pressed})=>{
      const ia=typeof onClick==="function";const Tag=ia?"button":"div";
      const props=ia?{type:"button",onClick,"aria-pressed":typeof pressed==="boolean"?pressed:undefined}:{};
      return(<Tag {...props} className={`px-2.5 py-1.5 rounded-xl panel text-center flex flex-col items-center h-full${disabled?" opacity-60":""}${ia?" cursor-pointer hover:bg-purple-900/40 transition-colors":""}`}><div className="text-[11px] text-purple-200/80 leading-tight flex items-center justify-center min-h-[1.65rem]"><span>{label}</span></div><div className="mt-auto pt-0.5 text-base font-semibold tabular-nums">{disabled?"—":value}</div></Tag>);
    };
    const StatTwo=({label,left,right,disabled,onClick,pressed})=>{
      const ia=typeof onClick==="function";const Tag=ia?"button":"div";
      const props=ia?{type:"button",onClick,"aria-pressed":typeof pressed==="boolean"?pressed:undefined}:{};
      return(<Tag {...props} className={`px-2.5 py-1.5 rounded-xl panel text-center flex flex-col items-center h-full${disabled?" opacity-60":""}${ia?" cursor-pointer hover:bg-purple-900/40 transition-colors":""}`}><div className="text-[11px] text-purple-200/80 leading-tight flex items-center justify-center min-h-[1.65rem]"><span>{label}</span></div><div className="mt-auto pt-0.5 text-base font-semibold tabular-nums">{disabled?"—":`${left}/${right}`}</div></Tag>);
    };

    function AoxMode({minY,maxY,visible,extStats,setExtStats,themeOpen,setThemeOpen}){
      const [aoxN,setAoxN]=useState("10");
      const [mistakesOk,setMistakesOk]=useState(false);
      const [oneByOne,setOneByOne]=useState(false);
      const [date,setDate]=useState(()=>randomDate(minY,maxY));
      const [runPhase,setRunPhase]=useState("idle");
      const [displayN,setDisplayN]=useState(10);
      const [shown,setShown]=useState(false);
      const [inBackMode,setInBackMode]=useState(false);
      const [aoxStack,setAoxStack]=useState([]);
      const [times,setTimes]=useState([]);
      const [streak,setStreak]=useState(0);
      const [bestStreak,setBestStreak]=useState(0);
      const [attempts,setAttempts]=useState(0);
      const [guesses,setGuesses]=useState([]);
      const [msg,setMsg]=useState("");
      const [flash,setFlash]=useState(null);
      const [codesOpen,setCodesOpen]=useState(false);
      const [canOverrideCorrect,setCanOverrideCorrect]=useState(false);
      const tStartRef=useRef(null);
      const wrongTimeRef=useRef(null);
      const prevTimesSnapRef=useRef(null);
      const prevStreakSnapRef=useRef(null);
      const bestRef=useRef({});
      const correct=useMemo(()=>wday(date.y,date.m,date.d),[date]);
      const n=Math.max(2,Math.min(1000,parseInt(aoxN)||10));
      const bestKey=`${n}|${mistakesOk}`;
      const bestData=bestRef.current[bestKey]||{avg:null,med:null};
      const aoLabel=`Ao${n}`;
      const scoreN=runPhase==="idle"?n:displayN;
      const doneCount=times.length;
      const isRunning=runPhase==="running";
      const isLocked=runPhase==="done"||runPhase==="failed";
      const dateVisible=runPhase==="failed"||(isRunning&&(!oneByOne||shown))||inBackMode;
      const revealLocked=!isRunning||isLocked||codesOpen||(oneByOne&&!shown)||inBackMode;
      const backDisabled=aoxStack.length===0||isLocked||runPhase==="idle";
      const overrideAvail=isRunning&&!inBackMode&&(guesses.length>0||codesOpen||msg!==""||canOverrideCorrect)&&!isLocked;
      const codesDisabled=runPhase==="idle"||(oneByOne&&!shown&&!inBackMode&&!isLocked)||isLocked;
      const optionsDisabled=isLocked||codesOpen||(oneByOne&&!shown&&!inBackMode)||runPhase==="idle"||inBackMode;
      const baseBtn="w-full rounded-2xl border px-4 py-3 text-base transition shadow-sm select-none";

      function reset(){setRunPhase("idle");setDisplayN(n);setShown(false);setInBackMode(false);setAoxStack([]);setTimes([]);setStreak(0);setBestStreak(0);setAttempts(0);setGuesses([]);setMsg("");setFlash(null);setCodesOpen(false);setCanOverrideCorrect(false);setDate(randomDate(minY,maxY));tStartRef.current=null;wrongTimeRef.current=null;prevTimesSnapRef.current=null;prevStreakSnapRef.current=null;}
      function startOrContinue(){
        if(runPhase==="idle"){setRunPhase("running");setDisplayN(n);setShown(true);tStartRef.current=performance.now();}
        else if(inBackMode){setInBackMode(false);const nd=randomDate(minY,maxY);setDate(nd);setMsg("");setGuesses([]);setCodesOpen(false);wrongTimeRef.current=null;setCanOverrideCorrect(false);if(oneByOne){setShown(false);tStartRef.current=null;}else{setShown(true);tStartRef.current=performance.now();}}
        else if(isRunning&&!shown){setShown(true);setGuesses([]);setMsg("");tStartRef.current=performance.now();wrongTimeRef.current=null;setCanOverrideCorrect(false);}
      }
      function goBackAox(){if(backDisabled)return;const prev=aoxStack[aoxStack.length-1];setAoxStack(s=>s.slice(0,-1));setDate({...prev});setInBackMode(true);setCanOverrideCorrect(false);setMsg(`Answer: ${DAY[wday(prev.y,prev.m,prev.d)]}.`);setGuesses([]);setCodesOpen(false);}
      function advanceDate(newTimes,newStreak,newBest){
        wrongTimeRef.current=null;prevTimesSnapRef.current=null;prevStreakSnapRef.current=null;
        setDate(randomDate(minY,maxY));setGuesses([]);setMsg("");setCodesOpen(false);setCanOverrideCorrect(false);
        setStreak(newStreak);setBestStreak(newBest);
        if(oneByOne){setShown(false);tStartRef.current=null;}else tStartRef.current=performance.now();
        if(newTimes.length>=displayN){
          const avg=newTimes.reduce((a,b)=>a+b,0)/newTimes.length;
          const med=calcMed(newTimes);
          const prev=bestRef.current[bestKey]||{avg:null,med:null};
          bestRef.current[bestKey]={avg:prev.avg==null||avg<prev.avg?avg:prev.avg,med:prev.med==null||med<prev.med?med:prev.med};
          setMsg(`${aoLabel} complete!`);setRunPhase("done");
        }
      }
      function handleCorrect(idx){
        setFlash({type:"good",idx});setTimeout(()=>setFlash(null),550);
        const dt=(performance.now()-(tStartRef.current??performance.now()))/1000;
        prevTimesSnapRef.current=[...times];prevStreakSnapRef.current={streak,bestStreak};setCanOverrideCorrect(true);
        const newTimes=[...times,dt];setTimes(newTimes);setAttempts(a=>a+1);
        const ns=streak+1,nb=Math.max(bestStreak,ns);setAoxStack(s=>[...s,{...date}]);advanceDate(newTimes,ns,nb);
      }
      function handleWrong(idx){
        setFlash({type:"bad",idx});setTimeout(()=>setFlash(null),550);
        wrongTimeRef.current=(performance.now()-(tStartRef.current??performance.now()))/1000;
        setAttempts(a=>a+1);setStreak(0);setCanOverrideCorrect(false);prevTimesSnapRef.current=null;
        if(!mistakesOk){setMsg(`Wrong! Answer: ${DAY[correct]}. Run failed.`);setRunPhase("failed");}
        else setGuesses(g=>g.includes(DAY[idx])?g:[...g,DAY[idx]]);
      }
      function submitDoW(idx){if(!isRunning||isLocked||codesOpen||inBackMode)return;if(oneByOne&&!shown)return;if(idx===correct)handleCorrect(idx);else handleWrong(idx);}
      function revealAnswer(){if(revealLocked)return;wrongTimeRef.current=(performance.now()-(tStartRef.current??performance.now()))/1000;setMsg(`Answer: ${DAY[correct]}.`);setStreak(0);setCanOverrideCorrect(false);prevTimesSnapRef.current=null;if(!mistakesOk)setRunPhase("failed");else setAttempts(a=>a+1);}
      function openCodes(){
        if(inBackMode){setCodesOpen(v=>!v);return;}if(codesDisabled)return;
        if(!codesOpen){wrongTimeRef.current=(performance.now()-(tStartRef.current??performance.now()))/1000;setCanOverrideCorrect(false);prevTimesSnapRef.current=null;setStreak(0);if(!mistakesOk)setRunPhase("failed");else setAttempts(a=>a+1);setMsg(`Answer: ${DAY[correct]}.`);}
        setCodesOpen(v=>!v);
      }
      function handleOverride(){
        if(!isRunning||inBackMode)return;

                  <div className="grid grid-cols-2 gap-3">
                    <div><label htmlFor="min-year-input" className="block text-xs text-purple-200/80 mb-1">Start Year</label><input ref={minInputRef} id="min-year-input" type="text" inputMode="numeric" pattern="[0-9]*" value={minInputVal} onChange={e=>{if(e.target.value===''||/^\d*$/.test(e.target.value))setMinInputVal(e.target.value);}} onBlur={commitMin} onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();commitMin();e.currentTarget.blur();}if(e.key==="Escape"){setMinInputVal(String(minY));e.currentTarget.blur();}blockMinus(e);}} onBeforeInput={blockMinusBI} className="w-full panel rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-400 tabular-nums"/></div>

              </div>
              <div className="mt-4 rounded-2xl panel p-4">
                <div className="text-center">
                  <div className="text-xs uppercase tracking-widest text-purple-100/80">{dedType==="year"?"What Year Is This?":dedType==="month"?"What Month Is This?":"What Day Is This?"}</div>
                  <div className="mt-1 text-3xl font-bold">{ded?(ded.type==="year"?`${MONTH[ded.m-1]} ${ded.d}`:ded.type==="month"?`${ded.d}, ${fmtYear(ded.y)}`:`${MONTH[ded.m-1]}, ${fmtYear(ded.y)}`):"—"}</div>
                  {ded&&<div className="mt-1 text-lg text-purple-100">Weekday: <span className="font-semibold">{DAY[ded.w]}</span></div>}
                </div>
                <div className={`mt-4 ${(locked||calcOpen||calcPenaltyActive)?"opacity-60 pointer-events-none":""}`}>
                  {ded&&ded.type==="year"&&(<div className="grid grid-cols-3 gap-2">{ded.options.map((y,idx)=>(<button key={y} type="button" onClick={()=>submitDedAnswer(y,idx)} className={`${baseBtn} ${idleBtn} py-2 text-sm ${dedFlash&&dedFlash.kind==="year"&&dedFlash.index===idx?(dedFlash.ok?"flash-good":"flash-bad")+" border-transparent":""} ${centerLastOpt(idx,ded.options.length)}`}>{fmtYear(y)}</button>))}</div>)}
                  {ded&&ded.type==="month"&&(<div className="grid grid-cols-3 gap-2">{ded.options.map((mv,idx)=>(<button key={mv} type="button" onClick={()=>submitDedAnswer(mv,idx)} className={`${baseBtn} ${idleBtn} py-2 text-sm ${dedFlash&&dedFlash.kind==="month"&&dedFlash.index===idx?(dedFlash.ok?"flash-good":"flash-bad")+" border-transparent":""} ${centerLastOpt(idx,ded.options.length)}`}>{MONTH_ABBR[mv-1]}</button>))}</div>)}
                  {ded&&ded.type==="day"&&(<div className="grid grid-cols-3 gap-2">{ded.options.map((dv,idx)=>(<button key={dv} type="button" onClick={()=>submitDedAnswer(dv,idx)} className={`${baseBtn} ${idleBtn} py-2 text-sm ${dedFlash&&dedFlash.kind==="day"&&dedFlash.index===idx?(dedFlash.ok?"flash-good":"flash-bad")+" border-transparent":""} ${centerLastOpt(idx,ded.options.length)}`}>{dv}</button>))}</div>)}
                </div>
                {(msg||guesses.length>0)&&(<div className="mt-4 text-sm text-purple-100/90">{guesses.length>0&&(<div className="flex flex-wrap gap-1 items-center"><span className="text-purple-300/80 text-xs mr-1">Guesses:</span>{guesses.map(g=><span key={g} className="chip">{g}</span>)}</div>)}{msg&&(<div className={guesses.length>0?"mt-2":""}>{msg}</div>)}</div>)}
              </div>
              <div className="mt-4 rounded-2xl panel p-3 space-y-3">
                <div className="grid grid-cols-4 gap-2">
                  <button type="button" className="col-span-1 px-3 py-2 rounded-xl border surface-button text-sm font-medium" onClick={runDeductionRound}>New</button>
                  <button type="button" className={`col-span-1 px-3 py-2 rounded-xl border surface-button text-sm font-medium text-center ${dedStack.length===0?"opacity-60 pointer-events-none":""}`} onClick={goBack}>Back</button>
                  <button type="button" className={`col-span-1 px-3 py-2 rounded-xl border surface-button text-sm font-medium text-center ${revealDisabled?"opacity-60 pointer-events-none":""}`} onClick={reveal}>Reveal</button>
                  <button type="button" className={`col-span-1 px-3 py-2 rounded-xl border surface-button text-sm font-medium text-center ${!overrideAvail?"opacity-60 pointer-events-none":""}`} onClick={override}>Override</button>
                </div>
                <MethodBreakdownSection date={calcTarget} open={calcOpen} onOpenChange={handleCalcOpenChange} className="" contentClassName="mt-3 rounded-2xl thin p-4"/>
              </div>
            </div>
          )}
        </div>
      );
    }

    function GuidePage(){
      const [open,setOpen]=useState(null);
      const toggle=id=>setOpen(o=>o===id?null:id);
      const Section=({id,title,children})=>(<div className="rounded-2xl panel overflow-hidden"><button type="button" onClick={()=>toggle(id)} className="w-full text-left px-4 py-3 flex items-center justify-between"><span className="text-sm font-semibold text-purple-50">{title}</span><span className={`text-[7px] text-white/90 leading-none transition-transform ease-in-out ${open===id?"rotate-180":""}`} style={{transitionDuration:"250ms"}}>▼</span></button><Expander open={open===id} instant={open!==null&&open!==id}><div className="px-4 pb-4 pt-1 text-[13px] text-purple-100/90 leading-relaxed space-y-2">{children}</div></Expander></div>);
      const Divider=({label})=>(<div className="flex items-center gap-2 px-1 pt-1"><div className="flex-1 h-px bg-purple-500/20"></div><span className="text-[10px] uppercase tracking-widest text-purple-300/60">{label}</span><div className="flex-1 h-px bg-purple-500/20"></div></div>);
      return(
        <div className="space-y-2">
          <Section id="overview" title="What Is Calendar Game?"><p>Calendar Game is a training tool for mental calculation of the day of the week. You're given a date and must identify which weekday it falls on — as quickly and accurately as possible. All dates use the proleptic Gregorian calendar.</p></Section>
          <Divider label="Interface"/>
          <Section id="buttons" title="Buttons">
            <p><b>New</b> — load a fresh date. In timer modes, only available after pressing Begin.</p>
            <p><b>Back</b> — return to the previous date. The answer is shown and the card is locked. No stat penalty.</p>
            <p><b>Reveal</b> — show the correct answer without guessing. Counts as a wrong attempt.</p>
            <p><b>Override</b> — fix a mistake. After a wrong answer: gives you credit and records the time to your wrong answer, then moves on. After a correct answer: undoes the credit (useful if you fat-fingered the right day), then moves to a new date without recording time.</p>
            <p><b>Show Codes</b> — reveals the calculation codes for the current date. Counts as wrong if you haven't already answered incorrectly. In AoX without Allow Mistakes, opening Show Codes ends the run.</p>
          </Section>
          <Section id="stats" title="Stats">
            <p><b>Score</b> — correct first-try answers out of total attempts.</p>
            <p><b>Accuracy</b> — percentage of questions answered correctly on the first try.</p>
            <p><b>Streak / Longest</b> — your current consecutive correct streak and your all-time longest in this mode.</p>
            <p><b>Avg Time (Correct)</b> — average time across all first-try correct answers. Always tracked. Tap to hide.</p>
            <p><b>Last Time (Correct)</b> — your most recent first-try correct answer time.</p>
            <p><b>Median Time (Correct)</b> — the middle value of all your correct times when sorted. Less skewed by outliers than the average.</p>
            <p className="text-purple-300/70 text-[12px]">Tap Score, Accuracy, or Streak to hide all three together. Tap Avg Time, Last Time, or Median Time to toggle each independently. Settings are saved per mode. Use More Stats to show or hide the bottom row.</p>
          </Section>
          <Section id="range" title="Year Range"><p>Expand to control which years dates are drawn from. Defaults to 1–10000 AD. Changing the range resets the current round.</p></Section>
          <Section id="theme" title="Theme"><p>Five themes: Dusk (default dark navy), Midnight (true black with purple), Nebula (deep purple), Light (clean white), and Parchment (warm cream). Enable Use System Settings to match your device's light/dark mode automatically, with separate theme choices for each. Disable to pick one manually.</p></Section>
          <Divider label="Modes"/>
          <Section id="classic" title="Classic"><p>The main practice mode with no time pressure. Answer at your own pace. Override works after both wrong and correct answers.</p></Section>
          <Section id="aox" title="AoX">
            <p>Average your times over a set number of solves (2–1000). Press Begin to start a run.</p>
            <p><b>Allow Mistakes</b> — wrong answers don't end the run but don't count toward your average.</p>
            <p><b>One-By-One</b> — hides the date between solves. Press Continue to reveal each new date.</p>
            <p><b>Back</b> — review the previous date without affecting the run. Press Continue to resume.</p>
            <p><b>Override</b> — after wrong: gives credit with time recorded. After correct: undoes the credit.</p>
            <p>Best Avg and Best Median are saved per n and Allow Mistakes setting. The score display freezes when a run ends and only resets after pressing Reset.</p>
          </Section>
          <Section id="deduction" title="Deduction"><p>Identify the missing piece of a date given the rest plus the weekday. Choose Day, Month, or Year mode. Each question has exactly one correct answer. Switch subtypes anytime — progress in each is preserved.</p></Section>
          <Section id="blitz" title="Blitz"><p>Answer as many dates as possible within the time limit (default 60s, adjustable). Score shown is for the current round only.</p></Section>
          <Section id="sudden" title="Sudden Death"><p>Each question has its own countdown (default 7s, adjustable). A wrong answer or running out of time ends the run immediately.</p></Section>
          <Section id="flash" title="Flash"><p>The date is briefly revealed (50ms–3000ms, default 1200ms) then hidden. Answer from memory.</p></Section>
          <Section id="lookup" title="Lookup"><p>Enter any AD date as month/day/year (e.g. 7/4/1776) to instantly see its weekday. Supports years 1–10000. Show Codes is available for all results.</p></Section>
        </div>
      );
    }

    function MethodExplanation({date}){
      const summary=React.useMemo(()=>date?computeMethodSummary(date):null,[date?.y,date?.m,date?.d]);
      if(!date)return<div className="text-sm text-purple-200/80">Pick a date first.</div>;
      if(!summary)return<div className="text-sm text-purple-100/80">Show Codes is only supported for AD dates.</div>;
      const codes=[{label:"Month",italic:false,value:summary.monthCode},{label:"Day",italic:false,value:summary.dayCode},{label:"ab",italic:true,value:summary.abCode},{label:"cd",italic:true,value:summary.cdCode},{label:"Leap",italic:false,value:summary.leapYear?"Yes":"No"}];
      return(<div className="grid grid-cols-5 gap-2 text-center text-sm">{codes.map((c,i)=>(<div key={i} className="flex flex-col gap-1"><div className="text-[11px] text-purple-200/80">{c.italic?<i>{c.label}</i>:c.label}</div><div className="font-semibold tabular-nums text-purple-50">{c.value}</div></div>))}</div>);
    }

    function MethodBreakdownSection({date,open:controlledOpen,onOpenChange,className,contentClassName}){
      const isControlled=typeof controlledOpen==="boolean"&&typeof onOpenChange==="function";
      const [internalOpen,setInternalOpen]=React.useState(false);
      const key=date?`${date.y}-${date.m}-${date.d}`:"";
      React.useEffect(()=>{if(!isControlled)setInternalOpen(false);},[key,isControlled]);
      const hasDate=!!date;
      React.useEffect(()=>{if(hasDate)return;if(isControlled){if(controlledOpen)onOpenChange(false);}else setInternalOpen(false);},[hasDate,isControlled,controlledOpen,onOpenChange]);
      const open=hasDate?(isControlled?controlledOpen:internalOpen):false;
      const toggle=()=>{if(!hasDate)return;if(isControlled)onOpenChange(!open);else setInternalOpen(v=>!v);};
      return(<div className={className??"mt-5"}><button type="button" onClick={toggle} className={`w-full px-4 py-2 rounded-xl btn-solid text-sm font-medium${!hasDate?" opacity-60 cursor-not-allowed pointer-events-none":""}`} aria-disabled={!hasDate}>{open?"Hide Codes":"Show Codes"}</button><Expander open={open&&hasDate}><div className={contentClassName??"mt-3 rounded-2xl panel p-4 pb-1"}><MethodExplanation date={date}/></div></Expander></div>);
    }

    function LookupCard({history=[],onAddHistory,onClearHistory,inputValue="",onInputChange,outputValue="",onOutputChange,calcDate,onCalcDateChange,selectedHistoryId,onSelectedHistoryIdChange,calcOpen=false,onCalcOpenChange}){
      const li=typeof inputValue==="string"?inputValue:String(inputValue??"");
      const sli=typeof onInputChange==="function"?onInputChange:()=>{};
      const lo=typeof outputValue==="string"?outputValue:String(outputValue??"");
      const slo=typeof onOutputChange==="function"?onOutputChange:()=>{};
      const cdv=calcDate??null;const scd=typeof onCalcDateChange==="function"?onCalcDateChange:()=>{};
      const sid=selectedHistoryId??null;const ssid=typeof onSelectedHistoryIdChange==="function"?onSelectedHistoryIdChange:()=>{};
      const cov=!!calcOpen;const sco=typeof onCalcOpenChange==="function"?next=>onCalcOpenChange(!!next):()=>{};
      const lastLookupRef=React.useRef(null);
      function isLeapL(y){y=y>0?y:1-Math.abs(y);return y%400===0||(y%4===0&&y%100!==0);}
      function dimL(y,m){return m===2?(isLeapL(y)?29:28):[4,6,9,11].includes(m)?30:31;}
      function wdayL(y,m,d){function jdn(y,m,d){const a=Math.floor((14-m)/12),y2=y+4800-a,m2=m-3+12*a;return d+Math.floor((153*m2+2)/5)+365*y2+Math.floor(y2/4)-Math.floor(y2/100)+Math.floor(y2/400)-32045;}return((jdn(y>0?y:1-Math.abs(y),m,d)+1)%7+7)%7;}
      function runLookup(){const s=li.trim();if(s===lastLookupRef.current)return;const match=/^(\d{1,2})\/(\d{1,2})\/(\d{1,5})$/.exec(s);if(!match){slo("Enter date as month/day/year, e.g. 7/4/1776.");return;}let mm=+match[1],dd=+match[2],yy=+match[3];if(yy<1||yy>10000){slo("Year must be between 1 and 10000.");return;}if(mm<1||mm>12){slo("Month must be 1–12.");return;}const maxd=dimL(yy,mm);if(dd<1||dd>maxd){slo(`Day must be 1–${maxd} for ${MONTH[mm-1]}.`);return;}const d=DAY[wdayL(yy,mm,dd)];const rt=`${MONTH[mm-1]} ${dd}, ${yy} is a ${d}.`;const entry={id:`${Date.now().toString(36)}-${Math.random().toString(36).slice(2,8)}`,label:`${MONTH[mm-1]} ${dd}, ${yy}`,weekday:d,result:rt,y:yy,m:mm,d:dd};lastLookupRef.current=s;slo(rt);scd({y:yy,m:mm,d:dd});ssid(entry.id);if(onAddHistory)onAddHistory(entry);}
      function clearLookup(){sli("");if(document.activeElement)document.activeElement.blur();slo("");scd(null);ssid(null);sco(false);lastLookupRef.current=null;}
      const entries=Array.isArray(history)?history:[];
      React.useEffect(()=>{if(!sid)return;if(!entries.some(e=>e.id===sid)){ssid(null);scd(null);slo("");sco(false);}},[entries,sid]);
      const selEntry=entry=>{if(!entry)return;ssid(entry.id);slo(entry?.result||"");if(entry&&typeof entry.y==="number")scd({y:entry.y,m:entry.m,d:entry.d});if(document.activeElement)document.activeElement.blur();};
      const clearHist=()=>{if(onClearHistory)onClearHistory();ssid(null);scd(null);slo("");sco(false);lastLookupRef.current=null;};
      return(
        <div className="mt-1 space-y-4">
          <div className="rounded-2xl panel p-4 space-y-4">
            <div className="flex flex-wrap items-stretch gap-2">
              <input value={li} onChange={e=>sli(e.target.value)} placeholder="e.g., 7/4/1776" className="panel rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-400 flex-1 min-w-0"/>
              <button type="button" onClick={runLookup} className="px-4 py-2 rounded-xl btn-solid text-sm font-medium">Lookup</button>
              <button type="button" onClick={clearLookup} className="px-4 py-2 rounded-xl bg-zinc-700 text-white text-sm font-medium">Clear</button>
            </div>
            {lo&&<div className="text-sm text-purple-100/90">{lo}</div>}
            <p className="text-xs text-purple-100/90">Format: <b>month/day/year</b> — e.g. <b>7/4/1776</b>. AD dates only, 1–10000.</p>
          </div>
          <div className="rounded-2xl panel p-4 space-y-4">
            <div className="flex items-center justify-between text-[11px] uppercase tracking-wide text-purple-200/70"><span>History</span>{entries.length>0&&(<button type="button" onClick={clearHist} className="text-purple-200/70 font-medium">Clear History</button>)}</div>
            {entries.length>0?(<ul className="space-y-2">{entries.map(e=>(<li key={e.id}><button type="button" onClick={()=>selEntry(e)} className={`w-full text-left px-3 py-2 rounded-xl panel flex items-center justify-between gap-3 text-xs transition ${sid===e.id?"ring-2 ring-purple-400/70 !bg-purple-900/60":"hover:bg-purple-900/60"}`}><span className="block text-[13px] font-medium text-purple-100/90">{e.label}</span><span className="text-[12px] font-semibold text-purple-200/80">{e.weekday}</span></button></li>))}</ul>):(<p className="text-sm text-purple-200/70">No lookups yet.</p>)}
            <MethodBreakdownSection date={cdv} className="pt-4 border-t border-purple-500/40" contentClassName="mt-3 rounded-xl panel p-3" open={cov} onOpenChange={sco}/>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
