                <div className="text-center relative">

                  <div className="text-xs uppercase tracking-widest text-purple-100/80">{dedType==="year"?"What Year Is This?":dedType==="month"?"What Month Is This?":"What Day Is This?"}</div>
                  <div className="mt-1 text-3xl font-bold">{ded?(ded.type==="year"?`${MONTH[ded.m-1]} ${ded.d}`:ded.type==="month"?`${ded.d}, ${fmtYear(ded.y)}`:`${MONTH[ded.m-1]}, ${fmtYear(ded.y)}`):"—"}</div>
                  {ded&&<div className="mt-1 text-lg text-purple-100">Weekday: <span className="font-semibold">{DAY[ded.w]}</span></div>}
                </div>
                <div className="mt-4">
                  {ded&&ded.type==="year"&&(<div className="grid grid-cols-3 gap-2">{ded.options.map((y,idx)=>{const ps=persistBtns[idx];let bCls;if(ps==='correct')bCls='btn-correct-persist border-transparent';else if(ps==='wrong-latest')bCls='btn-wrong-persist border-transparent';else if(ps==='wrong-prev')bCls='btn-wrong-dim border-transparent';else if(dedFlash&&dedFlash.kind==="year"&&dedFlash.index===idx)bCls=(dedFlash.ok?"flash-good":"flash-bad")+' border-transparent';else bCls=idleBtn;const perLocked=!!ps;const isFlashing=!!(dedFlash&&dedFlash.kind==="year"&&dedFlash.index===idx);const shouldDim=(locked||calcOpen||calcPenaltyActive)&&!ps&&!isFlashing;return(<button key={idx} type="button" onClick={()=>submitDedAnswer(y,idx)} className={`${baseBtn} py-2 text-sm ${bCls} ${(perLocked||(locked||calcOpen||calcPenaltyActive))?"pointer-events-none":""} ${shouldDim?"opacity-60":""} ${centerLastOpt(idx,ded.options.length)}`}>{fmtYear(y)}</button>);})}</div>)}
                  {ded&&ded.type==="month"&&(<div className="grid grid-cols-2 gap-3">{ded.options.map((mv,idx)=>{const last=idx===ded.options.length-1?"col-span-2":"";const ps=persistBtns[idx];let bCls;if(ps==='correct')bCls='btn-correct-persist border-transparent';else if(ps==='wrong-latest')bCls='btn-wrong-persist border-transparent';else if(ps==='wrong-prev')bCls='btn-wrong-dim border-transparent';else if(dedFlash&&dedFlash.kind==="month"&&dedFlash.index===idx)bCls=(dedFlash.ok?"flash-good":"flash-bad")+' border-transparent';else bCls=idleBtn;const perLocked=!!ps;const isFlashing=!!(dedFlash&&dedFlash.kind==="month"&&dedFlash.index===idx);const shouldDim=(locked||calcOpen||calcPenaltyActive)&&!ps&&!isFlashing;return(<button key={idx} type="button" onClick={()=>submitDedAnswer(mv,idx)} className={`${baseBtn} ${bCls} ${(perLocked||(locked||calcOpen||calcPenaltyActive))?"pointer-events-none":""} ${shouldDim?"opacity-60":""} ${last}`}>{mv}</button>);})}</div>)}
                  {ded&&ded.type==="day"&&(<div className="grid grid-cols-3 gap-2">{ded.options.map((dv,idx)=>{const ps=persistBtns[idx];let bCls;if(ps==='correct')bCls='btn-correct-persist border-transparent';else if(ps==='wrong-latest')bCls='btn-wrong-persist border-transparent';else if(ps==='wrong-prev')bCls='btn-wrong-dim border-transparent';else if(dedFlash&&dedFlash.kind==="day"&&dedFlash.index===idx)bCls=(dedFlash.ok?"flash-good":"flash-bad")+' border-transparent';else bCls=idleBtn;const perLocked=!!ps;const isFlashing=!!(dedFlash&&dedFlash.kind==="day"&&dedFlash.index===idx);const shouldDim=(locked||calcOpen||calcPenaltyActive)&&!ps&&!isFlashing;return(<button key={idx} type="button" onClick={()=>submitDedAnswer(dv,idx)} className={`${baseBtn} py-2 text-sm ${bCls} ${(perLocked||(locked||calcOpen||calcPenaltyActive))?"pointer-events-none":""} ${shouldDim?"opacity-60":""} ${centerLastOpt(idx,ded.options.length)}`}>{dv}</button>);})}</div>)}

    function GuideSection({id,title,children,openId,onToggle}){
      const isOpen=openId===id;
      return(<div className="rounded-2xl panel overflow-hidden"><button type="button" onClick={()=>onToggle(id)} className="w-full text-left px-4 py-3 flex items-center justify-between"><span className="text-sm font-semibold text-purple-50">{title}</span><span className={`text-[7px] text-white/90 leading-none transition-transform ease-in-out ${isOpen?"rotate-180":""}`} style={{transitionDuration:"250ms"}}>▼</span></button><Expander open={isOpen}><div className="px-4 pb-4 pt-1 text-[13px] text-purple-100/90 leading-relaxed space-y-2">{children}</div></Expander></div>);
    }
    function GuidePage(){
      const [open,setOpen]=useState(null);
      const toggle=useCallback(id=>setOpen(o=>o===id?null:id),[]);
      const Divider=({label})=>(<div className="flex items-center gap-2 px-1 pt-1"><div className="flex-1 h-px bg-purple-500/20"></div><span className="text-[10px] uppercase tracking-widest text-purple-300/60">{label}</span><div className="flex-1 h-px bg-purple-500/20"></div></div>);
      return(
        <div className="space-y-2">
          <GuideSection id="overview" title="What Is Calendar Game?" openId={open} onToggle={toggle}><p>Calendar Game is a training tool for mental calculation of the day of the week. You're given a date and must identify which weekday it falls on — as quickly and accurately as possible. All dates use the proleptic Gregorian calendar.</p></GuideSection>
          <Divider label="Interface"/>
          <GuideSection id="buttons" title="Buttons" openId={open} onToggle={toggle}>
            <p><b>New</b> — load a fresh date. In timer modes, only available after pressing Begin.</p>
            <p><b>Back (&lt;)</b> — return to the previous date. The answer is shown and the card is locked. No stat penalty. You can go back through your entire history in Classic, Flash, and Deduction; in Blitz and AoX, you can browse the current round or run.</p>
            <p><b>Forward (&gt;)</b> — move forward through dates you've browsed past with Back. The forward history clears whenever you answer a new question, press New/Begin/Reset, or take any action that advances the date. Overriding while browsing back does not clear the forward history.</p>
            <p><b>Reveal</b> — show the correct answer without guessing. Counts as a wrong attempt. No penalty on unanswered dates while browsing back.</p>
            <p><b>Override</b> — fix a mistake. You can override any date in your history by browsing to it with Back/Forward. After a wrong answer: gives you credit and adjusts your score. After a correct answer: undoes the credit and adjusts your score. You can only override once per question. Overriding a wrong answer while browsing back clears any wrong highlights; only the correct answer is shown. In Blitz, you can override past dates after the round ends to adjust your score and saved bests. In AoX without Allow Mistakes, overriding a correct answer ends the run.</p>
            <p><b>Show Codes</b> — reveals the calculation codes for the current date. Counts as wrong if you haven't already answered incorrectly. No penalty on unanswered dates while browsing back. In AoX without Allow Mistakes, opening Show Codes ends the run.</p>
          </GuideSection>
          <GuideSection id="stats" title="Stats" openId={open} onToggle={toggle}>
            <p><b>Score</b> — correct first-try answers out of total attempts. In Blitz, only the current round is shown. In AoX, shows correct answers out of total attempts; the run ends once correct answers reach the set number.</p>
            <p><b>Accuracy</b> — percentage of questions answered correctly on the first try. Shows — until your first attempt.</p>
            <p><b>Streak</b> — your current consecutive correct streak / your best in this session.</p>
            <p><b>Last / Avg / Med</b> — timing stats, calculated using correct answers only. Last is your most recent correct time; Avg is the average across all correct answers; Med is the median, which is less skewed by outliers. Any time of 60 seconds or more — whether an individual solve, a computed average or median, or any Best — displays as "—". Times are still tracked internally and contribute to averages, medians, and best-tracking; only the display is capped.</p>
            <p className="text-purple-300/70 text-[12px]">In modes designed for casual practice (Classic, Deduction, Flash), you can tap any stat to hide it. Tapping Score, Accuracy, or Streak hides all three; tapping any timing stat hides all three. Stats always track in the background regardless of visibility. Enabling timing stats resets all stats so the score and timing always reflect the same set of questions. When timing stats are off, leaving and returning to a mode preserves the current question exactly as you left it — same date, same answers, codes panel in the same state. In all other modes, stats are always visible.</p>
          </GuideSection>
          <GuideSection id="range" title="Year Range" openId={open} onToggle={toggle}><p>Set via the ⚙ settings menu. Controls which years dates are drawn from. Defaults to 1–10000 AD. Changing the range resets the current round.</p></GuideSection>
          <GuideSection id="leap" title="Leap Year Settings" openId={open} onToggle={toggle}><p>Two settings in the ⚙ menu control how often leap years appear and what months they're paired with. <b>Leap Year Chance</b> sets how often a generated date lands on a leap year — Random uses the natural rate (~24%); 50%, 75%, and 100% force higher rates. <b>Force Jan/Feb on Leap Years</b>, when on, restricts the month to January or February whenever a leap year is generated. These settings apply to all game modes' date generation; Lookup is unaffected. If your year range happens to contain no leap years and the chance is set to 50/75/100%, the chance is silently ignored per date — the setting itself is preserved.</p></GuideSection>
          <GuideSection id="theme" title="Theme" openId={open} onToggle={toggle}><p>Five themes: Dusk (default dark navy), Midnight (true black with purple), Nebula (deep purple), Light (clean white), and Parchment (warm cream). Accessible from the ⚙ settings menu in any tab. Enable Use System Settings to match your device's light/dark mode automatically, with separate theme choices for each. Disable to pick one manually.</p></GuideSection>
          <GuideSection id="dateformat" title="Date Format" openId={open} onToggle={toggle}><p>Set via the ⚙ settings menu. Choose one of five real-world formats: <b>Written MDY</b> (April 27, 1828), <b>Written DMY</b> (27 April 1828), <b>Numeric MDY</b> (4/27/1828), <b>Numeric DMY</b> (27.4.1828), or <b>Numeric YMD</b> (1828-4-27). Numeric formats use a fixed separator convention: MDY uses '/', DMY uses '.', YMD uses '-'. Years always show in full, never abbreviated.</p><p>Only DMY, MDY, and YMD orderings are offered because those are the only orderings actually used in real life — orderings like YDM aren't standard anywhere.</p><p><b>Random Format</b>, when on, rolls one of the five formats per date in game modes only — your selected format is preserved underneath (the panels just lock visually). Lookup and the Last Updated timestamp ignore Random and always use the selected format. The Last Updated timestamp uses the numeric version of whichever format you've selected.</p></GuideSection>
          <GuideSection id="julian" title="Julian Calendar" openId={open} onToggle={toggle}><p>Toggle via the ⚙ settings menu under Calendar System. Off by default. When on, dates on or before October 4, 1582 are treated as Julian calendar dates, which have different leap year rules — every year divisible by 4 is a leap year, with no century exception. This affects weekday calculation and the codes shown in Show Codes. October 5–14, 1582 are always excluded since those dates never existed; the Gregorian calendar skipped them to correct accumulated calendar drift.</p></GuideSection>
          <Divider label="Modes"/>
          <GuideSection id="classic" title="Classic" openId={open} onToggle={toggle}><p>The main practice mode with no time pressure. Answer at your own pace. Override works after both wrong and correct answers. Reset Stats clears your stats and question history.</p></GuideSection>
          <GuideSection id="aox" title="AoX" openId={open} onToggle={toggle}>
            <p>Average your times over a set number of correct solves (2–1000). The score shows correct answers out of total attempts; the run ends when correct answers reach your target. Press Begin to start a run.</p>
            <p><b>Allow Mistakes</b> — wrong answers don't end the run but don't count toward your score.</p>
            <p><b>One-By-One</b> — hides the date between solves. Press Continue to reveal each new date.</p>
            <p><b>Last / Avg / Med</b> — tap any of these to show or hide all three time stats.</p>
            <p><b>Back/Forward</b> — browse previous dates from the current run without affecting it. Press Continue to resume. After a run completes, Back and Forward let you browse all dates from that run; press Reset to start fresh.</p>
            <p><b>Override</b> — after wrong: gives credit with time recorded, preserves streak. After correct: undoes the credit, resets streak, and either ends the run (Allow Mistakes off) or advances to a new date (Allow Mistakes on). You can also override past dates while browsing back with Back/Forward. If overriding on the last question with Allow Mistakes on, a new date is generated to complete the average. One override per question.</p>
            <p>Stats in AoX are always visible and always track. Best average and best median are tracked independently per n and Allow Mistakes combination — they can come from different runs. Beneath each best, the companion metric from the run that set it is also shown (e.g. the median from the run that set your best average). When both bests come from the same run, a · Same Round tag appears on the right. If you override a correct answer that set a new best, the best is also restored. The score display freezes when a run ends and only resets after pressing Reset.</p>
          </GuideSection>
          <GuideSection id="deduction" title="Deduction" openId={open} onToggle={toggle}><p>Identify the missing piece of a date given the rest plus the weekday. Choose Day, Month, or Year mode.</p><p className="mt-2"><b>Day</b> — seven consecutive days are shown. The correct day can appear in any position.</p><p className="mt-2"><b>Month</b> — seven fixed boxes group months that share the same month code, so tapping any month within a box gives the same weekday for that date. Tap the box containing the correct month. The boxes are always in the same position. In leap years, January shifts into the Apr/Jul box (becoming Jan/Apr/Jul) and February shifts into the Aug box (becoming Feb/Aug); the other boxes are unchanged.</p><p className="mt-2"><b>Year</b> — nine year options centered on the correct year, all landing on the same weekday for the given month and day.</p><p className="mt-2">Switch subtypes anytime — progress in each is preserved. Stats are tracked separately for each subtype. Reset Stats only resets the current subtype and clears its question history.</p></GuideSection>
          <GuideSection id="blitz" title="Blitz" openId={open} onToggle={toggle}>
            <p>Answer as many dates as possible before time runs out. Score shows correct answers for the current round only.</p>
            <p><b>Allow Mistakes</b> — when on, wrong answers count against accuracy but don't end the round. When off, a wrong answer ends the round immediately.</p>
            <p><b>Per Round / Per Question</b> — tap to switch. Per Round uses a single countdown for the whole round (10s–3m, default 60s). Per Question gives each question its own countdown (1s–20s, default 5s); running out of time ends the round. Per Question always enforces no mistakes: tapping Per Question auto-disables Allow Mistakes, and tapping Allow Mistakes on while in Per Question auto-switches back to Per Round.</p>
            <p>When the round ends, the correct answer for the current date is highlighted and your bests are recorded. You can then browse your round's history with Back/Forward and override past dates to adjust your score and saved bests. Overriding a wrong answer that ended the round resumes it.</p>
            <p>Streak is hidden in Per Question since any wrong answer ends the round, making streak equal to score.</p>
            <p>Best scores are tracked per exact configuration (duration + Allow Mistakes + Per Round/Per Question). Best score and best streak are tracked independently in Per Round — they can come from different rounds. When both came from the same round, a · Same Round tag appears on the right of the Best row. If you leave Blitz after a round ends without pressing Reset, the round state (bests, history, final date) is preserved when you return. Press Reset to clear your current round, unlock the settings, and start fresh. Changing settings while idle resets the current round.</p>
          </GuideSection>
          <GuideSection id="flash" title="Flash" openId={open} onToggle={toggle}><p>The date is briefly revealed (0.1s–3.0s, default 0.5s, adjustable via the slider) then hidden. Answer from memory. Reset Stats clears your stats and question history.</p></GuideSection>
          <GuideSection id="lookup" title="Lookup" openId={open} onToggle={toggle}><p>Enter any AD date to instantly see its weekday. Lookup input is always numeric and follows your selected Date Format (m/d/y, d.m.y, or y-m-d). Lookup ignores Random Format and always uses the selected format directly. Changing the Date Format clears the input box. Supports years 1–10000. Show Codes is available for all results and stays open as you browse your history. The history panel shows up to 10 entries before scrolling and re-renders live when you change the Date Format. October 5–14, 1582 never existed and will appear in history as "Does Not Exist" with Show Codes unavailable.</p></GuideSection>
        </div>
      );
    }

    function MethodExplanation({date,useJulian=false}){
      const summary=React.useMemo(()=>date?computeMethodSummary(date,useJulian):null,[date?.y,date?.m,date?.d,useJulian]);
      if(!summary)return<div className="text-sm text-purple-100/80">Show Codes is only supported for AD dates.</div>;
      const codes=[{label:"Month",italic:false,value:summary.monthCode},{label:"Day",italic:false,value:summary.dayCode},{label:"ab",italic:true,value:summary.abCode},{label:"cd",italic:true,value:summary.cdCode},{label:"Leap",italic:false,value:summary.leapYear?"Yes":"No"}];
      return(<div><div className="grid grid-cols-5 gap-2 text-center text-sm">{codes.map((c,i)=>(<div key={i} className="flex flex-col gap-1"><div className="text-[11px] text-purple-200/80">{c.italic?<i>{c.label}</i>:c.label}</div><div className="font-semibold tabular-nums text-purple-50">{c.value}</div></div>))}</div><div className="mt-2 text-center text-[11px] text-purple-300/60">{summary.calendarSystem} Calendar</div></div>);
    }

    function MethodBreakdownSection({date,open:controlledOpen,onOpenChange,className,contentClassName,useJulian=false}){
      const isControlled=typeof controlledOpen==="boolean"&&typeof onOpenChange==="function";
      const [internalOpen,setInternalOpen]=React.useState(false);
      const [frozenDate,setFrozenDate]=React.useState(date);
      const latestDateRef=React.useRef(date);
      latestDateRef.current=date;
      const wasOpenRef=React.useRef(isControlled?!!controlledOpen:false);
      const key=date?`${date.y}-${date.m}-${date.d}`:"";
      React.useEffect(()=>{if(!isControlled)setInternalOpen(false);},[key,isControlled]);
      const hasDate=!!date;
      React.useEffect(()=>{if(hasDate)return;if(isControlled){if(controlledOpen)onOpenChange(false);}else setInternalOpen(false);},[hasDate,isControlled,controlledOpen,onOpenChange]);
      const open=hasDate?(isControlled?controlledOpen:internalOpen):false;
      const toggle=()=>{if(!hasDate)return;if(isControlled)onOpenChange(!open);else setInternalOpen(v=>!v);};
      React.useEffect(()=>{
        if(!date)return;
        if(open){
          wasOpenRef.current=true;
          // #6 — update frozenDate immediately when panel is open and date changes
          // (safe for game modes because calcOpen is set false before date changes there)
          setFrozenDate(date);
          return;
        }
        if(wasOpenRef.current){
          wasOpenRef.current=false;
          const t=setTimeout(()=>setFrozenDate(latestDateRef.current),CODES_CLOSE_MS);
          return()=>clearTimeout(t);
        }else{
          setFrozenDate(date);
        }
      },[open,date]);
      return(<div className={className??"mt-5"}><button type="button" onClick={toggle} className={`w-full px-4 py-2 rounded-xl btn-solid text-sm font-medium${!hasDate?" opacity-60 cursor-not-allowed pointer-events-none":""}`} aria-disabled={!hasDate}>{open?"Hide Codes":"Show Codes"}</button><Expander open={open&&hasDate}><div className={contentClassName??"mt-3 rounded-2xl panel p-4 pb-1"}><MethodExplanation date={frozenDate} useJulian={useJulian}/></div></Expander></div>);
    }

    function LookupCard({history=[],onAddHistory,onMoveHistory,onClearHistory,inputValue="",onInputChange,outputValue="",onOutputChange,calcDate,onCalcDateChange,selectedHistoryId,onSelectedHistoryIdChange,calcOpen=false,onCalcOpenChange,fmtDate,dateFormat='written-mdy',useJulian=false}){
      const li=typeof inputValue==="string"?inputValue:String(inputValue??"");
      const sli=typeof onInputChange==="function"?onInputChange:()=>{};
      const lo=typeof outputValue==="string"?outputValue:String(outputValue??"");
      const slo=typeof onOutputChange==="function"?onOutputChange:()=>{};
      const cdv=calcDate??null;const scd=typeof onCalcDateChange==="function"?onCalcDateChange:()=>{};
      const sid=selectedHistoryId??null;const ssid=typeof onSelectedHistoryIdChange==="function"?onSelectedHistoryIdChange:()=>{};
      const cov=!!calcOpen;
      const [calcOpenByEntry,setCalcOpenByEntry]=React.useState({});
      const sco=typeof onCalcOpenChange==="function"?next=>{onCalcOpenChange(!!next);if(sid)setCalcOpenByEntry(prev=>({...prev,[sid]:!!next}));}:()=>{};
      const lastLookupRef=React.useRef(null);
      const lookupInputRef=React.useRef(null);
      function isLeapL(y){y=y>0?y:1-Math.abs(y);return y%400===0||(y%4===0&&y%100!==0);}
      function dimL(y,m,julian=false){const leap=julian?(y%4===0):isLeapL(y);return m===2?(leap?29:28):[4,6,9,11].includes(m)?30:31;}
      function wdayL(y,m,d){function jdn(y,m,d){const a=Math.floor((14-m)/12),y2=y+4800-a,m2=m-3+12*a;return d+Math.floor((153*m2+2)/5)+365*y2+Math.floor(y2/4)-Math.floor(y2/100)+Math.floor(y2/400)-32045;}return((jdn(y>0?y:1-Math.abs(y),m,d)+1)%7+7)%7;}
      // Map any selected dateFormat to its corresponding Numeric format for input parsing.
      const numericFmtForInput=(()=>{
        if(dateFormat==='written-mdy'||dateFormat==='numeric-mdy')return'numeric-mdy';
        if(dateFormat==='written-dmy'||dateFormat==='numeric-dmy')return'numeric-dmy';
        return'numeric-ymd';
      })();
      // Pattern + example based on which numeric format applies.
      const inputMeta=(()=>{
        if(numericFmtForInput==='numeric-mdy')return{label:'m/d/y',example:'7/4/1776',sep:'/',orderType:'mdy'};
        if(numericFmtForInput==='numeric-dmy')return{label:'d.m.y',example:'4.7.1776',sep:'.',orderType:'dmy'};
        return{label:'y-m-d',example:'1776-7-4',sep:'-',orderType:'ymd'};
      })();
      // Clear the input when the format changes (silently keeping it would be confusing since it might no longer parse).
      // Use a ref to skip the initial mount so navigating to Lookup doesn't wipe the user's existing input.
      const prevFormatRef=React.useRef(dateFormat);
      React.useEffect(()=>{
        if(prevFormatRef.current!==dateFormat){
          sli("");slo("");ssid(null);scd(null);sco(false);lastLookupRef.current=null;
          prevFormatRef.current=dateFormat;
        }
      },[dateFormat]);
      function runLookup(){
        const s=li.trim();
        // Build regex based on the input format. Year accepts 1–5 digits, month/day 1–2 digits.
        const sepEsc=inputMeta.sep==='.'?'\\.':inputMeta.sep==='-'?'-':'/';
        let match;
        if(inputMeta.orderType==='ymd')match=new RegExp(`^(\\d{1,5})${sepEsc}(\\d{1,2})${sepEsc}(\\d{1,2})$`).exec(s);
        else match=new RegExp(`^(\\d{1,2})${sepEsc}(\\d{1,2})${sepEsc}(\\d{1,5})$`).exec(s);
        if(!match){ssid(null);slo(`Enter date as ${inputMeta.label}, e.g. ${inputMeta.example}`);lookupInputRef.current?.focus();return;}
        let mm,dd,yy;
        if(inputMeta.orderType==='ymd'){yy=+match[1];mm=+match[2];dd=+match[3];}
        else if(inputMeta.orderType==='mdy'){mm=+match[1];dd=+match[2];yy=+match[3];}
        else{dd=+match[1];mm=+match[2];yy=+match[3];}
        if(yy<1||yy>10000){ssid(null);slo("Year must be between 1 and 10000");lookupInputRef.current?.focus();return;}
        if(mm<1||mm>12){ssid(null);slo("Month must be 1–12");lookupInputRef.current?.focus();return;}
        const existing=entries.find(e=>e.y===yy&&e.m===mm&&e.d===dd);
        if(existing){
          if(onMoveHistory)onMoveHistory(existing.id);
          slo(existing.result);ssid(existing.id);
          if(existing.isGap){scd(null);sco(false);}else scd({y:yy,m:mm,d:dd});
          lastLookupRef.current=s;lookupInputRef.current?.blur();return;
        }
        if(isGapDate(yy,mm,dd)){
          const gapMsg="October 5–14, 1582 never existed. When the Gregorian calendar was adopted, 10 days were skipped to correct accumulated calendar drift.";
          const displayDate=fmtDate?fmtDate(yy,mm,dd):`${MONTH[mm-1]} ${dd}, ${yy}`;
          const entry={id:`${Date.now().toString(36)}-${Math.random().toString(36).slice(2,8)}`,label:displayDate,weekday:"Does Not Exist",result:gapMsg,y:yy,m:mm,d:dd,isGap:true};
          lastLookupRef.current=s;slo(gapMsg);scd(null);ssid(entry.id);sco(false);if(onAddHistory)onAddHistory(entry);lookupInputRef.current?.blur();return;
        }
        const julian=useJulian&&isJulianDate(yy,mm,dd);
        const maxd=dimL(yy,mm,julian);
        if(dd<1||dd>maxd){ssid(null);slo(`Day must be 1–${maxd} for ${MONTH[mm-1]}`);lookupInputRef.current?.focus();return;}
        const wd=julian?wdayJulian(yy,mm,dd):wdayL(yy,mm,dd);
        const d=DAY[wd];
        const displayDate=fmtDate?fmtDate(yy,mm,dd):`${MONTH[mm-1]} ${dd}, ${yy}`;
        const rt=`${displayDate} is a ${d}.`;
        const entry={id:`${Date.now().toString(36)}-${Math.random().toString(36).slice(2,8)}`,label:displayDate,weekday:d,result:rt,y:yy,m:mm,d:dd};
        lastLookupRef.current=s;slo(rt);scd({y:yy,m:mm,d:dd});ssid(entry.id);sco(false);if(onAddHistory)onAddHistory(entry);lookupInputRef.current?.blur();
      }
      function clearLookup(){sli("");slo("");scd(null);ssid(null);sco(false);lastLookupRef.current=null;}
      const entries=Array.isArray(history)?history:[];
      React.useEffect(()=>{if(!sid)return;if(!entries.some(e=>e.id===sid)){ssid(null);scd(null);slo("");sco(false);}},[entries,sid]);
      const selEntry=entry=>{if(!entry)return;ssid(entry.id);slo(entry?.result||"");const storedOpen=entry.isGap?false:(calcOpenByEntry[entry.id]??false);if(entry.isGap){scd(null);if(typeof onCalcOpenChange==="function")onCalcOpenChange(false);lastLookupRef.current=null;}else{if(typeof entry.y==="number")scd({y:entry.y,m:entry.m,d:entry.d});if(typeof onCalcOpenChange==="function")onCalcOpenChange(storedOpen);}if(document.activeElement)document.activeElement.blur();};
      const clearHist=()=>{if(onClearHistory)onClearHistory();ssid(null);scd(null);slo("");sco(false);lastLookupRef.current=null;};
      const displayNote=React.useMemo(()=>{const selectedEntry=entries.find(e=>e.id===sid);if(selectedEntry&&!selectedEntry.isGap&&typeof selectedEntry.y==='number'&&isJulianDate(selectedEntry.y,selectedEntry.m,selectedEntry.d)){const isJul=useJulian;const wd=isJul?wdayJulian(selectedEntry.y,selectedEntry.m,selectedEntry.d):wdayL(selectedEntry.y,selectedEntry.m,selectedEntry.d);const displayDate=fmtDate?fmtDate(selectedEntry.y,selectedEntry.m,selectedEntry.d):`${MONTH[selectedEntry.m-1]} ${selectedEntry.d}, ${selectedEntry.y}`;return`${displayDate} is a ${DAY[wd]} (${isJul?"Julian":"Gregorian"}).`;}return lo;},[sid,entries,useJulian,fmtDate,lo]);
      const getEntryWeekday=e=>{if(e.isGap)return"Does Not Exist";if(typeof e.y==='number'&&isJulianDate(e.y,e.m,e.d)){const wd=useJulian?wdayJulian(e.y,e.m,e.d):wdayL(e.y,e.m,e.d);return DAY[wd];}return e.weekday;};
      // History entries are stored as {y,m,d} so changing dateFormat re-renders labels live.
      const renderedEntries=React.useMemo(()=>entries.map(e=>{if(e.isGap||typeof e.y!=='number')return e;return{...e,label:fmtDate?fmtDate(e.y,e.m,e.d):e.label};}),[entries,fmtDate,dateFormat]);
      return(
        <div className="mt-1 space-y-4">
          <div className="rounded-2xl panel p-4 space-y-4">
            <div className="flex flex-wrap items-stretch gap-2">
              <input ref={lookupInputRef} value={li} onChange={e=>sli(e.target.value)} placeholder={`e.g., ${inputMeta.example}`} className="panel rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-400 flex-1 min-w-0"/>
              <button type="button" onClick={runLookup} onMouseDown={e=>e.preventDefault()} className="px-4 py-2 rounded-xl btn-solid text-sm font-medium">Lookup</button>
              <button type="button" onClick={clearLookup} onMouseDown={e=>e.preventDefault()} className="px-4 py-2 rounded-xl bg-zinc-700 text-white text-sm font-medium">Clear</button>
            </div>
            {displayNote&&<div className="text-sm text-purple-100/90">{displayNote}</div>}
            <p className="text-xs text-purple-100/90">Format: <b>{inputMeta.label}</b><br/>AD dates only, 1–10000</p>
          </div>
          <div className="rounded-2xl panel p-4 space-y-4">
            <div className="flex items-center justify-between text-[11px] uppercase tracking-wide text-purple-200/70"><span>History</span>{entries.length>0&&(<button type="button" onClick={clearHist} className="text-purple-200/70 font-medium">Clear History</button>)}</div>
            {renderedEntries.length>0?(<ul className="space-y-2 overflow-y-auto max-h-[440px]">{renderedEntries.map(e=>(<li key={e.id}><button type="button" onClick={()=>selEntry(e)} className={`w-full text-left px-3 py-2 rounded-xl panel flex items-center justify-between gap-3 text-xs transition ${sid===e.id?"border-l-2 border-l-purple-400 bg-purple-500/35":"hist-unsel hover:bg-purple-500/15"}`}><span className="block text-[13px] font-medium text-purple-100/90">{e.label}</span><span className="text-[12px] font-semibold text-purple-200/80">{getEntryWeekday(e)}</span></button></li>))}</ul>):(<p className="text-sm text-purple-200/70">No lookups yet</p>)}
            <MethodBreakdownSection date={cdv} className="pt-4 border-t border-purple-500/40" contentClassName="mt-3 rounded-2xl panel px-4 pt-[3px] pb-1.5" open={cov} onOpenChange={sco} useJulian={useJulian}/>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
