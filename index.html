              <h3 className="text-lg font-semibold text-purple-50">Determining mod 4 for two digits</h3>
              <p className="text-purple-200/80">For a two-digit number <span className="font-semibold">nm</span>:</p>
              <ul className="list-disc list-inside text-purple-100/90 space-y-1">
                <li>If <span className="font-semibold">n</span> is even: <span className="font-semibold">nm mod 4 = m mod 4</span>.</li>
                <li>If <span className="font-semibold">n</span> is odd: <span className="font-semibold">nm mod 4 = m + 2 mod 4</span>.</li>
                <li>Otherwise just divide by 4 and keep the remainder.</li>
              </ul>
            </div>
            <div>
              <h3 className="text-lg font-semibold text-purple-50">Leap year</h3>
              <p className="text-purple-200/80">It is a leap year if <span className="font-semibold">cd mod 4 = 0</span>, unless <span className="font-semibold">bcd mod 100 = 0</span> and <span className="font-semibold">abcd mod 400 ≠ 0</span>. If <span className="font-semibold">abcd mod 400 = 0</span> it is still a leap year.</p>
            </div>
            <div>
              <h3 className="text-lg font-semibold text-purple-50">Integer division</h3>
              <p className="text-purple-200/80">⌊<span className="font-semibold">n / m</span>⌋ means divide and drop the remainder. Equivalently, ⌊n / m⌋ = (n − n mod m) / m.</p>
            </div>
          </section>

          <section className="space-y-4">
            <div>
              <h3 className="text-lg font-semibold text-purple-50">Counting using fingers</h3>
              <p className="text-purple-200/80">Keep a mod 7 cycle on your right hand by touching your thumb to these positions:</p>
              <ul className="list-disc list-inside space-y-1 text-purple-100/90">
                <li>0 – the outside of the bottom segment of the pointer finger</li>
                <li>1 – the bottom segment of the pointer finger</li>
                <li>2 – the middle segment of the pointer finger</li>
                <li>3 – the top segment of the pointer finger</li>
                <li>4 – the bottom segment of the middle finger</li>
                <li>5 – the middle segment of the middle finger</li>
                <li>6 – the top segment of the middle finger</li>
              </ul>
              <p className="text-purple-200/80">Adding numbers is just moving your thumb to the right segment and learning the patterns.</p>
            </div>
            <div>
              <h3 className="text-lg font-semibold text-purple-50">Speed tips when adding</h3>
              <p className="text-purple-200/80">Turn 6 into −1 and 5 into −2. Change 3 into −4 when you are already between positions 4–6, and change 4 into −3 from positions 3–6. Otherwise, add normally. This keeps every running total between 0 and 6.</p>
            </div>
          </section>

          <section className="space-y-5">
            <h3 className="text-lg font-semibold text-purple-50">Reference codes</h3>
            <div className="grid gap-4 md:grid-cols-3">
              <div className="rounded-2xl panel p-4 space-y-2">
                <h4 className="font-semibold text-purple-50">Month codes</h4>
                <ul className="grid grid-cols-2 gap-y-1 text-purple-100/90">
                  {monthPairs.map(({name,code})=>(
                    <li key={name} className="flex justify-between"><span>{name}</span><span className="font-semibold">{code}</span></li>
                  ))}
                </ul>
              </div>
              <div className="rounded-2xl panel p-4 space-y-3">
                <h4 className="font-semibold text-purple-50">ab mod 4 codes</h4>
                <div>
                  <div className="text-xs uppercase tracking-wide text-purple-200/70">Beginner</div>
                  <ul className="mt-1 space-y-1 text-purple-100/90">
                    {abBeginner.map(({value,code})=>(
                      <li key={`ab-b-${value}`} className="flex justify-between"><span>{value} →</span><span className="font-semibold">{formatCode(code)}</span></li>
                    ))}
                  </ul>
                </div>
                <div>
                  <div className="text-xs uppercase tracking-wide text-purple-200/70">Advanced (memorise the extra digits)</div>
                  <ul className="mt-1 space-y-1 text-purple-100/90">
                    {abAdvanced.map(({value,code})=>(
                      <li key={`ab-a-${value}`} className="flex justify-between"><span>{value} →</span><span className="font-semibold">{formatCode(code)}</span></li>
                    ))}
                  </ul>
                  <p className="mt-2 text-xs text-purple-200/70">All advanced digits still reduce to the beginner codes mod 4.</p>
                </div>
              </div>
              <div className="rounded-2xl panel p-4 space-y-3">
                <h4 className="font-semibold text-purple-50">Key cd years and codes</h4>
                <div>
                  <div className="text-xs uppercase tracking-wide text-purple-200/70">Beginner</div>
                  <ul className="mt-1 space-y-1 text-purple-100/90">
                    {keyBaseEntries.map(({year,code})=>(
                      <li key={`key-b-${year}`} className="flex justify-between"><span>{String(year).padStart(2,'0')} →</span><span className="font-semibold">{formatCode(code)}</span></li>
                    ))}
                  </ul>
                </div>
                <div>
                  <div className="text-xs uppercase tracking-wide text-purple-200/70">Advanced (add these years)</div>
                  <ul className="mt-1 space-y-1 text-purple-100/90">
                    {advExtraEntries.map(({year,code})=>(
                      <li key={`key-a-${year}`} className="flex justify-between"><span>{String(year).padStart(2,'0')} →</span><span className="font-semibold">{formatCode(code)}</span></li>
                    ))}
                  </ul>
                  <p className="mt-2 text-xs text-purple-200/70">These extra key years let you jump directly without Step 5.</p>
                </div>
              </div>
            </div>
          </section>

          <section className="space-y-3">
            <h3 className="text-lg font-semibold text-purple-50">Method</h3>
            <ol className="space-y-2 list-decimal list-inside text-purple-100/90">
              <li>Start with the month code.</li>
              <li>Add the day mod 7. Subtract the nearest multiple of 7 if needed so you keep a remainder between −3 and 3.</li>
              <li>Find <span className="font-semibold">ab mod 4</span> and add the matching ab code. Advanced users can jump straight to the memorised ab digit code.</li>
              <li>Look up the closest key <span className="font-semibold">cd</span> year at or below the target year and add its code.</li>
              <li>Add the difference between your cd and that key year plus ⌊difference ÷ 4⌋. Advanced users skip this when the cd itself is memorised as a key year.</li>
              <li>If the month is January or February of a leap year, subtract 1.</li>
            </ol>
            <p className="text-purple-200/80">Always keep the running result mod 7 so your thumb lands on the right weekday.</p>
          </section>

          <section className="space-y-3">
            <h3 className="text-lg font-semibold text-purple-50">Example: February 26, 1992</h3>
            <div className="grid gap-4 md:grid-cols-2">
              <div className="rounded-2xl panel p-4 space-y-2">
                <h4 className="font-semibold text-purple-50">Beginner</h4>
                <ol className="list-decimal list-inside space-y-2 text-purple-100/90">
                  <li>Start with the February month code: 2.</li>
                  <li>26 mod 7 = 5 (treat as −2). 2 + 5 ≡ 0.</li>
                  <li>ab = 19. Since 1 is odd, 19 mod 4 = (9 + 2) mod 4 = 3. Add the ab code 1 → total 1.</li>
                  <li>The closest key cd year below 92 is 84 with code 0 → total remains 1.</li>
                  <li>92 − 84 = 8 and ⌊8/4⌋ = 2. Add 8 + 2 = 10 ≡ 3 → total 4.</li>
                  <li>1992 is a leap year and the date is in February, so subtract 1 → total 3 = Wednesday.</li>
                </ol>
              </div>
              <div className="rounded-2xl panel p-4 space-y-2">
                <h4 className="font-semibold text-purple-50">Advanced</h4>
                <ol className="list-decimal list-inside space-y-2 text-purple-100/90">
                  <li>Start with February&apos;s month code: 2.</li>
                  <li>26 mod 7 = 5 (≡ −2). 2 − 2 = 0.</li>
                  <li>ab = 19 → ab mod 4 = 3 → add code 1 → total 1.</li>
                  <li>92 is an advanced key cd year with code 3 → total 4.</li>
                  <li>Skip the extra difference because 92 was memorised.</li>
                  <li>Subtract 1 for the leap year adjustment → total 3 = Wednesday.</li>
                </ol>
              </div>
            </div>
          </section>
        </div>
      );
    }

    function LookupCard({history=[], onAddHistory, onClearHistory}){
      const [lookupIn,setLookupIn]=React.useState("");
      const [lookupOut,setLookupOut]=React.useState("");
      const [showCalc,setShowCalc]=React.useState(false);
      const [calcDate,setCalcDate]=React.useState(null);
      function isLeapY(y){ y = y>0?y:1-Math.abs(y); return y%400===0 || (y%4===0 && y%100!==0); }
      function dimY(y,m){ return m===2 ? (isLeapY(y)?29:28) : [4,6,9,11].includes(m)?30:31; }
      function wdayY(y,m,d){ function jdn(y,m,d){ const a=Math.floor((14-m)/12),y2=y+4800-a,m2=m-3+12*a; return d+Math.floor((153*m2+2)/5)+365*y2+Math.floor(y2/4)-Math.floor(y2/100)+Math.floor(y2/400)-32045; } const toA = y=>y>0?y:1-Math.abs(y); return (jdn(toA(y),m,d)+1)%7; }
      const MONTH=["January","February","March","April","May","June","July","August","September","October","November","December"];
      const DAY=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
      const fmtYear = y => y>0?String(y):`${Math.abs(y)} BC`;
      function runLookup(){
        const s=lookupIn.trim();
        const m = /^(-?\d{1,2})\/(\d{1,2})\/(-?\d{1,5})$/.exec(s);
        if(!m){ setLookupOut("Enter date in month/day/year format, e.g., 7/4/1776. Years allowed −10000…10000 (no year 0)."); setCalcDate(null); setShowCalc(false); return; }
        let mm=+m[1], dd=+m[2], yy=+m[3];
        if(yy===0){ setLookupOut("There is no year 0. Use −1 for 1 BC."); setCalcDate(null); setShowCalc(false); return; }
        if(yy<-10000 || yy>10000){ setLookupOut("Year must be between −10000 and 10000."); setCalcDate(null); setShowCalc(false); return; }
        if(mm<1||mm>12){ setLookupOut("Month must be 1–12."); setCalcDate(null); setShowCalc(false); return; }
        const maxd=dimY(yy,mm);
        if(dd<1||dd>maxd){ setLookupOut(`Day must be 1–${maxd} for ${MONTH[mm-1]}.`); setCalcDate(null); setShowCalc(false); return; }
        const d=DAY[wdayY(yy,mm,dd)];
        const resultText = `${MONTH[mm-1]} ${dd}, ${fmtYear(yy)} is a ${d}.`;
        setLookupOut(resultText);
        setCalcDate({y:yy,m:mm,d:dd});
        setShowCalc(false);
        if(onAddHistory){
          const entry={
            id:`${Date.now().toString(36)}-${Math.random().toString(36).slice(2,8)}`,
            query:`${mm}/${dd}/${yy}`,
            label:`${MONTH[mm-1]} ${dd}, ${fmtYear(yy)}`,
            weekday:d,
            result:resultText,
            y:yy,
            m:mm,
            d:dd
          };
          onAddHistory(entry);
        }
      }
      function clearLookup(){ setLookupIn(""); if(document.activeElement) document.activeElement.blur(); setLookupOut(""); setCalcDate(null); setShowCalc(false); }
      const entries = Array.isArray(history)?history:[];
      const handleHistorySelect = (entry)=>{
        setLookupIn(entry?.query||"");
        setLookupOut(entry?.result||"");
        if(entry && entry.y && entry.m && entry.d){
          setCalcDate({y:entry.y,m:entry.m,d:entry.d});
          setShowCalc(false);
        }else{
          setCalcDate(null);
          setShowCalc(false);
        }
        if(document.activeElement) document.activeElement.blur();
      };
      const handleClearHistory = ()=>{ if(onClearHistory) onClearHistory(); };
      return (
        <div className="mt-1 rounded-2xl panel p-4">
          <div className="flex items-stretch gap-2">
            <input value={lookupIn} onChange={e=>setLookupIn(e.target.value)} placeholder="e.g., 7/4/1776"
                  className="panel rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-400 flex-1 min-w-0"/>
            <button type="button" onClick={()=>runLookup()} className="px-4 py-2 rounded-xl bg-purple-600 text-white text-sm font-medium">Lookup</button>
            <button type="button" onClick={()=>clearLookup()} className="px-4 py-2 rounded-xl bg-zinc-700 text-white text-sm font-medium">Clear</button>
          </div>
          {lookupOut && <div className="mt-3 text-sm">{lookupOut}</div>}
          {calcDate && (
            <div className="mt-4">
              <button type="button"
                onClick={()=>setShowCalc(s=>!s)}
                className={`px-4 py-2 rounded-xl text-sm font-medium transition ${showCalc?"bg-purple-500" : "bg-purple-600 hover:bg-purple-500"}`}>
                {showCalc?"Hide calculations":"Show calculations"}
              </button>
              {showCalc && <CalculationDetails date={calcDate} />}
            </div>
          )}
          <ul className="mt-4 text-xs text-purple-100/90 space-y-2 list-disc list-inside">
            <li>Format: <b>month/day/year</b> (e.g., <b>7/4/1776</b>).</li>
            <li>BC years: use a leading minus (e.g., <b>-1</b> = <b>1 BC</b>). No year 0.</li>
            <li>Valid range: <b>−10000…10000</b>. Days must be valid for the month.</li>
          </ul>
          {entries.length>0 && (
            <div className="mt-5 pt-4 border-t border-purple-500/40">
              <div className="flex items-center justify-between text-[11px] uppercase tracking-wide text-purple-200/70">
                <span>History</span>
                <button type="button" onClick={()=>handleClearHistory()} className="text-purple-200/70 font-medium">Clear history</button>
              </div>
              <ul className="mt-3 space-y-2">
                {entries.map(entry=>(
                  <li key={entry.id}>
                    <button type="button" onClick={()=>handleHistorySelect(entry)}
                            className="w-full text-left px-3 py-2 rounded-xl panel flex items-center justify-between gap-3 text-xs">
                      <span className="block text-[13px] font-medium text-purple-100/90">{entry.label}</span>
                      <span className="text-[12px] font-semibold text-purple-200/80">{entry.weekday}</span>
                    </button>
                  </li>
                ))}
              </ul>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
