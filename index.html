          });
        }
        prevTrackDed.current=trackDed;
      },[trackDed]);
      const prevStatsOffRef=useRef(statsOff);
      useEffect(()=>{
        if(prevStatsOffRef.current && !statsOff){
          const trackingActive = getTrackState(mode);
          if(trackingActive){
            doNew();
          }
        }
        prevStatsOffRef.current=statsOff;
      },[statsOff, mode, trackClassic, trackDed, trackBlitz, trackSudden, trackFlash]);

      /* ===== Range helpers ===== */
      const fmtRangeYear = (y)=> y>0?`${y} AD`:`${Math.abs(y)} BC`;
      const labelForYear = (y)=> y>=0?'AD':'BC';
      const displayInputValue = (y, scopeEra=era)=>{
        if(scopeEra==='BC' || scopeEra==='BOTH') return String(Math.abs(y));
        return String(y);
      };

      const scheduleRangeRefresh = ()=>{ rangeRefreshPendingRef.current=true; };

      function applyMinValue(val){
        if(era==='AD'){ setAdRange(r=>({...r,min:val})); }
        else if(era==='BC'){ setBcRange(r=>({...r,min:val})); }
        else { setBothRange(r=>({...r,min:val})); }
        if(val!==minY){
          setMinY(val);
          scheduleRangeRefresh();
        }
      }

      function applyMaxValue(val){
        if(era==='AD'){ setAdRange(r=>({...r,max:val})); }
        else if(era==='BC'){ setBcRange(r=>({...r,max:val})); }
        else { setBothRange(r=>({...r,max:val})); }
        if(val!==maxY){
          setMaxY(val);
          scheduleRangeRefresh();
        }
      }

      function sanitizeMinInputValue(raw, signHint=null){
        if(!Number.isFinite(raw)) return minY;
        let val=Math.trunc(raw);
        let sign=1;
        if(era==='AD'){
          val=Math.max(1, Math.min(10000, val));
          sign=1;
        }else if(era==='BC'){
          val=-Math.max(1, Math.min(10000, Math.abs(val)));
          sign=-1;
        }else{
          sign = signHint!=null ? (signHint<0?-1:1) : (minY<0?-1:1);
          const magnitude=Math.max(1, Math.min(10000, Math.abs(val)));
          val = sign<0 ? -magnitude : magnitude;
        }
        if(era!=='BOTH' && val>maxY) val=maxY;
        if(val===0) val = sign<0 ? -1 : 1;
        return val;
      }

      function sanitizeMaxInputValue(raw, signHint=null){
        if(!Number.isFinite(raw)) return maxY;
        let val=Math.trunc(raw);
        let sign=1;
        if(era==='AD'){
          val=Math.max(1, Math.min(10000, val));
          sign=1;
        }else if(era==='BC'){
          val=-Math.max(1, Math.min(10000, Math.abs(val)));
          sign=-1;
        }else{
          sign = signHint!=null ? (signHint<0?-1:1) : (maxY<0?-1:1);
          const magnitude=Math.max(1, Math.min(10000, Math.abs(val)));
          val = sign<0 ? -magnitude : magnitude;
        }
        if(era!=='BOTH' && val<minY) val=minY;
        if(val===0) val = sign<0 ? -1 : 1;
        return val;
      }

      function handleMinInputChange(str){
        if(str==='' || /^\d*$/.test(str)){
          setMinInput(str);
        }
      }

      function handleMaxInputChange(str){
        if(str==='' || /^\d*$/.test(str)){
          setMaxInput(str);
        }
      }

      const commitMinInput = ()=>{
        const trimmed=minInput.trim();
        if(trimmed===''){ setMinInput(displayInputValue(minY)); return; }
        if(!/^\d+$/.test(trimmed)){ setMinInput(displayInputValue(minY)); return; }
        const parsed=Number.parseInt(trimmed,10);
        if(Number.isNaN(parsed)){ setMinInput(displayInputValue(minY)); return; }
        const signHint = era==='BC' ? -1 : era==='BOTH' ? (minY<0?-1:1) : 1;
        const val=sanitizeMinInputValue(parsed, signHint);
        if(era==='BOTH' && val>maxY){
          applyMaxValue(val);
          setMaxInput(displayInputValue(val,'BOTH'));
        }
        applyMinValue(val);
        setMinInput(displayInputValue(val));
      };

      const commitMaxInput = ()=>{
        const trimmed=maxInput.trim();
        if(trimmed===''){ setMaxInput(displayInputValue(maxY)); return; }
        if(!/^\d+$/.test(trimmed)){ setMaxInput(displayInputValue(maxY)); return; }
        const parsed=Number.parseInt(trimmed,10);
        if(Number.isNaN(parsed)){ setMaxInput(displayInputValue(maxY)); return; }
        const signHint = era==='BC' ? -1 : era==='BOTH' ? (maxY<0?-1:1) : 1;
        const val=sanitizeMaxInputValue(parsed, signHint);
        if(era==='BOTH' && val<minY){
          applyMinValue(val);
          setMinInput(displayInputValue(val,'BOTH'));
        }
        applyMaxValue(val);
        setMaxInput(displayInputValue(val));
      };

      const handleMinInputBlur = ()=>{ commitMinInput(); };
      const handleMaxInputBlur = ()=>{ commitMaxInput(); };

      const handleMinInputKeyDown = (event)=>{
        if(event.key==='Enter'){
          event.preventDefault();
          commitMinInput();
          event.currentTarget.blur();
          return;
        }
        if(event.key==='Escape'){
          event.preventDefault();
          setMinInput(displayInputValue(minY));
          event.currentTarget.blur();
          return;
        }
        blockMinusKey(event);
      };

      const handleMaxInputKeyDown = (event)=>{
        if(event.key==='Enter'){
          event.preventDefault();
          commitMaxInput();
          event.currentTarget.blur();
          return;
        }
        if(event.key==='Escape'){
          event.preventDefault();
          setMaxInput(displayInputValue(maxY));
          event.currentTarget.blur();
          return;
        }
        blockMinusKey(event);
      };

      function toggleMinSign(){
        if(era!=='BOTH') return;
        const magnitude=Math.max(1, Math.min(10000, Math.abs(minY)||1));
        const nextSign = minY<0?1:-1;
        let val = nextSign<0 ? -magnitude : magnitude;
        if(val>maxY){
          applyMaxValue(val);
          setMaxInput(displayInputValue(val,'BOTH'));
        }
        applyMinValue(val);
        setMinInput(displayInputValue(val,'BOTH'));
      }

      function toggleMaxSign(){
        if(era!=='BOTH') return;
        const magnitude=Math.max(1, Math.min(10000, Math.abs(maxY)||1));
        const nextSign = maxY<0?1:-1;
        let val = nextSign<0 ? -magnitude : magnitude;
        if(val<minY){
          applyMinValue(val);
          setMinInput(displayInputValue(val,'BOTH'));
        }
        applyMaxValue(val);
        setMaxInput(displayInputValue(val,'BOTH'));
      }

      useEffect(()=>{
        if(document.activeElement===minInputRef.current) return;
        setMinInput(displayInputValue(minY));
      },[minY,era]);
      useEffect(()=>{
        if(document.activeElement===maxInputRef.current) return;
        setMaxInput(displayInputValue(maxY));
      },[maxY,era]);

      const refreshForRange = React.useCallback(()=>{
        __hideErr();
        setActive(false);
        setShowTimerDate(false);
        setMsg("");
        setGuesses([]);
        setFlash(null);
        setLocked(false);
        setRevealed(false);
        setCountedWrong(false);
        setCalcPenalty(false);
        setCalcOpen(false);
        calcOpenStatesRef.current.set(mode,false);
        setStack([]);
        setDedStack([]);
        setInput("");
        calcPenaltyStatesRef.current.set(mode,false);
        setBlitzRemain(blitzSec);
        setBlitzRunning(false);
        blitzStartRef.current=null;
        blitzPausedAtRef.current=null;
        blitzPausedAccRef.current=0;
        qDeadlineRef.current=null;
        qPausedAtRef.current=null;
        qPausedAccRef.current=0;
        setQRemain(qSec);
        clearTimeout(flashTimerRef.current);
        flashTimerRef.current=null;
        setPhase('dash');
        flashDeadlineRef.current=null;
        setFlashRemainMs(flashMs);
        tStartRef.current=null;
        const nextDate=randomDate(minY,maxY);
        setDate(nextDate);
        spawnDedWithRange(minY,maxY);
        setSavedClassicByEra(prev=>({...prev,[era]:null}));
        setSavedDedByEra(prev=>({...prev,[era]:null}));
        setSavedDedByType(blankDedTypeStore());
      },[mode,blitzSec,qSec,flashMs,minY,maxY,era]);

      useEffect(()=>{
        if(!rangeRefreshPendingRef.current) return;
        rangeRefreshPendingRef.current=false;
        refreshForRange();
      },[minY,maxY,refreshForRange]);

      /* Era apply — with snapshots when avg-time disabled (Classic & Deduction) */
      function applyEra(newEra){
        // Save snapshot of current era before leaving, if avg-time disabled
        if(mode==="classic" && !trackClassic){
          setSavedClassicByEra(prev=>({
            ...prev,
            [era]: { date:{...date}, guesses:[...guesses], countedWrong, msg, locked, revealed, calcPenaltyActive }
          }));
        }
        if(mode==="deduction" && !trackDed){
          const snapshot = ded ? { ded, guesses:[...guesses], countedWrong, msg, locked, revealed, calcPenaltyActive } : null;
          const typeSnapshots = {...savedDedByType, [dedType]: snapshot};
          setSavedDedByEra(prev=>({
            ...prev,
            [era]: { current: snapshot, byType: typeSnapshots }
          }));
        }

        setEra(newEra);
        // Load that era's stored range (independent per era)
        let mn, mx;
        if(newEra==='AD'){ mn = adRange.min; mx = adRange.max; }
        else if(newEra==='BC'){ mn = bcRange.min; mx = bcRange.max; }
        else { mn = bothRange.min; mx = bothRange.max; }
        setMinY(mn); setMaxY(mx);

        // Classic/Deduction: preserve or generate new depending on avg-time toggle
        if(mode==="classic"){
          if(!trackClassic){
            const snap = (savedClassicByEra[newEra] || null);
            if(snap && snap.date && snap.date.y>=mn && snap.date.y<=mx){
              setDate(snap.date); setGuesses(snap.guesses||[]); setCountedWrong(!!snap.countedWrong);
              setMsg(snap.msg||""); setLocked(!!snap.locked); setRevealed(!!snap.revealed);
              setCalcPenalty(!!snap.calcPenaltyActive);
              return;
            }
            setMsg(""); setGuesses([]); setLocked(false); setRevealed(false); setCountedWrong(false);
            setCalcPenalty(false);
            setDate(randomDate(mn,mx));
          }else{
            setMsg(""); setGuesses([]); setLocked(false); setRevealed(false); setCountedWrong(false);
            setCalcPenalty(false);
            setDate(randomDate(mn,mx));
          }
        }else if(mode==="deduction"){
          const snap = savedDedByEra[newEra] || null;
          const storedByType = snap?.byType ? {...snap.byType} : blankDedTypeStore();
          setSavedDedByType(storedByType);
          if(!trackDed){
            const currentSnap = snap?.current || storedByType[dedType] || null;
            if(currentSnap && currentSnap.ded){
              setDed(currentSnap.ded); setGuesses(currentSnap.guesses||[]); setCountedWrong(!!currentSnap.countedWrong);
              setMsg(currentSnap.msg||""); setLocked(!!currentSnap.locked); setRevealed(!!currentSnap.revealed);
              setCalcPenalty(!!currentSnap.calcPenaltyActive);
              return;
            }
          }
          setMsg(""); setGuesses([]); setLocked(false); setRevealed(false); setCountedWrong(false);
          spawnDedWithRange(mn,mx);
        }else{
          // Other modes: always new
          setMsg(""); setGuesses([]); setLocked(false); setRevealed(false); setCountedWrong(false);
          setCalcPenalty(false);
          setDate(randomDate(mn,mx));
        }
      }

      /* visibility pause for timers */
      useEffect(()=>{
        const onVis=()=>{
          const now=performance.now();
          if(document.hidden){
            if(blitzRunning && blitzPausedAtRef.current==null) blitzPausedAtRef.current=now;
            if(qDeadlineRef.current && qPausedAtRef.current==null) qPausedAtRef.current=now;
          }else{
            if(blitzPausedAtRef.current!=null){ blitzPausedAccRef.current += now - blitzPausedAtRef.current; blitzPausedAtRef.current=null; }
            if(qPausedAtRef.current!=null){ qPausedAccRef.current += now - qPausedAtRef.current; qPausedAtRef.current=null; }
          }
        };
        document.addEventListener("visibilitychange", onVis);
        return ()=>document.removeEventListener("visibilitychange", onVis);
      },[blitzRunning]);

      /* timers + flash loop */
      useEffect(()=>{
        const needLoop = (blitzRunning || (mode==="sudden" && qDeadlineRef.current) || (mode==="flash" && active && phase==='show'));
        if(!needLoop) return;
        let raf;
        const loop=()=>{
          const now=performance.now();
          if(blitzRunning && blitzStartRef.current){
            const t=(now - blitzStartRef.current - blitzPausedAccRef.current)/1000;
            const r=Math.max(0, blitzSec - t);
            setBlitzRemain(r);
            if(r<=.001){
              setBlitzRunning(false);
              blitzStartRef.current=null;
              blitzPausedAtRef.current=null;
              blitzPausedAccRef.current=0;
              setActive(false);
              setShowTimerDate(true);
              setMsg("Time!");
            }
          }
          if(mode==="sudden" && qDeadlineRef.current){
            const r=Math.max(0, (qDeadlineRef.current + qPausedAccRef.current - now)/1000);
            setQRemain(r);
            if(r<=.001){
              qDeadlineRef.current=null;
              qPausedAtRef.current=null;
              qPausedAccRef.current=0;
              updateStats(cur=>{ cur.played+=1; cur.streak=0; });
              setMsg(`Time! Answer: ${DAY[correct]}. Game over.`);
              setActive(false);
              setShowTimerDate(true);
            }
          }
          if(mode==="flash" && active && phase==='show' && flashDeadlineRef.current){
            const rem = Math.max(0, flashDeadlineRef.current - now);
            setFlashRemainMs(rem);
          }
          raf=requestAnimationFrame(loop);
        };
        raf=requestAnimationFrame(loop);
        return ()=>cancelAnimationFrame(raf);
      },[mode,blitzSec,statsOff,blitzRunning,active,phase]);

      const trackingOn = ()=> getTrackState(mode);
      const avgTrackingEnabled = getTrackState(mode);
      const avgDisabled = !avgTrackingEnabled;
      const statsPressed = !statsOff;
      const handleStatsBoxToggle = ()=>{ setStatsOff(prev=>!prev); };
      const canToggleAvg = (mode==="classic" || mode==="deduction" || isTimer(mode));
      const handleAvgStatToggle = ()=>{
        if(!canToggleAvg) return;
        toggleAvg(avgTrackingEnabled);
      };

      const arm=()=>{
        __hideErr();
        setActive(false); setShowTimerDate(false); setMsg(""); setGuesses([]); setFlash(null);
        setLocked(false); setRevealed(false); setCountedWrong(false);
        setBlitzRemain(blitzSec); blitzStartRef.current=null; blitzPausedAtRef.current=null; blitzPausedAccRef.current=0; setBlitzRunning(false);
        if(mode==="blitz"){ setBlitzRoundStats(blankStats()); }
        qDeadlineRef.current=null; qPausedAtRef.current=null; qPausedAccRef.current=0; setQRemain(qSec);
        clearTimeout(flashTimerRef.current);
        flashTimerRef.current=null;
        setPhase('dash');
        flashDeadlineRef.current=null; setFlashRemainMs(flashMs);
        tStartRef.current=null;
      };

      const begin=()=>{
        __hideErr();
        setActive(true); setShowTimerDate(false); setMsg(""); setLocked(false); setRevealed(false); setCountedWrong(false);
        if(mode==="blitz"){ blitzStartRef.current=performance.now(); blitzPausedAccRef.current=0; blitzPausedAtRef.current=null; setBlitzRunning(true); setBlitzRemain(blitzSec); setBlitzRoundStats(blankStats()); }
        if(mode==="sudden"){ const now=performance.now(); qDeadlineRef.current=now + qSec*1000; qPausedAccRef.current=0; qPausedAtRef.current=null; setQRemain(qSec); }
        if(mode==="flash"){
          setPhase('show');
          clearTimeout(flashTimerRef.current);
          const now=performance.now();
          flashDeadlineRef.current = now + flashMs;
          setFlashRemainMs(flashMs);
          flashTimerRef.current=setTimeout(endFlashPhase,Math.max(50,flashMs));
        }
        tStartRef.current=performance.now();
        pushAndNext();
      };

      function runDeductionRound(){
        setDedStack(s=> ded ? [...s, ded] : s);
        spawnDed();
        setMsg("");
        setRevealed(false);
        setLocked(false);
        setGuesses([]);
        setCountedWrong(false);
        setCalcPenalty(false);
      }

      function pushAndNext(){
        if(mode==="classic"||mode==="flash"||mode==="blitz"||mode==="sudden"){
          setStack(s=>[...s,{...date}]);
          const nd = randomDate(minY,maxY);
          setDate(nd);
          setGuesses([]); setRevealed(false); setLocked(false); setCountedWrong(false); setMsg("");
          setCalcPenalty(false);
        }
        if(mode==="deduction"){ runDeductionRound(); }
      }

      const pushLookupHistory = (entry)=>{
        setLookupHistory(prev=>{
          const next=[entry,...prev];
          return next.slice(0,20);
        });
      };

      const clearLookupHistory = ()=>setLookupHistory([]);

      useEffect(()=>{
        if(mode==="classic"){
          if(trackClassic){
            tStartRef.current=performance.now();
          }else{
            tStartRef.current=null;
          }
        }else if(isTimer(mode)){
          const trackEnabled = mode==="blitz"?trackBlitz : mode==="sudden"?trackSudden : trackFlash;
          if(trackEnabled && active){
            tStartRef.current=performance.now();
          }else{
            tStartRef.current=null;
          }
        }
      },[mode,date,trackClassic,trackBlitz,trackSudden,trackFlash,active]);

      /* New (never counts wrong) */
      const doNew=(opts={})=>{
        const {skipInactiveMessage=false}=opts;
        if(isTimer(mode) && !active){
          if(skipInactiveMessage){
            pushAndNext();
          }else{
            setMsg("Press Begin to start.");
          }
          return;
        }
        pushAndNext();
      };

      /* Reveal */
      function reveal(){
        if(locked) return;
        if(mode==="deduction"){
          if(!ded) return;
          if(!statsOff){ updateStats(cur=>{ cur.played+=1; cur.streak=0; }); }
          const ans = ded.type==="year" ? fmtYear(ded.y) : ded.type==="month" ? MONTH[ded.m-1] : String(ded.d);
          setMsg(`Answer: ${ans}.`); setLocked(true); setRevealed(true); setCountedWrong(true);
          return;
        }
        if(!statsOff && !countedWrong){ updateStats(cur=>{ cur.played+=1; cur.streak=0; }); }
        if(mode==="blitz" && !countedWrong){ setBlitzRoundStats(prev=>({
          ...prev,
          played:prev.played+1
        })); }
        setCountedWrong(true);
        if(isTimer(mode)){
          setActive(false);
          setShowTimerDate(true);
          if(mode==="blitz"){ setBlitzRunning(false); blitzStartRef.current=null; blitzPausedAtRef.current=null; blitzPausedAccRef.current=0; }
          if(mode==="sudden"){ qDeadlineRef.current=null; qPausedAtRef.current=null; qPausedAccRef.current=0; }
          if(mode==="flash"){ clearTimeout(flashTimerRef.current); flashTimerRef.current=null; setPhase('dash'); flashDeadlineRef.current=null; }
        }
        setMsg(`Answer: ${DAY[correct]}.`); setLocked(true); setRevealed(true);
      }

      /* Back */
      function goBack(){
        if(mode==="deduction"){
          const prev = dedStack[dedStack.length-1]; if(!prev){ setMsg("Nothing to go back to."); return; }
          setDedStack(s=>s.slice(0,-1)); setDed(prev);
          const ans = prev.type==="year" ? fmtYear(prev.y) : prev.type==="month" ? MONTH[prev.m-1] : String(prev.d);
          setMsg(`Answer: ${ans}.`);
          setLocked(true); setRevealed(true); setGuesses([]); return;
        }
        const prev = stack[stack.length-1]; if(!prev){ setMsg("Nothing to go back to."); return; }
        setStack(s=>s.slice(0,-1)); setDate(prev);
        setMsg(`Answer: ${DAY[wday(prev.y,prev.m,prev.d)]}.`);
        setGuesses([]); setLocked(true); setRevealed(true);
      }

      function submitDoW(idx){
        if(isTimer(mode) && !active){ setMsg("Press Begin to start."); return; }
        if(locked) return;
        if(idx===wday(date.y,date.m,date.d)){
          setFlash({type:'good', idx}); setTimeout(()=>setFlash(null),450);
          if(!countedWrong && tStartRef.current && trackingOn()){ const dt=(performance.now()-tStartRef.current)/1000; updateStats(cur=>{ cur.timeSum+=dt; cur.timeCnt+=1; }); }
          if(!statsOff && !countedWrong){ updateStats(cur=>{ cur.played+=1; cur.good+=1; cur.streak+=1; if(cur.streak>cur.best) cur.best=cur.streak; }); }
          if(mode==="blitz" && !countedWrong){ setBlitzRoundStats(prev=>({
            ...prev,
            played:prev.played+1,
            good:prev.good+1
          })); }
          if(mode==="sudden"){
            const now=performance.now(); qDeadlineRef.current = now + qSec*1000; qPausedAccRef.current = 0; qPausedAtRef.current = null; setQRemain(qSec);
          }
          if(mode==="flash"){ clearTimeout(flashTimerRef.current); flashTimerRef.current=null; setPhase('dash'); setActive(false); flashDeadlineRef.current=null; setFlashRemainMs(flashMs); }
          pushAndNext();
        }else{
          if(mode==="sudden"){ setGuesses([DAY[idx]]); }else{ setGuesses(g=> g.includes(DAY[idx])?g:[...g,DAY[idx]] ); }
          if(!statsOff && !countedWrong){ updateStats(cur=>{ cur.played+=1; cur.streak=0; }); }
          if(mode==="blitz" && !countedWrong){ setBlitzRoundStats(prev=>({
            ...prev,
            played:prev.played+1
          })); }
          setCountedWrong(true);
          if(isTimer(mode)){
            if(mode==="sudden"){
              setActive(false);
              setShowTimerDate(true);
              qDeadlineRef.current=null;
              qPausedAtRef.current=null;
              qPausedAccRef.current=0;
            }else if(mode==="blitz"){
              // keep timer running so the round can continue
            }else if(mode==="flash"){
              // allow the flash timer to continue counting down
            }
          }
          if(mode==="sudden"){ setMsg(`Answer: ${DAY[correct]}. Game over.`); setActive(false); }
          setFlash({type:'bad', idx}); setTimeout(()=>setFlash(null),450);
        }
      }

      /* Deduction generation + helpers using current min/max (or provided) */
      function spawnDed(){ spawnDedWithRange(minY,maxY); }
      function spawnDedWithRange(lo,hi){
        setCalcPenalty(false);
        const positiveCount = hi>=1 ? hi - Math.max(1, lo) + 1 : 0;
        const negativeCount = lo<=-1 ? Math.min(-1, hi) - lo + 1 : 0;
        if(dedType==="year"){
          const posTarget = positiveCount>0 ? Math.min(YEAR_OPTION_DEFAULT, positiveCount) : 0;
          const negTarget = negativeCount>0 ? Math.min(YEAR_OPTION_DEFAULT, negativeCount) : 0;
          const buildOptionsFor = (yCandidate,mCandidate,dCandidate,target)=>{
            if(target<=0) return null;
            if(dCandidate>dim(yCandidate,mCandidate)) return null;
            const w=wday(yCandidate,mCandidate,dCandidate);
            const neighbor=(dir)=>{
              const step=dir>0?1:-1;
              for(let k=1;k<=2000;k++){
                let yy=yCandidate+k*step;
                if(yy===0) yy+=step;
                if(yy<lo||yy>hi) break;
                if(dCandidate<=dim(yy,mCandidate) && wday(yy,mCandidate,dCandidate)===w) return yy;
              }
              return null;
            };
            const lowerNeighbor=neighbor(-1);
            const upperNeighbor=neighbor(+1);
            let lowerBound=lowerNeighbor==null?lo:Math.max(lo, lowerNeighbor+1);
            let upperBound=upperNeighbor==null?hi:Math.min(hi, upperNeighbor-1);
            if(yCandidate>0){
              lowerBound=Math.max(lowerBound,1);
            }else{
              upperBound=Math.min(upperBound,-1);
            }
            if(lowerBound>upperBound) return null;
            if(yCandidate<lowerBound||yCandidate>upperBound) return null;
            const span=upperBound-lowerBound+1;
            if(span<target) return null;
            const half=Math.floor(target/2);
            let start,end;
            if(yCandidate>0){
              start=yCandidate-half;
              if(start<lowerBound) start=lowerBound;
              end=start+target-1;
              if(end>upperBound){
                end=upperBound;
                start=Math.max(lowerBound,end-target+1);
              }
            }else{
              end=yCandidate+half;
              if(end>upperBound) end=upperBound;
              start=end-target+1;
              if(start<lowerBound){
                start=lowerBound;
                end=Math.min(upperBound,start+target-1);
              }
            }
            if(end-start+1!==target) return null;
            if(yCandidate<start||yCandidate>end) return null;
            const options=[];
            for(let yy=start; yy<=end; yy++) options.push(yy);
            return {w, options};
          };
          const tryRandom=()=>{
            for(let tries=0; tries<1600; tries++){
              const allowPos=posTarget>0;
              const allowNeg=negTarget>0;
              let side;
              if(allowPos && allowNeg){
                side = Math.random()<0.5 ? "pos" : "neg";
              }else if(allowPos){
                side="pos";
              }else if(allowNeg){
                side="neg";
              }else{
                side = hi>=1 ? "pos" : "neg";
              }
              const yCandidate = side==="pos" ? (()=>{ const start=Math.max(1,lo); if(hi<start) return null; return rint(start,hi); })() : (()=>{ const end=Math.min(-1,hi); if(end<lo) return null; return rint(lo,end); })();
              if(yCandidate==null || yCandidate===0) continue;
              const target=yCandidate>0?posTarget:negTarget;
              if(target<=0) continue;
              const m=rint(1,12);
              const D=dim(yCandidate,m);
              if(D<=0) continue;
              const d=rint(1,D);
              const built=buildOptionsFor(yCandidate,m,d,target);
              if(!built) continue;
              setDed({type:"year",y:yCandidate,m,d,w:built.w,options:built.options});
              tStartRef.current = trackDed ? performance.now() : null;
              return true;
            }
            return false;
          };
          if(tryRandom()) return;
          const yearCandidates=[];
          if(posTarget>0){
            for(let yCandidate=Math.max(1,lo); yCandidate<=hi; yCandidate++){
              if(yCandidate!==0) yearCandidates.push(yCandidate);
            }
          }
          if(negTarget>0){
            for(let yCandidate=Math.min(-1,hi); yCandidate>=lo; yCandidate--){
              if(yCandidate!==0) yearCandidates.push(yCandidate);
            }
          }
          if(!yearCandidates.length){
            for(let yCandidate=lo; yCandidate<=hi; yCandidate++){
              if(yCandidate!==0) yearCandidates.push(yCandidate);
            }
          }
          for(const yCandidate of yearCandidates){
            const target=yCandidate>0?posTarget:negTarget;
            if(target<=0) continue;
            for(let m=1; m<=12; m++){
              const D=dim(yCandidate,m);
              for(let d=1; d<=D; d++){
                const built=buildOptionsFor(yCandidate,m,d,target);
                if(!built) continue;
                setDed({type:"year",y:yCandidate,m,d,w:built.w,options:built.options});
                tStartRef.current = trackDed ? performance.now() : null;
                return;
              }
            }
          }
          const fallbackYear = yearCandidates.length?yearCandidates[0]:(lo>0?lo:hi<0?hi:1);
          const safeYear=fallbackYear===0?1:fallbackYear;
          const fallbackMonth=1;
          const fallbackDay=1;
          const fallbackW=wday(safeYear,fallbackMonth,fallbackDay);
          setDed({type:"year",y:safeYear,m:fallbackMonth,d:fallbackDay,w:fallbackW,options:[safeYear]});
          tStartRef.current = trackDed ? performance.now() : null;
          return;
        }
        if(dedType==="month"){
          const shuffle=(arr)=>{ for(let i=arr.length-1;i>0;i--){ const j=rint(0,i); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; };
          const buildMonthForYear=(yearCandidate,randomize=true)=>{
            const table=isLeap(yearCandidate)?DOOMSDAY_MONTH.leap:DOOMSDAY_MONTH.common;
            const buildOptions=(correctMonth)=>{
              const used=new Set([table[correctMonth-1]]);
              const months=[correctMonth];
              for(let idx=0; idx<12 && months.length<MONTH_OPTION_COUNT; idx++){
                const monthIdx=idx+1;
                if(monthIdx===correctMonth) continue;
                const val=table[idx];
                if(used.has(val)) continue;
                used.add(val);
                months.push(monthIdx);
              }
              if(months.length!==MONTH_OPTION_COUNT) return null;
              months.sort((a,b)=>a-b);
              return months;
            };
            const dayList=Array.from({length:31},(_,i)=>i+1);
            const weekList=Array.from({length:7},(_,i)=>i);
            if(randomize){ shuffle(dayList); shuffle(weekList); }
            for(const d of dayList){
              for(const w of weekList){
                const candidates=[];
                for(let m=1;m<=12;m++){
                  if(d<=dim(yearCandidate,m) && wday(yearCandidate,m,d)===w) candidates.push(m);
                }
                if(candidates.length!==1) continue;
                const m=candidates[0];
                const options=buildOptions(m);
                if(!options) continue;
                return {y:yearCandidate,d,w,m,options};
              }
            }
            return null;
          };
          for(let tries=0; tries<800; tries++){
            const yearCandidate=rint(lo,hi);
            if(yearCandidate===0) continue;
            const built=buildMonthForYear(yearCandidate,true);
            if(built){
              setDed({type:"month",...built});
              tStartRef.current = trackDed ? performance.now() : null;
              return;
            }
          }
          for(let yearCandidate=lo; yearCandidate<=hi; yearCandidate++){
            if(yearCandidate===0) continue;
            const built=buildMonthForYear(yearCandidate,false);
            if(built){
              setDed({type:"month",...built});
              tStartRef.current = trackDed ? performance.now() : null;
              return;
            }
          }
          const fallbackYear = lo>0?lo:hi<0?hi:1;
          const safeYear=fallbackYear===0?1:fallbackYear;
          const built=buildMonthForYear(safeYear,false);
          if(built){
            setDed({type:"month",...built});
          }else{
            let fallback=null;
            for(let d=1; d<=31 && !fallback; d++){
              for(let w=0; w<7 && !fallback; w++){
                const candidates=[];
                for(let m=1;m<=12;m++){
                  if(d<=dim(safeYear,m) && wday(safeYear,m,d)===w) candidates.push(m);
                }
                if(candidates.length!==1) continue;
                const m=candidates[0];
                const table=isLeap(safeYear)?DOOMSDAY_MONTH.leap:DOOMSDAY_MONTH.common;
                const used=new Set([table[m-1]]);
                const months=[m];
                for(let idx=0; idx<12 && months.length<MONTH_OPTION_COUNT; idx++){
                  const monthIdx=idx+1;
                  if(monthIdx===m) continue;
                  const val=table[idx];
                  if(used.has(val)) continue;
                  used.add(val);
                  months.push(monthIdx);
                }
                if(months.length===MONTH_OPTION_COUNT){
                  months.sort((a,b)=>a-b);
                  fallback={y:safeYear,d,w,m,options:months};
                }
              }
            }
            if(fallback){
              setDed({type:"month",...fallback});
            }else{
              const table=isLeap(safeYear)?DOOMSDAY_MONTH.leap:DOOMSDAY_MONTH.common;
              const months=[1];
              const used=new Set([table[0]]);
              for(let idx=1; idx<12 && months.length<MONTH_OPTION_COUNT; idx++){
                if(used.has(table[idx])) continue;
                used.add(table[idx]);
                months.push(idx+1);
              }
              const d=1;
              const w=wday(safeYear,1,d);
              setDed({type:"month",y:safeYear,d,w,m:1,options:months});
            }
          }
          tStartRef.current = trackDed ? performance.now() : null;
          return;
        }
        if(dedType==="day"){
          let yCandidate=null;
          for(let tries=0; tries<600; tries++){
            const candidate=rint(lo,hi);
            if(candidate!==0){ yCandidate=candidate; break; }
          }
          if(yCandidate==null){
            yCandidate = lo>0?lo:hi<0?hi:1;
            if(yCandidate===0) yCandidate=1;
          }
          const m=rint(1,12);
          const D=dim(yCandidate,m);
          const d=rint(1,D);
          const w=wday(yCandidate,m,d);
          const span=Math.min(DAY_OPTION_COUNT,D);
          const half=Math.floor(span/2);
          let start=d-half;
          if(start<1) start=1;
          let end=start+span-1;
          if(end>D){ end=D; start=Math.max(1,end-span+1); }
          const options=[];
          for(let val=start; val<=end; val++) options.push(val);
          setDed({type:"day",y:yCandidate,m,w,d,options});
          tStartRef.current = trackDed ? performance.now() : null;
          return;
        }
      }
      const captureDedSnapshot=()=> ded ? ({
        ded,
        guesses:[...guesses],
        countedWrong,
        msg,
        locked,
        revealed,
        calcPenaltyActive
      }) : null;

      function changeDedType(nextType){
        if(nextType===dedType) return;
        if(!trackDed){
          const currentSnap=captureDedSnapshot();
          const nextSnap=savedDedByType[nextType] || null;
          pendingDedSwitchRef.current={snap:nextSnap};
          setSavedDedByType(prev=>({
            ...prev,
            [dedType]: currentSnap
          }));
        }else{
          pendingDedSwitchRef.current=null;
        }
        setDedType(nextType);
      }

      function flashDed(kind,index,ok){ setDedFlash({kind,index,ok}); setTimeout(()=>setDedFlash(null),450); }
      function submitDedAnswer(val, index){
        if(!ded || locked) return;
        const setCorrectThenNext = ()=>{
          setDedStack(s=> ded ? [...s, ded] : s);
          spawnDed();
          setMsg("");
          setGuesses([]);
          setCountedWrong(false);
          setLocked(false);
          setRevealed(false);
        };
        const showWrong = (label)=>{ setGuesses(g=> g.includes(label)?g:[...g,label]); setCountedWrong(true); };
        if(ded.type==="year"){
          const ok = (+val)===ded.y; flashDed('year', index, ok);
          if(ok){
            if(!countedWrong && trackDed && tStartRef.current){ const dt=(performance.now()-tStartRef.current)/1000; updateStats(cur=>{cur.timeSum+=dt; cur.timeCnt+=1;}); }
            if(!statsOff && !countedWrong){ updateStats(cur=>{ cur.played+=1; cur.good+=1; cur.streak+=1; if(cur.streak>cur.best) cur.best=cur.streak; }); }
            setCorrectThenNext();
          }else{
            if(!statsOff){ updateStats(cur=>{ cur.played+=1; cur.streak=0; }); }
            showWrong(fmtYear(+val));
          }
        }
        if(ded.type==="month"){
          const ok = (+val)===ded.m; flashDed('month', index, ok);
          if(ok){
            if(!countedWrong && trackDed && tStartRef.current){ const dt=(performance.now()-tStartRef.current)/1000; updateStats(cur=>{cur.timeSum+=dt; cur.timeCnt+=1;}); }
            if(!statsOff && !countedWrong){ updateStats(cur=>{ cur.played+=1; cur.good+=1; cur.streak+=1; if(cur.streak>cur.best) cur.best=cur.streak; }); }
            setCorrectThenNext();
          }else{
            if(!statsOff){ updateStats(cur=>{ cur.played+=1; cur.streak=0; }); }
            showWrong(MONTH[+val-1]);
          }
        }
        if(ded.type==="day"){
          const ok = (+val)===ded.d; flashDed('day', index, ok);
          if(ok){
            if(!countedWrong && trackDed && tStartRef.current){ const dt=(performance.now()-tStartRef.current)/1000; updateStats(cur=>{cur.timeSum+=dt; cur.timeCnt+=1;}); }
            if(!statsOff && !countedWrong){ updateStats(cur=>{ cur.played+=1; cur.good+=1; cur.streak+=1; if(cur.streak>cur.best) cur.best=cur.streak; }); }
            setCorrectThenNext();
          }else{
            if(!statsOff){ updateStats(cur=>{ cur.played+=1; cur.streak=0; }); }
            showWrong(String(+val));
          }
        }
      }

      /* mode changes */
      useEffect(()=>{ arm(); setGuesses([]); setStack([]); setDedStack([]); setMsg(""); setLocked(false); setRevealed(false);
        if(mode==="deduction"){ setPhase('dash'); pendingDedSwitchRef.current=null; setSavedDedByType(blankDedTypeStore()); setDed(null); }
      },[mode]);

      useEffect(()=>{
        if(mode!=="deduction") return;
        setDedFlash(null);
        const pending=pendingDedSwitchRef.current;
        pendingDedSwitchRef.current=null;
        if(!trackDed){
          const snap=pending?.snap || savedDedByType[dedType] || null;
          if(snap && snap.ded){
            setDed(snap.ded);
            setGuesses(snap.guesses||[]);
            setCountedWrong(!!snap.countedWrong);
            setMsg(snap.msg||"");
            setLocked(!!snap.locked);
            setRevealed(!!snap.revealed);
            setCalcPenalty(!!snap.calcPenaltyActive);
            return;
          }
        }
        setMsg("");
        setGuesses([]);
        setLocked(false);
        setRevealed(false);
        setCountedWrong(false);
        spawnDed();
      },[dedType, mode, trackDed, savedDedByType]);

      /* slider handlers — each era updates its own store only */
      const showDash = isTimer(mode) && !active;
      const showDots = (mode==="flash" && active && phase==='hide');

      const dedHeadline = ded ? (ded.type==="year" ? `${MONTH[ded.m-1]} ${ded.d}` : ded.type==="month" ? `${ded.d}, ${fmtYear(ded.y)}` : `${MONTH[ded.m-1]}, ${fmtYear(ded.y)}`) : "—";
      const headline = mode==="deduction" ? dedHeadline : (showDash ? "—" : showDots ? "…" : fmt(date.y,date.m,date.d));

      const baseBtn="w-full rounded-2xl border px-4 py-3 text-base md:text-sm transition shadow-sm select-none";
      const idleBtn="surface-button";
      const optionsDisabled = ((isTimer(mode) && !active) || locked || calcOpen || calcPenaltyActive);
      const centerLastOptionClasses = (index,total)=>{
        if(total<=0 || index!==total-1) return '';
        const classes=new Set();
        const remainderBase = total%3;
        const remainderSm = total%4;
        const remainderMd = total%7;
        if(remainderBase===1){
          classes.add('col-start-2');
          if(remainderSm!==1) classes.add('sm:col-start-auto');
        }
        if(remainderSm===1){
          classes.add('sm:col-span-2');
          classes.add('sm:col-start-2');
          classes.add('md:col-span-1');
        }else if(remainderBase===1){
          classes.add('sm:col-start-auto');
        }
        if(remainderMd===1){
          classes.add('md:col-start-4');
        }else if(remainderSm===1 || remainderBase===1){
          classes.add('md:col-start-auto');
        }
        return Array.from(classes).join(' ');
      };

      const eraControl = (
        <div className="flex rounded-xl overflow-hidden border border-purple-800/60 w-full">
          {[{k:'AD',label:'AD'},{k:'BOTH',label:'AD+BC'},{k:'BC',label:'BC'}].map(seg=>(
            <button key={seg.k} type="button"
              onClick={()=>{ if(era!==seg.k) applyEra(seg.k); }}
              className={`flex-1 px-3 py-1.5 text-sm font-medium ${era===seg.k ? 'btn-solid text-white' : 'surface-toggle text-purple-100/80'} ${seg.k!=='BC'?'border-r border-purple-800/60':''}`}>
              {seg.label}
            </button>
          ))}
        </div>
      );

      const timerSettingControl = (()=>{
        if(mode==="blitz"){
          return (
            <div className="flex items-center gap-2 w-full">
              <span className="text-xs text-purple-300/80">Duration:</span>
              <input type="range" min="15" max="180" step="5" value={blitzSec}
                onChange={e=>{const v=+e.target.value; setBlitzSec(v); if(!active) setBlitzRemain(v);}}
                disabled={active}
                className="accent-purple-500 w-full max-w-[8rem] disabled:opacity-40 disabled:cursor-not-allowed"/>
              <span className="tabular-nums text-xs w-12 text-right">{blitzSec}s</span>
            </div>
          );
        }
        if(mode==="sudden"){
          return (
            <div className="flex items-center gap-2 w-full">
              <span className="text-xs text-purple-300/80 whitespace-nowrap">Per Q:</span>
              <input type="range" min="3" max="20" step="1" value={qSec}
                onChange={e=>{const v=+e.target.value; setQSec(v); if(!active) setQRemain(v);}}
                disabled={active}
                className="accent-purple-500 w-full max-w-[8rem] disabled:opacity-40 disabled:cursor-not-allowed"/>
              <span className="tabular-nums text-xs w-12 text-right">{qSec}s</span>
            </div>
          );
        }
        if(mode==="flash"){
          return (
            <div className="flex items-center gap-2 w-full">
              <input type="range" min="100" max="3000" step="50" value={flashMs}
                onChange={e=>{const next=+e.target.value; setFlashMs(next); if(!active) setFlashRemainMs(next);}}
                disabled={active}
                className="accent-purple-500 w-full max-w-[9rem] disabled:opacity-40 disabled:cursor-not-allowed"/>
              <span className="tabular-nums text-xs w-14 text-right">{flashMs}ms</span>
            </div>
          );
        }
        return null;
      })();

      /* range panel */
      const [rangeOpen,setRangeOpen]=useState(false);
      const [rangeMaxHeight,setRangeMaxHeight]=useState('0px');
      const rangeContentRef=useRef(null);

      const updateRangeMaxHeight = React.useCallback(()=>{
        const inner=rangeContentRef.current;
        if(!inner) return;
        let extra=0;
        if(typeof window!=='undefined'){
          const style=window.getComputedStyle(inner);
          extra=(parseFloat(style.marginTop)||0)+(parseFloat(style.marginBottom)||0);
        }
        setRangeMaxHeight(`${inner.scrollHeight + extra}px`);
      },[]);

      useEffect(()=>{
        if(!rangeOpen){
          setRangeMaxHeight('0px');
          return;
        }
        updateRangeMaxHeight();
      },[rangeOpen, era, minInput, maxInput, minY, maxY, updateRangeMaxHeight]);

      useEffect(()=>{
        if(!rangeOpen) return;
        const onResize=()=>{ updateRangeMaxHeight(); };
        window.addEventListener('resize', onResize);
        return ()=>window.removeEventListener('resize', onResize);
      },[rangeOpen, updateRangeMaxHeight]);
      const RangePanel = (
        <div className="mt-3 rounded-2xl card p-3">
          <button type="button" onClick={()=>setRangeOpen(o=>!o)} aria-expanded={rangeOpen}
                  className="w-full text-left text-sm text-purple-200/90 flex items-center justify-between">
            <span>Year range: <span className="tabular-nums ml-1">{fmtRangeYear(minY)} → {fmtRangeYear(maxY)}</span></span>
            <span className={`text-white/90 text-[7px] leading-none transition-transform ease-in-out ${rangeOpen?'rotate-180':''}`}
                  style={{transitionDuration:'350ms'}}>▼</span>
          </button>
          <div className="expander" style={{maxHeight:rangeMaxHeight}}>
            <div ref={rangeContentRef} className="mt-3 space-y-4 pr-1">
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label htmlFor={minInputId} className="block text-xs text-purple-200/80 mb-1">Start year</label>
                  <div className="relative">
                    <input
                      ref={minInputRef}
                      id={minInputId}
                      type="text"
                      inputMode="numeric"
                      pattern="[0-9]*"
                      value={minInput}
                      onChange={e=>handleMinInputChange(e.target.value)}
                      onBlur={handleMinInputBlur}
                      onKeyDown={handleMinInputKeyDown}
                      onBeforeInput={blockMinusBeforeInput}
                      className="w-full panel rounded-xl px-3 py-2 pr-11 focus:outline-none focus:ring-2 focus:ring-purple-400 tabular-nums"
                    />
                    <button
                      type="button"
                      onClick={()=>toggleMinSign()}
                      tabIndex={era==='BOTH'?0:-1}
                      className={`absolute right-3 top-1/2 -translate-y-1/2 text-[11px] font-semibold uppercase text-purple-200/80 focus:outline-none transition-colors ${era==='BOTH'?'cursor-pointer hover:text-purple-100':'pointer-events-none'}`}
                      aria-label={era==='BOTH'?`Toggle start year between AD and BC (currently ${labelForYear(minY)})`:undefined}
                    >
                      {labelForYear(minY)}
                    </button>
                  </div>
                </div>
                <div>
                  <label htmlFor={maxInputId} className="block text-xs text-purple-200/80 mb-1">End year</label>
                  <div className="relative">
                    <input
                      ref={maxInputRef}
                      id={maxInputId}
                      type="text"
                      inputMode="numeric"
                      pattern="[0-9]*"
                      value={maxInput}
                      onChange={e=>handleMaxInputChange(e.target.value)}
                      onBlur={handleMaxInputBlur}
                      onKeyDown={handleMaxInputKeyDown}
                      onBeforeInput={blockMinusBeforeInput}
                      className="w-full panel rounded-xl px-3 py-2 pr-11 focus:outline-none focus:ring-2 focus:ring-purple-400 tabular-nums"
                    />
                    <button
                      type="button"
                      onClick={()=>toggleMaxSign()}
                      tabIndex={era==='BOTH'?0:-1}
                      className={`absolute right-3 top-1/2 -translate-y-1/2 text-[11px] font-semibold uppercase text-purple-200/80 focus:outline-none transition-colors ${era==='BOTH'?'cursor-pointer hover:text-purple-100':'pointer-events-none'}`}
                      aria-label={era==='BOTH'?`Toggle end year between AD and BC (currently ${labelForYear(maxY)})`:undefined}
                    >
                      {labelForYear(maxY)}
                    </button>
                  </div>
                </div>
              </div>
              <p className="text-xs text-purple-300/70">Proleptic Gregorian calendar. Year 0 is not available.</p>
            </div>
          </div>
        </div>
      );

      const showSuddenBar = mode==="sudden";
      const suddenSecondsRaw = Math.max(0, qRemain);
      const suddenSeconds = suddenSecondsRaw<=0.05 ? 0 : suddenSecondsRaw;
      const suddenTimeLabel = formatSecondsLabel(suddenSeconds);
      const suddenPercent = qSec>0 ? Math.max(0, Math.min(100,(Math.max(0,qRemain)/qSec)*100)) : 100;
      const showFlashBar = mode==="flash";
      const flashSecondsRaw = Math.max(0, flashRemainMs)/1000;
      const flashSeconds = flashSecondsRaw<=0.05 ? 0 : flashSecondsRaw;
      const flashTimeLabel = formatSecondsLabel(flashSeconds);
      const flashPercent = flashMs>0 ? Math.max(0, Math.min(100,(Math.max(0,flashRemainMs)/flashMs)*100)) : 100;
      const shouldShowTimerDate = (!isTimer(mode)) || active || showTimerDate;
      const flashHiding = mode==="flash" && active && phase==='hide';
      let timerBlocksReveal = false;
      if(isTimer(mode)){
        if(mode==="flash"){
          if(!showTimerDate){
            if(!active || phase==='dash'){
              timerBlocksReveal = true;
            }else if(phase==='show'){
              timerBlocksReveal = true;
            }else if(flashHiding){
              timerBlocksReveal = false;
            }
          }
        }else{
          timerBlocksReveal = !shouldShowTimerDate;
        }
      }
      const revealDisabled = locked || calcOpen || calcPenaltyActive || timerBlocksReveal;
      const timerBusy = isTimer(mode) && active;
      const calcTarget = React.useMemo(()=>{
        if(mode==="lookup") return null;
        if(mode==="guide") return null;
        if(mode==="deduction"){
          return ded ? {y:ded.y,m:ded.m,d:ded.d} : null;
        }
        return date;
      },[mode,date?.y,date?.m,date?.d, ded?.y, ded?.m, ded?.d]);
      const calcTargetKey = calcTarget ? `${calcTarget.y}-${calcTarget.m}-${calcTarget.d}` : 'none';
      const lookupCalcTargetKey = lookupCalcDate ? `${lookupCalcDate.y}-${lookupCalcDate.m}-${lookupCalcDate.d}` : 'none';

      useEffect(()=>{
        const saved = calcOpenStatesRef.current.has(mode)
          ? !!calcOpenStatesRef.current.get(mode)
          : false;
        const savedPenalty = calcPenaltyStatesRef.current.has(mode)
          ? !!calcPenaltyStatesRef.current.get(mode)
          : false;
        setCalcOpen(saved);
        setCalcPenalty(savedPenalty);
      },[mode]);

      useEffect(()=>{
        const prevMode = prevModeRef.current;
        if(prevMode!==mode){
          prevModeRef.current = mode;
          return;
        }
        setCalcOpen(false);
        calcOpenStatesRef.current.set(mode,false);
        prevModeRef.current = mode;
      },[calcTargetKey, mode]);

      const calcOpenForScroll = mode==="lookup" ? lookupCalcOpen : calcOpen;
      const calcTargetKeyForScroll = mode==="lookup" ? lookupCalcTargetKey : calcTargetKey;

      useEffect(()=>{
        const cancelScheduledScroll = ()=>{
          if(calcScrollRafRef.current!=null){
            cancelAnimationFrame(calcScrollRafRef.current);
            calcScrollRafRef.current=null;
          }
          if(calcScrollTimeoutRef.current!=null){
            clearTimeout(calcScrollTimeoutRef.current);
            calcScrollTimeoutRef.current=null;
          }
        };
        if(!calcOpenForScroll){
          cancelScheduledScroll();
          return cancelScheduledScroll;
        }
        cancelScheduledScroll();
        calcScrollRafRef.current=requestAnimationFrame(()=>{
          calcScrollRafRef.current=null;
          calcScrollTimeoutRef.current=window.setTimeout(()=>{
            calcScrollTimeoutRef.current=null;
            window.scrollTo({top:document.documentElement.scrollHeight,behavior:'smooth'});
          },60);
        });
        return cancelScheduledScroll;
      },[calcOpenForScroll, calcTargetKeyForScroll, mode]);

      /* should reset stats create a new date? */
      function shouldNewOnReset(){
        if(!avgTrackingEnabled && !countedWrong) return false;
        return true;
      }

      const handleResetStats = ()=>{
        const needNew = shouldNewOnReset();
        resetStatsCurrent();
        if(needNew) doNew({skipInactiveMessage:true});
      };

      const applyCalculationPenalty = ()=>{
        setCalcPenalty(true);
        const firstPenalty = !countedWrong;
        if(firstPenalty){
          if(!statsOff){
            updateStats(cur=>{ cur.played+=1; cur.streak=0; });
          }
          if(mode==="blitz"){ setBlitzRoundStats(prev=>({
            ...prev,
            played:prev.played+1
          })); }
        }
        let answerMsg=null;
        if(mode==="deduction" && ded){
          const ans = ded.type==="year" ? fmtYear(ded.y) : ded.type==="month" ? MONTH[ded.m-1] : String(ded.d);
          answerMsg=`Answer: ${ans}.`;
        }else if(mode!=="deduction"){
          answerMsg=`Answer: ${DAY[correct]}.`;
        }
        if(answerMsg){
          setMsg(answerMsg);
        }
        if(isTimer(mode)){
          setActive(false);
          setShowTimerDate(true);
          if(mode==="blitz"){ setBlitzRunning(false); blitzStartRef.current=null; blitzPausedAtRef.current=null; blitzPausedAccRef.current=0; }
          if(mode==="sudden"){ qDeadlineRef.current=null; qPausedAtRef.current=null; qPausedAccRef.current=0; }
          if(mode==="flash"){ clearTimeout(flashTimerRef.current); flashTimerRef.current=null; setPhase('dash'); flashDeadlineRef.current=null; }
        }
        if(!revealed) setRevealed(true);
        if(!countedWrong) setCountedWrong(true);
      };

      const handleCalculationOpenChange = (next)=>{
        if(next){
          applyCalculationPenalty();
        }
        setCalcOpen(next);
        calcOpenStatesRef.current.set(mode,next);
      };

      const handleMethodNewRequest = ()=>{
        if(mode==="deduction"){
          runDeductionRound();
        }else{
          doNew();
        }
      };

      /* Avg toggle click handler (disable/enable) */
      function toggleAvg(disable){
        const modeKey = mode;
        if(!(modeKey==="classic" || modeKey==="deduction" || isTimer(modeKey))) return;
        if(disable){ // turning OFF tracking
          setTrackForMode(modeKey,false);
          tStartRef.current=null;
        }else{       // turning ON tracking -> acts like New (no penalty)
          setTrackForMode(modeKey,true);
          doNew();
          if(isTimer(modeKey)){
            tStartRef.current = active ? performance.now() : null;
          }else{
            tStartRef.current=performance.now();
          }
        }
      }

      return (
        <div className="mx-auto px-4 py-5 w-full max-w-[480px] md:max-w-3xl lg:max-w-4xl">
          {/* Header */}
          <div className={mode==="method"?"sticky top-4 z-30":""}>
            <div className={`flex items-center justify-between gap-4 ${mode==="method"?"card rounded-2xl px-4 py-3 backdrop-blur-md shadow-lg":""}`}>
              <h1 className="text-xl md:text-2xl font-semibold leading-none">Calendar Game</h1>
              <div className="relative">
                <select
                  ref={modeSelectRef}
                  value={mode}
                  onChange={e=>{ __hideErr(); const nextMode=e.target.value; setMode(nextMode); e.target.blur(); modeSelectRef.current?.blur(); }}
                  className="panel rounded-xl px-2.5 py-2 pr-9 text-sm focus:outline-none focus:ring-2 focus:ring-purple-400 appearance-none"
                >
                  <option value="classic">Classic</option>
                  <option value="deduction">Deduction</option>
                  <option value="blitz">Blitz</option>
                  <option value="sudden">Sudden Death</option>
                  <option value="flash">Flash</option>
                  <option value="lookup">Lookup</option>
                  <option value="method">Method</option>
                  <option value="guide">How to Play</option>
                </select>
                <div className="pointer-events-none absolute right-2 top-1/2 -translate-y-1/2 flex flex-col items-center leading-none text-[7px] text-white/90">
                  <span>▲</span><span>▼</span>
                </div>
              </div>
            </div>
          </div>

          {/* Stats/toggles (not on lookup/method) */}
          {mode!=="lookup" && mode!=="method" && mode!=="guide" && (
            <>
              <div className="mt-4 grid grid-cols-4 gap-2 sm:gap-3">
                <Stat
                  label={mode==="blitz"?"Score (round)":"Score"}
                  value={mode==="blitz"?`${blitzRoundStats.good}/${blitzRoundStats.played}`:`${S.good}/${S.played}`}
                  disabled={statsOff}
                  onClick={handleStatsBoxToggle}
                  pressed={statsPressed}
                />
                <Stat
                  label="Accuracy"
                  value={`${S.played?(S.good/S.played*100).toFixed(1):"0.0"}%`}
                  disabled={statsOff}
                  onClick={handleStatsBoxToggle}
                  pressed={statsPressed}
                />
                <StatTwo
                  label="Streak / Longest"
                  left={S.streak}
                  right={S.best}
                  disabled={statsOff}
                  onClick={handleStatsBoxToggle}
                  pressed={statsPressed}
                />
                <Stat
                  label="Avg time (correct)"
                  value={(S.timeCnt?`${(S.timeSum/S.timeCnt).toFixed(2)}s`:"—")}
                  disabled={avgDisabled}
                  onClick={canToggleAvg ? handleAvgStatToggle : undefined}
                  pressed={canToggleAvg ? avgTrackingEnabled : undefined}
                />
              </div>
              <div className="mt-3 grid grid-cols-2 md:grid-cols-4 gap-3 items-stretch">
                <div className="col-span-1 md:col-span-2 flex items-center">
                  {eraControl}
                </div>
                <div className="col-span-1 md:col-span-2 flex justify-end">
                  <button type="button"
                    className="text-sm px-3 py-1.5 rounded-xl btn-solid w-full md:w-auto h-full flex items-center justify-center"
                    onClick={handleResetStats}>Reset stats</button>
                </div>
                {timerSettingControl && (
                  <div className="col-span-2 md:col-span-4 flex items-center">
                    {timerSettingControl}
                  </div>
                )}
              </div>
            </>
          )}

          {/* Year range (not on lookup/method) */}
          {mode!=="lookup" && mode!=="method" && mode!=="guide" && RangePanel}

          {/* MAIN CARD */}
          {mode==="lookup" ? (
            <div className="mt-5">
              <LookupCard
                history={lookupHistory}
                onAddHistory={pushLookupHistory}
                onClearHistory={clearLookupHistory}
                inputValue={lookupInput}
                onInputChange={setLookupInput}
                outputValue={lookupOutput}
                onOutputChange={setLookupOutput}
                calcDate={lookupCalcDate}
                onCalcDateChange={setLookupCalcDate}
                selectedHistoryId={lookupSelectedHistoryId}
                onSelectedHistoryIdChange={setLookupSelectedHistoryId}
                calcOpen={lookupCalcOpen}
                onCalcOpenChange={setLookupCalcOpen}
              />
            </div>
          ) : mode==="method" ? (
            <div className="mt-5">
              <MethodPage/>
            </div>
          ) : mode==="guide" ? (
            <div className="mt-5">
              <GuidePage/>
            </div>
          ) : (
            <div className="mt-5">
            {/* Blitz/Sudden/Flash bars */}
            {mode==="blitz" && (
              <div className="mb-3">
                <div className="flex items-center justify-between text-xs text-purple-200/80 mb-1"><div>Blitz</div><div className="tabular-nums">{formatSecondsLabel(blitzRemain)}</div></div>
                <div className="bar"><span style={{width:`${Math.max(0,Math.min(100,(blitzRemain/blitzSec)*100))}%`}}></span></div>
              </div>
            )}
            {showSuddenBar && (
              <div className="mb-3">
                <div className="flex items-center justify-between text-xs text-purple-200/80 mb-1"><div>Per Q:</div><div className="tabular-nums">{suddenTimeLabel}</div></div>
                <div className="bar"><span style={{width:`${suddenPercent}%`}}></span></div>
              </div>
            )}
            {showFlashBar && (
              <div className="mb-3">
                <div className="flex items-center justify-between text-xs text-purple-200/80 mb-1"><div>Flash</div><div className="tabular-nums">{flashTimeLabel}</div></div>
                <div className="bar"><span style={{width:`${flashPercent}%`}}></span></div>
              </div>
            )}
            {/* ======= CLASSIC / BLITZ / SUDDEN / FLASH ======= */}
            {["classic","blitz","sudden","flash"].includes(mode) && (
              <>
                <div className="mt-4 rounded-2xl panel p-4">
                  <div className="text-center">
                    <div className="text-xs uppercase tracking-widest text-purple-100/80">What day is this?</div>
                    <div className="mt-1 text-3xl md:text-4xl font-bold">{shouldShowTimerDate ? ((mode==="flash"&&active&&phase==='hide')?"…": fmt(date.y,date.m,date.d)) : "—"}</div>
                  </div>
                  <div className={`mt-4 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-7 gap-3 ${optionsDisabled?'opacity-60 pointer-events-none':''}`}>
                    {DAY.map((n,i)=>{
                      const saturdayPosition = i===DAY.length-1
                        ? 'col-span-2 sm:col-span-1 sm:col-start-2 md:col-span-2 md:col-start-2 lg:col-span-1 lg:col-start-auto xl:col-span-1 xl:col-start-auto 2xl:col-span-1 2xl:col-start-auto'
                        : '';
                      return (
                        <button key={n} type="button"
                          onClick={()=>{ submitDoW(i); setInput(""); if(isTouch) document.activeElement?.blur(); }}
                          className={`${baseBtn} ${flash && flash.idx===i ? (flash.type==='good'?'flash-good':'flash-bad')+' border-transparent' : idleBtn} ${saturdayPosition}`}>{n}</button>
                      );
                    })}
                  </div>
                  {(msg || guesses.length>0) && (
                    <div className="mt-4 text-purple-100/90 text-sm">
                      {(guesses.length>0) && (
                        <div className="flex flex-wrap gap-1 items-center"><span className="text-purple-300/80 text-xs mr-1">{mode==="sudden"?"Guess:":"Guesses:"}</span>{guesses.map(g=><span key={g} className="chip">{g}</span>)}</div>
                      )}
                      {msg && (
                        <div className={`${guesses.length>0?'mt-2':''}`}>{msg}</div>
                      )}
                    </div>
                  )}
                </div>

                <div className="mt-4 rounded-2xl panel p-3 space-y-3">
                  <div className="grid grid-cols-4 gap-2 sm:gap-3">
                    {isTimer(mode) ? (
                      !active ? (
                        <button
                          type="button"
                          className="col-span-2 px-6 sm:px-7 py-2 rounded-xl btn-solid text-sm font-medium"
                          onClick={()=>begin()}
                        >Begin</button>
                      ) : (
                        <button
                          type="button"
                          className="col-span-2 px-6 sm:px-7 py-2 rounded-xl bg-rose-600/90 text-white text-sm font-medium"
                          onClick={()=>arm()}
                        >Reset</button>
                      )
                    ) : (
                      <button
                        type="button"
                        className="col-span-2 px-6 sm:px-7 py-2 rounded-xl border surface-button text-sm font-medium"
                        onClick={()=>doNew()}
                      >New</button>
                    )}
                    <button
                      type="button"
                      className={`col-span-1 px-3 py-2 rounded-xl border surface-button text-sm font-medium text-center ${revealDisabled?'opacity-60 pointer-events-none':''}`}
                      onClick={()=>reveal()}
                    >Reveal</button>
                    <button
                      type="button"
                      className={`col-span-1 px-3 py-2 rounded-xl border surface-button text-sm font-medium text-center ${timerBusy?'opacity-60 pointer-events-none':''}`}
                      onClick={()=>goBack()}
                    >Back</button>
                  </div>
                  <MethodBreakdownSection
                    date={calcTarget}
                    open={calcOpen}
                    onOpenChange={handleCalculationOpenChange}
                    onRequestNew={handleMethodNewRequest}
                    className=""
                    contentClassName="mt-3 rounded-2xl thin p-4"
                  />
                </div>
              </>
            )}

            {/* ======= DEDUCTION ======= */}
            {mode==="deduction" && (
              <>
                <div className="mt-3 flex flex-wrap gap-2 justify-center">
                  {["day","month","year"].map(t=>(
                    <button key={t} type="button" onClick={()=>changeDedType(t)}
                      className={`px-3 py-1.5 rounded-xl text-sm font-medium border ${dedType===t?'btn-solid border-purple-500 text-white':'surface-toggle border-purple-800/60 text-purple-100/80'}`}>
                      {t[0].toUpperCase()+t.slice(1)}
                    </button>
                  ))}
                </div>

                <div className="mt-4 rounded-2xl panel p-4">
                  <div className="text-center">
                    <div className="text-xs uppercase tracking-widest text-purple-100/80">
                      {dedType==="year"?"What year is this?":dedType==="month"?"What month is this?":"What day is this?"}
                    </div>
                    <div className="mt-1 text-3xl md:text-4xl font-bold">{ded ? (ded.type==="year"?`${MONTH[ded.m-1]} ${ded.d}`: ded.type==="month"?`${ded.d}, ${fmtYear(ded.y)}` : `${MONTH[ded.m-1]}, ${fmtYear(ded.y)}`) : "—"}</div>
                    {ded && <div className="mt-1 text-lg md:text-xl text-purple-100">Weekday:&nbsp;<span className="font-semibold text-xl">{DAY[ded.w]}</span></div>}
                  </div>

                  <div className={`mt-4 ${(locked||calcOpen||calcPenaltyActive)?'opacity-60 pointer-events-none':''}`}>
                    {ded && ded.type==="year" && (
                      <div className="grid grid-cols-3 gap-2">
                        {ded.options.map((y,idx)=>{
                          const centeredClasses=centerLastOptionClasses(idx,ded.options.length);
                          return (
                            <button key={y} type="button" onClick={()=>submitDedAnswer(y, idx)}
                              className={`${baseBtn} ${idleBtn} py-2 text-sm ${dedFlash&&dedFlash.kind==='year'&&dedFlash.index===idx ? (dedFlash.ok?'flash-good':'flash-bad')+' border-transparent':''} ${centeredClasses}`}>{fmtYear(y)}</button>
                          );
                        })}
                      </div>
                    )}
                    {ded && ded.type==="month" && (
                      <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-7 gap-2">
                        {ded.options.map((mv,idx)=>{
                          const centeredClasses=centerLastOptionClasses(idx,ded.options.length);
                          return (
                            <button key={mv} type="button" onClick={()=>submitDedAnswer(mv, idx)}
                              className={`${baseBtn} ${idleBtn} py-2 text-sm ${dedFlash&&dedFlash.kind==='month'&&dedFlash.index===idx ? (dedFlash.ok?'flash-good':'flash-bad')+' border-transparent':''} ${centeredClasses}`}>{MONTH_ABBR[mv-1]}</button>
                          );
                        })}
                      </div>
                    )}
                    {ded && ded.type==="day" && (
                      <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-7 gap-2">
                        {ded.options.map((dv,idx)=>{
                          const centeredClasses=centerLastOptionClasses(idx,ded.options.length);
                          return (
                            <button key={dv} type="button" onClick={()=>submitDedAnswer(dv, idx)}
                              className={`${baseBtn} ${idleBtn} py-2 text-sm ${dedFlash&&dedFlash.kind==='day'&&dedFlash.index===idx ? (dedFlash.ok?'flash-good':'flash-bad')+' border-transparent':''} ${centeredClasses}`}>{dv}</button>
                          );
                        })}
                      </div>
                    )}
                  </div>

                  {(msg || guesses.length>0) && (
                    <div className="mt-4 text-sm">
                      {guesses.length>0 && (
                        <div className="flex flex-wrap gap-1 items-center"><span className="text-purple-300/80 text-xs mr-1">Guesses:</span>{guesses.map(g=><span key={g} className="chip">{g}</span>)}</div>
                      )}
                      {msg && (
                        <div className={`${guesses.length>0?'mt-2':''}`}>{msg}</div>
                      )}
                    </div>
                  )}
                </div>

                <div className="mt-4 rounded-2xl panel p-3 space-y-3">
                  <div className="grid grid-cols-4 gap-2 sm:gap-3">
                    <button
                      type="button"
                      className="col-span-2 px-6 sm:px-7 py-2 rounded-xl border surface-button text-sm font-medium"
                      onClick={()=>runDeductionRound()}
                    >New</button>
                    <button
                      type="button"
                      className={`col-span-1 px-3 py-2 rounded-xl border surface-button text-sm font-medium text-center ${revealDisabled?'opacity-60 pointer-events-none':''}`}
                      onClick={()=>reveal()}
                    >Reveal</button>
                    <button
                      type="button"
                      className="col-span-1 px-3 py-2 rounded-xl border surface-button text-sm font-medium text-center"
                      onClick={()=>goBack()}
                    >Back</button>
                  </div>
                  <MethodBreakdownSection
                    date={calcTarget}
                    open={calcOpen}
                    onOpenChange={handleCalculationOpenChange}
                    onRequestNew={handleMethodNewRequest}
                    className=""
                    contentClassName="mt-3 rounded-2xl thin p-4"
                  />
                </div>
              </>
            )}
            </div>
          )}
        </div>
      );
    }

    function GuidePage(){
      const sections=[
        {
          key:'classic',
          title:'Classic',
          description:'Practice identifying the weekday with unlimited time. Use New to draw a fresh date, Reveal to check yourself, and Back to revisit the previous card.'
        },
        {
