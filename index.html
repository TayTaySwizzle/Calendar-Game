<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="theme-color" content="#140b22">
  <title>Calendar Game</title>
  <meta name="application-name" content="Calendar Game">
  <meta name="apple-mobile-web-app-title" content="Calendar Game">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{--bg1:#0b0714;--bg2:#140b22}
    body{background:linear-gradient(180deg,var(--bg1),var(--bg2))}
    .card{background:rgba(26,15,43,.85);border:1px solid rgba(120,53,175,.45)}
    .panel{background:rgba(88,28,135,.25);border:1px solid rgba(120,53,175,.45)}
    .thin{border:1px solid rgba(120,53,175,.35)}
    .surface-button{background:rgba(88,28,135,.32);border-color:rgba(120,53,175,.52);transition:background-color .2s ease-in-out}
    .surface-button:hover{background:rgba(88,28,135,.48)}
    .surface-toggle{background:rgba(88,28,135,.24);transition:background-color .2s ease-in-out}
    .surface-toggle:hover{background:rgba(88,28,135,.4)}
    .btn-solid{background:#7c3aed;color:#fff;transition:background-color .2s ease-in-out}
    .btn-solid:hover{background:#6d28d9}
    .btn-solid[aria-disabled="true"],.btn-solid:disabled{opacity:.6;cursor:not-allowed}
    button,input,select{-webkit-tap-highlight-color:transparent}
    button{touch-action:manipulation}
    @keyframes flashPulse{0%{background:var(--bg0)}80%{background:var(--bg0)}100%{background:transparent}}
    .flash-good{--bg0:rgba(16,185,129,.55);animation:flashPulse .45s ease-in-out}
    .flash-bad{--bg0:rgba(239,68,68,.55);animation:flashPulse .45s ease-in-out}
    .chip{background:rgba(120,53,175,.25);border:1px solid rgba(120,53,175,.45);padding:.25rem .5rem;border-radius:.75rem;font-size:12px}
    .bar{height:6px;border-radius:6px;overflow:hidden;background:rgba(120,53,175,.25);border:1px solid rgba(120,53,175,.45)}
    .bar>span{display:block;height:100%;background:linear-gradient(90deg,#a855f7,#7c3aed)}
    .expander{transition:max-height .25s ease-in-out;overflow:hidden;will-change:max-height}
  </style>
</head>
<body class="text-purple-50">
  <div id="root" class="min-h-screen w-full">Loading…</div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="env,react">
    const {useEffect,useMemo,useRef,useState,useCallback} = React;

    const MONTH=["January","February","March","April","May","June","July","August","September","October","November","December"];
    const MONTH_ABBR=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const DAY=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const DOOMSDAY_MONTH={common:[4,0,0,3,5,1,3,6,2,4,0,2],leap:[3,6,0,3,5,1,3,6,2,4,0,2]};

    const METHOD_MONTH_CODES={1:6,2:2,3:2,4:5,5:0,6:3,7:5,8:1,9:4,10:6,11:2,12:4};
    const METHOD_AB_ADVANCED_MAP={
      even:new Map([[0,0],[1,-2],[2,3],[3,1],[4,0],[5,-2],[6,3],[7,1],[8,0],[9,-2]]),
      odd:new Map([[0,3],[1,1],[2,0],[3,-2],[4,3],[5,1],[6,0],[7,-2],[8,3],[9,1]])
    };
    const METHOD_CD_ADVANCED_LEAP_ORDER=[0,4,8,12,16,20,24,28,32,36,40,44,48,52,56,60,64,68,72,76,80,84,88,92,96];
    const METHOD_CD_ADVANCED_LEAP_MAP=new Map([[0,0],[4,-2],[8,3],[12,1],[16,-1],[20,-3],[24,2],[28,0],[32,-2],[36,3],[40,1],[44,-1],[48,-3],[52,2],[56,0],[60,-2],[64,3],[68,1],[72,-1],[76,-3],[80,2],[84,0],[88,-2],[92,3],[96,1]]);
    const METHOD_CD_ADVANCED_ZERO_YEARS=new Set([0,6,17,23,28,34,45,51,56,62,73,79,84,90]);
    const YEAR_OPTION_DEFAULT=9;
    const DAY_OPTION_COUNT=7;
    const MONTH_OPTION_COUNT=7;
    const toAstro=y=>y>0?y:1-Math.abs(y);
    const isLeap=y=>{y=toAstro(y);return y%400===0||(y%4===0&&y%100!==0);};
    const dim=(y,m)=>m===2?(isLeap(y)?29:28):[4,6,9,11].includes(m)?30:31;
    function jdnGregorian(y,m,d){const a=Math.floor((14-m)/12),y2=y+4800-a,m2=m-3+12*a;return d+Math.floor((153*m2+2)/5)+365*y2+Math.floor(y2/4)-Math.floor(y2/100)+Math.floor(y2/400)-32045;}
    const wday=(y,m,d)=>((jdnGregorian(toAstro(y),m,d)+1)%7+7)%7;
    const fmtYear=y=>y>0?String(y):`${Math.abs(y)} BC`;
    const fmt=(y,m,d)=>`${MONTH[m-1]} ${d}, ${fmtYear(y)}`;
    const rint=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
    function randomDate(minY,maxY){for(;;){let y=rint(minY,maxY);if(y===0)continue;let m=rint(1,12),d=rint(1,dim(y,m));if(d<=dim(y,m))return{y,m,d};}}
    const blankDedTypeStore=()=>({year:null,month:null,day:null});
    const normalizeMod7=v=>((v%7)+7)%7;
    const canonicalizeMod=v=>{const m=normalizeMod7(v);return m>3?m-7:m;};

    function calcDayCode(d){const lower=Math.floor(d/7)*7,upper=lower+7,fl=d-lower,fu=d-upper;return Math.abs(fu)<=Math.abs(fl)?fu:fl;}
    function calcCdCode(cd){if(METHOD_CD_ADVANCED_ZERO_YEARS.has(cd))return 0;let base=METHOD_CD_ADVANCED_LEAP_ORDER[0];for(const y of METHOD_CD_ADVANCED_LEAP_ORDER){if(y>cd)break;base=y;}return canonicalizeMod((METHOD_CD_ADVANCED_LEAP_MAP.get(base)??0)+(cd-base));}

    function yearParts(y){const f=((y%10000)+10000)%10000;const a=Math.floor(f/1000),b=Math.floor((f%1000)/100),cd=f%100;return{a,b,cd};}

    function computeMethodSummary({y,m,d}){
      if(!Number.isFinite(y)||y<=0)return null;
      const monthCode=METHOD_MONTH_CODES[m]??null;
      if(monthCode==null)return null;
      const p=yearParts(y);
      const dc=calcDayCode(d);
      const map=p.a%2===0?METHOD_AB_ADVANCED_MAP.even:METHOD_AB_ADVANCED_MAP.odd;
      const abCode=map.get(p.b)??0;
      const cdCode=calcCdCode(p.cd);
      const leapYear=isLeap(y);
      const weekday=DAY[wday(y,m,d)];
      return{monthCode,dayCode:dc,abCode,cdCode,leapYear,weekday};
    }

    const isTouch=typeof window!=="undefined"&&("ontouchstart" in window||navigator.maxTouchPoints>0||matchMedia("(pointer:coarse)").matches);
    const isTimer=m=>m==="blitz"||m==="sudden"||m==="flash";
    const formatSecondsLabel=s=>{if(!Number.isFinite(s))return"0s";const v=Math.max(0,s);if(v<=0.05)return"0s";return`${v.toFixed(1)}s`;};
    const blockMinusKey=e=>{if(e.key==="-"||e.key==="Subtract"||e.key==="Minus")e.preventDefault();};
    const blockMinusBeforeInput=e=>{if(e.data&&e.data.includes("-"))e.preventDefault();};

    const Stat=({label,value,disabled,onClick,pressed,alwaysOn})=>{
      const interactive=typeof onClick==="function"&&!alwaysOn;
      const Tag=interactive?"button":"div";
      const props=interactive?{type:"button",onClick,"aria-pressed":typeof pressed==="boolean"?pressed:undefined,"aria-disabled":disabled||undefined}:{};
      return(<Tag {...props} className={`px-2.5 py-1.5 rounded-xl panel text-center flex flex-col items-center h-full${disabled?" opacity-60":""}${interactive?" cursor-pointer hover:bg-purple-900/40 transition-colors":""}`}><div className="text-[11px] text-purple-200/80 text-center leading-tight flex items-center justify-center min-h-[1.65rem]"><span>{label}</span></div><div className="mt-auto pt-0.5 text-base font-semibold tabular-nums">{disabled?"—":value}</div></Tag>);
    };
    const StatTwo=({label,left,right,disabled,onClick,pressed,alwaysOn})=>{
      const interactive=typeof onClick==="function"&&!alwaysOn;
      const Tag=interactive?"button":"div";
      const props=interactive?{type:"button",onClick,"aria-pressed":typeof pressed==="boolean"?pressed:undefined,"aria-disabled":disabled||undefined}:{};
      return(<Tag {...props} className={`px-2.5 py-1.5 rounded-xl panel text-center flex flex-col items-center h-full${disabled?" opacity-60":""}${interactive?" cursor-pointer hover:bg-purple-900/40 transition-colors":""}`}><div className="text-[11px] text-purple-200/80 text-center leading-tight flex items-center justify-center min-h-[1.65rem]"><span>{label}</span></div><div className="mt-auto pt-0.5 text-base font-semibold tabular-nums">{disabled?"—":`${left}/${right}`}</div></Tag>);
    };

    /* ===== AoX Mode ===== */
    function AoxMode({minY,maxY}){
      const [aoxN,setAoxN]=useState("10");
      const [mistakesOk,setMistakesOk]=useState(false);
      const [oneByOne,setOneByOne]=useState(false);
      const [date,setDate]=useState(()=>randomDate(minY,maxY));
      const [phase,setPhase]=useState("idle"); // idle | running | done | failed
      const [shown,setShown]=useState(false); // one-by-one: date visible
      const [times,setTimes]=useState([]);
      const [attempts,setAttempts]=useState(0);
      const [guesses,setGuesses]=useState([]);
      const [msg,setMsg]=useState("");
      const [flash,setFlash]=useState(null);
      const [calcOpen,setCalcOpen]=useState(false);
      const [calcPenaltyActive,setCalcPenaltyActive]=useState(false);
      const tStartRef=useRef(null);
      const correct=useMemo(()=>wday(date.y,date.m,date.d),[date]);
      const n=Math.max(1,parseInt(aoxN)||10);
      // best per (n, mistakesOk) key stored in ref so it persists across resets within same settings
      const bestRef=useRef({});
      const bestKey=`${n}|${mistakesOk}`;
      const bestTime=bestRef.current[bestKey]??null;

      const aoLabel=`Ao${n}`;
      const currentAvg=times.length>0?(times.reduce((a,b)=>a+b,0)/times.length):null;
      const doneCount=times.length;
      const locked=phase==="done"||phase==="failed";
      const running=phase==="running";

      function reset(){
        setPhase("idle");setShown(false);setTimes([]);setAttempts(0);
        setGuesses([]);setMsg("");setFlash(null);setCalcOpen(false);setCalcPenaltyActive(false);
        setDate(randomDate(minY,maxY));tStartRef.current=null;
      }

      function startOrContinue(){
        if(phase==="idle"){setPhase("running");setShown(true);tStartRef.current=performance.now();}
        else if(phase==="running"&&!shown){setShown(true);setGuesses([]);setMsg("");setCalcPenaltyActive(false);tStartRef.current=performance.now();}
      }

      function nextDate(){
        setDate(randomDate(minY,maxY));setGuesses([]);setMsg("");
        setCalcOpen(false);setCalcPenaltyActive(false);
        if(oneByOne){setShown(false);}
        tStartRef.current=oneByOne?null:performance.now();
      }

      function handleCorrect(idx){
        setFlash({type:"good",idx});setTimeout(()=>setFlash(null),450);
        const dt=(performance.now()-(tStartRef.current??performance.now()))/1000;
        const newTimes=[...times,dt];
        setTimes(newTimes);
        setAttempts(a=>a+1);
        if(newTimes.length>=n){
          const avg=newTimes.reduce((a,b)=>a+b,0)/newTimes.length;
          if(bestRef.current[bestKey]==null||avg<bestRef.current[bestKey])bestRef.current[bestKey]=avg;
          setMsg(`${aoLabel} complete!`);setPhase("done");
        }else{
          nextDate();
        }
      }

      function handleWrong(idx){
        setFlash({type:"bad",idx});setTimeout(()=>setFlash(null),450);
        setAttempts(a=>a+1);
        if(!mistakesOk){
          setMsg(`Wrong! Answer: ${DAY[correct]}. Run failed.`);setPhase("failed");
        }else{
          setGuesses(g=>g.includes(DAY[idx])?g:[...g,DAY[idx]]);
        }
      }

      function submitDoW(idx){
        if(!running||locked||calcOpen||calcPenaltyActive)return;
        if(oneByOne&&!shown)return;
        if(idx===correct)handleCorrect(idx);else handleWrong(idx);
      }

      function handleOverwrite(){
        if(!calcPenaltyActive&&guesses.length===0)return;
        // undo last wrong: restore a time slot
        const dt=(performance.now()-(tStartRef.current??performance.now()))/1000;
        const newTimes=[...times,dt];
        setTimes(newTimes);
        setCalcPenaltyActive(false);
        if(newTimes.length>=n){
          const avg=newTimes.reduce((a,b)=>a+b,0)/newTimes.length;
          if(bestRef.current[bestKey]==null||avg<bestRef.current[bestKey])bestRef.current[bestKey]=avg;
          setMsg(`${aoLabel} complete!`);setPhase("done");
        }else{
          nextDate();
        }
      }

      const openCalc=()=>{
        if(!running||locked)return;
        setCalcPenaltyActive(true);
        setCalcOpen(true);
        if(!mistakesOk){setMsg(`Answer: ${DAY[correct]}. Run failed.`);setPhase("failed");}
        else setMsg(`Answer: ${DAY[correct]}.`);
      };

      const calcTarget=useMemo(()=>date,[date.y,date.m,date.d]);
      const overwriteAvail=(phase==="running")&&(guesses.length>0||calcPenaltyActive)&&!locked;
      const optionsDisabled=locked||calcOpen||calcPenaltyActive||(oneByOne&&!shown)||(phase==="idle");

      return(
        <div className="mt-5">
          {/* Settings row */}
          <div className="rounded-2xl card p-3 flex flex-wrap gap-3 items-center justify-between">
            <div className="flex items-center gap-2 text-sm">
              <span className="text-purple-200/80">{aoLabel}</span>
              <input type="text" inputMode="numeric" value={aoxN} onChange={e=>setAoxN(e.target.value)} onBlur={()=>setAoxN(String(Math.max(1,parseInt(aoxN)||10)))} className="panel rounded-xl px-2 py-1 w-16 text-center tabular-nums focus:outline-none focus:ring-2 focus:ring-purple-400" disabled={running&&phase!=="idle"}/>
              <span className="text-purple-200/60 text-xs">Best: {bestTime!=null?`${bestTime.toFixed(2)}s`:"—"}</span>
            </div>
            <div className="flex items-center gap-3 text-sm">
              <button type="button" onClick={()=>{if(!running)setMistakesOk(v=>!v);}} className={`px-2.5 py-1 rounded-xl text-xs font-medium border ${mistakesOk?"btn-solid border-purple-500":"surface-toggle border-purple-800/60 text-purple-100/80"}`}>Mistakes OK</button>
              <button type="button" onClick={()=>{if(!running)setOneByOne(v=>!v);}} className={`px-2.5 py-1 rounded-xl text-xs font-medium border ${oneByOne?"btn-solid border-purple-500":"surface-toggle border-purple-800/60 text-purple-100/80"}`}>One-by-one</button>
            </div>
          </div>

          {/* Stats row */}
          <div className="mt-3 grid grid-cols-4 gap-2">
            <Stat alwaysOn label="Score" value={`${doneCount}/${n}`}/>
            <Stat alwaysOn label="Accuracy" value={attempts>0?`${(doneCount/attempts*100).toFixed(1)}%`:"0.0%"}/>
            <Stat alwaysOn label="Avg time" value={currentAvg!=null?`${currentAvg.toFixed(2)}s`:"—"}/>
            <Stat alwaysOn label={`Best ${aoLabel}`} value={bestTime!=null?`${bestTime.toFixed(2)}s`:"—"}/>
          </div>

          {/* Date card */}
          <div className="mt-3 rounded-2xl panel p-4">
            <div className="text-center">
              <div className="text-xs uppercase tracking-widest text-purple-100/80">What day is this?</div>
              <div className="mt-1 text-3xl font-bold">{phase==="idle"?"—":(oneByOne&&!shown)?"—":fmt(date.y,date.m,date.d)}</div>
            </div>
            <div className={`mt-4 grid grid-cols-2 gap-3 ${optionsDisabled?"opacity-60 pointer-events-none":""}`}>
              {DAY.map((n,i)=>{
                const last=i===DAY.length-1?"col-span-2":"";
                return(<button key={n} type="button" onClick={()=>submitDoW(i)} className={`w-full rounded-2xl border px-4 py-3 text-base transition shadow-sm select-none ${flash&&flash.idx===i?(flash.type==="good"?"flash-good":"flash-bad")+" border-transparent":"surface-button"} ${last}`}>{n}</button>);
              })}
            </div>
            {(msg||guesses.length>0)&&(
              <div className="mt-4 text-sm text-purple-100/90">
                {guesses.length>0&&(<div className="flex flex-wrap gap-1 items-center mb-2"><span className="text-purple-300/80 text-xs mr-1">Guesses:</span>{guesses.map(g=><span key={g} className="chip">{g}</span>)}</div>)}
                {msg&&<div>{msg}</div>}
              </div>
            )}
          </div>

          {/* Buttons */}
          <div className="mt-4 rounded-2xl panel p-3 space-y-3">
            <div className="grid grid-cols-4 gap-2">
              {phase==="idle"?(
                <button type="button" className="col-span-2 px-6 py-2 rounded-xl btn-solid text-sm font-medium" onClick={startOrContinue}>Begin</button>
              ):phase==="running"&&oneByOne&&!shown?(
                <button type="button" className="col-span-2 px-6 py-2 rounded-xl btn-solid text-sm font-medium" onClick={startOrContinue}>Continue</button>
              ):locked?(
                <button type="button" className="col-span-2 px-6 py-2 rounded-xl bg-rose-600/90 text-white text-sm font-medium" onClick={reset}>Reset</button>
              ):(
                <button type="button" className="col-span-2 px-6 py-2 rounded-xl bg-rose-600/90 text-white text-sm font-medium" onClick={reset}>Reset</button>
              )}
              <button type="button" className={`col-span-1 px-3 py-2 rounded-xl border surface-button text-sm font-medium text-center ${locked||phase==="idle"?"opacity-60 pointer-events-none":""}`} onClick={()=>{if(!locked&&phase!=="idle")openCalc();}}>Reveal</button>
              <button type="button" className={`col-span-1 px-3 py-2 rounded-xl border surface-button text-sm font-medium text-center ${!overwriteAvail?"opacity-60 pointer-events-none":""}`} onClick={handleOverwrite}>Overwrite</button>
            </div>
            <MethodBreakdownSection date={calcTarget} open={calcOpen} onOpenChange={next=>{if(!next)setCalcOpen(false);}} className="" contentClassName="mt-3 rounded-2xl thin p-4"/>
          </div>
        </div>
      );
    }

    /* ===== Main App ===== */
    function App(){
      const [mode,setMode]=useState("classic");
      const modeSelectRef=useRef(null);
      const [minY,setMinY]=useState(1),[maxY,setMaxY]=useState(10000);
      const [minInput,setMinInput]=useState("1");
      const [maxInput,setMaxInput]=useState("10000");
      const minInputRef=useRef(null),maxInputRef=useRef(null);
      const [date,setDate]=useState(()=>randomDate(1,10000));
      const [stack,setStack]=useState([]),[dedStack,setDedStack]=useState([]);
      const correct=useMemo(()=>wday(date.y,date.m,date.d),[date]);
      const [guesses,setGuesses]=useState([]);
      const [msg,setMsg]=useState("");
      const [locked,setLocked]=useState(false);
      const [revealed,setRevealed]=useState(false);
      const [countedWrong,setCountedWrong]=useState(false);
      const [calcOpen,setCalcOpen]=useState(false);
      const [calcPenaltyActive,setCalcPenaltyActive]=useState(false);
      const calcOpenStatesRef=useRef(new Map());
      const calcPenaltyStatesRef=useRef(new Map());
      const calcScrollRafRef=useRef(null);
      const calcScrollTimeoutRef=useRef(null);
      const rangeRefreshPendingRef=useRef(false);
      const [savedClassicState,setSavedClassicState]=useState(null);
      const [savedDedByType,setSavedDedByType]=useState(()=>blankDedTypeStore());
      const blankStats=()=>({played:0,good:0,streak:0,best:0,timeSum:0,timeCnt:0});
      const blankStatsByEra=()=>({AD:blankStats()});
      const [statsByMode,setStatsByMode]=useState({classic:blankStatsByEra(),blitz:blankStatsByEra(),sudden:blankStatsByEra(),flash:blankStatsByEra(),deduction:blankStatsByEra()});
      const [blitzRoundStats,setBlitzRoundStats]=useState(()=>blankStats());
      const S=(statsByMode[mode]?.AD)||blankStats();
      const [statsOff,setStatsOff]=useState(false);
      const [trackClassic,setTrackClassic]=useState(false);
      const [trackDed,setTrackDed]=useState(false);
      const tStartRef=useRef(null);
      const [flash,setFlash]=useState(null);
      const [blitzSec,setBlitzSec]=useState(60),[blitzRemain,setBlitzRemain]=useState(60),[blitzRunning,setBlitzRunning]=useState(false);
      const blitzStartRef=useRef(null),blitzPausedAtRef=useRef(null),blitzPausedAccRef=useRef(0);
      const [qSec,setQSec]=useState(7),[qRemain,setQRemain]=useState(7);
      const qDeadlineRef=useRef(null),qPausedAtRef=useRef(null),qPausedAccRef=useRef(0);
      const [active,setActive]=useState(false);
      const [showTimerDate,setShowTimerDate]=useState(false);
      const [flashMs,setFlashMs]=useState(1200);
      const [flashPhase,setFlashPhase]=useState("dash");
      const flashTimerRef=useRef(null);
      const [flashRemainMs,setFlashRemainMs]=useState(1200);
      const flashDeadlineRef=useRef(null);
      const endFlashPhase=useCallback(()=>{setFlashPhase("hide");flashDeadlineRef.current=null;setFlashRemainMs(0);flashTimerRef.current=null;},[]);
      const [dedType,setDedType]=useState("day");
      const [ded,setDed]=useState(null);
      const [dedFlash,setDedFlash]=useState(null);
      const [lookupHistory,setLookupHistory]=useState([]);
      const [lookupInput,setLookupInput]=useState("");
      const [lookupOutput,setLookupOutput]=useState("");
      const [lookupCalcDate,setLookupCalcDate]=useState(null);
      const [lookupSelectedHistoryId,setLookupSelectedHistoryId]=useState(null);
      const [lookupCalcOpen,setLookupCalcOpen]=useState(false);
      const prevLookupCalcKeyRef=useRef("none");
      useEffect(()=>{const pk=prevLookupCalcKeyRef.current,nk=lookupCalcDate?`${lookupCalcDate.y}-${lookupCalcDate.m}-${lookupCalcDate.d}`:"none";if(pk!==nk){if(pk!=="none")setLookupCalcOpen(false);prevLookupCalcKeyRef.current=nk;}},[lookupCalcDate]);
      const pendingDedSwitchRef=useRef(null);
      const prevModeRef=useRef(mode);

      useEffect(()=>{setShowTimerDate(false);},[mode]);

      const updateStats=mutator=>{setStatsByMode(prev=>{const ms={...(prev[mode]||blankStatsByEra())};const es={...(ms.AD||blankStats())};mutator(es);return{...prev,[mode]:{...ms,AD:es}};});};
      const resetStatsCurrent=()=>{setStatsByMode(prev=>{const ms={...(prev[mode]||blankStatsByEra())};return{...prev,[mode]:{...ms,AD:blankStats()}};});};
      const setCalcPenalty=v=>{setCalcPenaltyActive(v);calcPenaltyStatesRef.current.set(mode,v);};

      const prevTrackClassic=useRef(trackClassic);
      useEffect(()=>{if(!prevTrackClassic.current&&trackClassic)tStartRef.current=performance.now();prevTrackClassic.current=trackClassic;},[trackClassic]);
      const prevTrackDed=useRef(trackDed);
      useEffect(()=>{
        if(!prevTrackDed.current&&trackDed){tStartRef.current=performance.now();setSavedDedByType(blankDedTypeStore());}

      useEffect(()=>{if(!rangeOpen)return;const onR=()=>updateRangeH();window.addEventListener("resize",onR);return()=>window.removeEventListener("resize",onR);},[rangeOpen,updateRangeH]);

        setCalcPenalty(true);const fp=!countedWrong;
        if(fp){if(!statsOff)updateStats(c=>{c.played+=1;c.streak=0;});if(mode==="blitz")setBlitzRoundStats(p=>({...p,played:p.played+1}));}
        let am=null;if(mode==="deduction"&&ded){const ans=ded.type==="year"?fmtYear(ded.y):ded.type==="month"?MONTH[ded.m-1]:String(ded.d);am=`Answer: ${ans}.`;}else if(mode!=="deduction")am=`Answer: ${DAY[correct]}.`;

                </div>
                {(msg||guesses.length>0)&&(<div className="mt-4 text-purple-100/90 text-sm">{guesses.length>0&&(<div className="flex flex-wrap gap-1 items-center"><span className="text-purple-300/80 text-xs mr-1">{mode==="sudden"?"Guess:":"Guesses:"}</span>{guesses.map(g=><span key={g} className="chip">{g}</span>)}</div>)}{msg&&(<div className={guesses.length>0?"mt-2":""}>{msg}</div>)}</div>)}
              </div>
              <div className="mt-4 rounded-2xl panel p-3 space-y-3">
                <div className="grid grid-cols-4 gap-2">
                  {isTimer(mode)?(!active?(<button type="button" className="col-span-2 px-6 py-2 rounded-xl btn-solid text-sm font-medium" onClick={begin}>Begin</button>):(<button type="button" className="col-span-2 px-6 py-2 rounded-xl bg-rose-600/90 text-white text-sm font-medium" onClick={arm}>Reset</button>)):(<button type="button" className="col-span-2 px-6 py-2 rounded-xl border surface-button text-sm font-medium" onClick={()=>doNew()}>New</button>)}
                  <button type="button" className={`col-span-1 px-3 py-2 rounded-xl border surface-button text-sm font-medium text-center ${timerBusy?"opacity-60 pointer-events-none":""}`} onClick={goBack}>Back</button>
                  <button type="button" className={`col-span-1 px-3 py-2 rounded-xl border surface-button text-sm font-medium text-center ${revealDisabled?"opacity-60 pointer-events-none":""}`} onClick={reveal}>Reveal</button>
                  <button type="button" className={`col-span-2 px-3 py-2 rounded-xl border surface-button text-sm font-medium text-center ${!overwriteAvail?"opacity-60 pointer-events-none":""}`} onClick={overwrite}>Overwrite</button>
                </div>
                <MethodBreakdownSection date={calcTarget} open={calcOpen} onOpenChange={handleCalcOpenChange} className="" contentClassName="mt-3 rounded-2xl thin p-4"/>
              </div>
            </div>

          {mode==="deduction"&&(
            <div className="mt-5">
              <div className="mt-3 flex flex-wrap gap-2 justify-center">
                {["day","month","year"].map(t=>(<button key={t} type="button" onClick={()=>changeDedType(t)} className={`px-3 py-1.5 rounded-xl text-sm font-medium border ${dedType===t?"btn-solid border-purple-500 text-white":"surface-toggle border-purple-800/60 text-purple-100/80"}`}>{t[0].toUpperCase()+t.slice(1)}</button>))}
              </div>
              <div className="mt-4 rounded-2xl panel p-4">
                <div className="text-center">
                  <div className="text-xs uppercase tracking-widest text-purple-100/80">{dedType==="year"?"What year is this?":dedType==="month"?"What month is this?":"What day is this?"}</div>
                  <div className="mt-1 text-3xl font-bold">{ded?(ded.type==="year"?`${MONTH[ded.m-1]} ${ded.d}`:ded.type==="month"?`${ded.d}, ${fmtYear(ded.y)}`:`${MONTH[ded.m-1]}, ${fmtYear(ded.y)}`):"—"}</div>
                  {ded&&<div className="mt-1 text-lg text-purple-100">Weekday: <span className="font-semibold">{DAY[ded.w]}</span></div>}
                </div>
                <div className={`mt-4 ${(locked||calcOpen||calcPenaltyActive)?"opacity-60 pointer-events-none":""}`}>
                  {ded&&ded.type==="year"&&(<div className="grid grid-cols-3 gap-2">{ded.options.map((y,idx)=>(<button key={y} type="button" onClick={()=>submitDedAnswer(y,idx)} className={`${baseBtn} ${idleBtn} py-2 text-sm ${dedFlash&&dedFlash.kind==="year"&&dedFlash.index===idx?(dedFlash.ok?"flash-good":"flash-bad")+" border-transparent":""} ${centerLastOpt(idx,ded.options.length)}`}>{fmtYear(y)}</button>))}</div>)}
                  {ded&&ded.type==="month"&&(<div className="grid grid-cols-3 gap-2">{ded.options.map((mv,idx)=>(<button key={mv} type="button" onClick={()=>submitDedAnswer(mv,idx)} className={`${baseBtn} ${idleBtn} py-2 text-sm ${dedFlash&&dedFlash.kind==="month"&&dedFlash.index===idx?(dedFlash.ok?"flash-good":"flash-bad")+" border-transparent":""} ${centerLastOpt(idx,ded.options.length)}`}>{MONTH_ABBR[mv-1]}</button>))}</div>)}
                  {ded&&ded.type==="day"&&(<div className="grid grid-cols-3 gap-2">{ded.options.map((dv,idx)=>(<button key={dv} type="button" onClick={()=>submitDedAnswer(dv,idx)} className={`${baseBtn} ${idleBtn} py-2 text-sm ${dedFlash&&dedFlash.kind==="day"&&dedFlash.index===idx?(dedFlash.ok?"flash-good":"flash-bad")+" border-transparent":""} ${centerLastOpt(idx,ded.options.length)}`}>{dv}</button>))}</div>)}
                </div>
                {(msg||guesses.length>0)&&(<div className="mt-4 text-sm">{guesses.length>0&&(<div className="flex flex-wrap gap-1 items-center"><span className="text-purple-300/80 text-xs mr-1">Guesses:</span>{guesses.map(g=><span key={g} className="chip">{g}</span>)}</div>)}{msg&&(<div className={guesses.length>0?"mt-2":""}>{msg}</div>)}</div>)}
              </div>
              <div className="mt-4 rounded-2xl panel p-3 space-y-3">
                <div className="grid grid-cols-4 gap-2">
                  <button type="button" className="col-span-2 px-6 py-2 rounded-xl border surface-button text-sm font-medium" onClick={runDeductionRound}>New</button>
                  <button type="button" className={`col-span-1 px-3 py-2 rounded-xl border surface-button text-sm font-medium text-center`} onClick={goBack}>Back</button>
                  <button type="button" className={`col-span-1 px-3 py-2 rounded-xl border surface-button text-sm font-medium text-center ${revealDisabled?"opacity-60 pointer-events-none":""}`} onClick={reveal}>Reveal</button>
                  <button type="button" className={`col-span-2 px-3 py-2 rounded-xl border surface-button text-sm font-medium text-center ${!overwriteAvail?"opacity-60 pointer-events-none":""}`} onClick={overwrite}>Overwrite</button>
                </div>
                <MethodBreakdownSection date={calcTarget} open={calcOpen} onOpenChange={handleCalcOpenChange} className="" contentClassName="mt-3 rounded-2xl thin p-4"/>
              </div>
            </div>
          )}
        </div>
      );
    }

    function GuidePage(){
      const sections=[
        {key:"classic",title:"Classic",description:"Practice identifying the weekday with unlimited time. Use New to draw a fresh date, Reveal to check yourself, and Back to revisit the previous card."},
        {key:"aox",title:"AoX",description:"Grind average-of-X personal bests. Set how many solves to average, toggle whether mistakes are allowed, and optionally hide dates between solves with one-by-one mode."},
        {key:"deduction",title:"Deduction",description:"Pick whether to guess the day, month, or year from curated options. Each round focuses on one piece of the date."},
        {key:"blitz",title:"Blitz",description:"A 60-second sprint where you answer as many dates as possible."},
        {key:"sudden",title:"Sudden Death",description:"Set a per-question countdown and race the clock. A wrong answer or hitting zero ends the run immediately."},
        {key:"flash",title:"Flash",description:"Memorise the date during a brief reveal, then answer once it disappears."},
        {key:"lookup",title:"Lookup",description:"Type a date to instantly see its weekday. History keeps recent queries."}
      ];
      return(<div className="space-y-4 text-sm text-purple-100/85 mt-5">{sections.map(s=>(<div key={s.key} className="rounded-2xl panel p-4 space-y-1"><h3 className="text-base font-semibold text-purple-50">{s.title}</h3><p className="text-[13px] text-purple-200/80 leading-relaxed">{s.description}</p></div>))}</div>);
    }

    function MethodExplanation({date}){
      const summary=React.useMemo(()=>date?computeMethodSummary(date):null,[date?.y,date?.m,date?.d]);
      if(!date)return<div className="text-sm text-purple-200/80">Pick a date first.</div>;
      if(!summary)return<div className="text-sm text-purple-100/80">Show calculations is only supported for AD dates.</div>;
      const codes=[
        {label:"Month",italic:false,value:summary.monthCode},
        {label:"Day",italic:false,value:summary.dayCode},
        {label:"ab",italic:true,value:summary.abCode},
        {label:"cd",italic:true,value:summary.cdCode},
        {label:"Leap",italic:false,value:summary.leapYear?"Yes":"No"},
      ];
      return(
        <div className="grid grid-cols-5 gap-2 text-center text-sm">
          {codes.map((c,i)=>(
            <div key={i} className="flex flex-col gap-1">
              <div className="text-[11px] text-purple-200/80">{c.italic?<i>{c.label}</i>:c.label}</div>
              <div className="font-semibold tabular-nums text-purple-50">{c.value}</div>
            </div>
          ))}
        </div>
      );
    }

    function MethodBreakdownSection({date,open:controlledOpen,onOpenChange,className,contentClassName}){
      const isControlled=typeof controlledOpen==="boolean"&&typeof onOpenChange==="function";
      const [internalOpen,setInternalOpen]=React.useState(false);
      const key=date?`${date.y}-${date.m}-${date.d}`:"";
      React.useEffect(()=>{if(!isControlled)setInternalOpen(false);},[key,isControlled]);
      const hasDate=!!date;
      React.useEffect(()=>{if(hasDate)return;if(isControlled){if(controlledOpen)onOpenChange(false);}else setInternalOpen(false);},[hasDate,isControlled,controlledOpen,onOpenChange]);
      const open=hasDate?(isControlled?controlledOpen:internalOpen):false;
      const toggle=()=>{if(!hasDate)return;if(isControlled)onOpenChange(!open);else setInternalOpen(v=>!v);};
      const outerClass=className??"mt-5";
      const buttonClass=`w-full px-4 py-2 rounded-xl btn-solid text-sm font-medium${!hasDate?" opacity-60 cursor-not-allowed pointer-events-none":""}`;
      const contentClass=contentClassName??"mt-3 rounded-2xl panel p-4";
      return(
        <div className={outerClass||undefined}>
          <button type="button" onClick={toggle} className={buttonClass} aria-disabled={!hasDate}>{open?"Hide calculations":"Show calculations"}</button>
          {open&&hasDate&&(<div className={contentClass}><MethodExplanation date={date}/></div>)}
        </div>
      );
    }

    function LookupCard({history=[],onAddHistory,onClearHistory,inputValue="",onInputChange,outputValue="",onOutputChange,calcDate,onCalcDateChange,selectedHistoryId,onSelectedHistoryIdChange,calcOpen=false,onCalcOpenChange}){
      const li=typeof inputValue==="string"?inputValue:String(inputValue??"");
      const sli=typeof onInputChange==="function"?onInputChange:()=>{};
      const lo=typeof outputValue==="string"?outputValue:String(outputValue??"");
      const slo=typeof onOutputChange==="function"?onOutputChange:()=>{};
      const cdv=calcDate??null;const scd=typeof onCalcDateChange==="function"?onCalcDateChange:()=>{};
      const sid=selectedHistoryId??null;const ssid=typeof onSelectedHistoryIdChange==="function"?onSelectedHistoryIdChange:()=>{};
      const cov=!!calcOpen;const sco=typeof onCalcOpenChange==="function"?next=>onCalcOpenChange(!!next):()=>{};
      function isLeapL(y){y=y>0?y:1-Math.abs(y);return y%400===0||(y%4===0&&y%100!==0);}
      function dimL(y,m){return m===2?(isLeapL(y)?29:28):[4,6,9,11].includes(m)?30:31;}
      function wdayL(y,m,d){function jdn(y,m,d){const a=Math.floor((14-m)/12),y2=y+4800-a,m2=m-3+12*a;return d+Math.floor((153*m2+2)/5)+365*y2+Math.floor(y2/4)-Math.floor(y2/100)+Math.floor(y2/400)-32045;}return((jdn(y>0?y:1-Math.abs(y),m,d)+1)%7+7)%7;}
      function runLookup(){
        const s=li.trim();const match=/^(-?\d{1,2})\/(\d{1,2})\/(-?\d{1,5})$/.exec(s);
        if(!match){slo("Enter date as month/day/year, e.g. 7/4/1776.");return;}
        let mm=+match[1],dd=+match[2],yy=+match[3];
        if(yy===0){slo("No year 0. Use −1 for 1 BC.");return;}
        if(yy<-10000||yy>10000){slo("Year must be −10000 to 10000.");return;}
        if(mm<1||mm>12){slo("Month must be 1–12.");return;}
        const maxd=dimL(yy,mm);if(dd<1||dd>maxd){slo(`Day must be 1–${maxd} for ${MONTH[mm-1]}.`);return;}
        const d=DAY[wdayL(yy,mm,dd)];
        const rt=`${MONTH[mm-1]} ${dd}, ${fmtYear(yy)} is a ${d}.`;
        const entry={id:`${Date.now().toString(36)}-${Math.random().toString(36).slice(2,8)}`,label:`${MONTH[mm-1]} ${dd}, ${fmtYear(yy)}`,weekday:d,result:rt,y:yy,m:mm,d:dd};
        slo(rt);scd({y:yy,m:mm,d:dd});ssid(entry.id);if(onAddHistory)onAddHistory(entry);
      }
      function clearLookup(){sli("");if(document.activeElement)document.activeElement.blur();slo("");scd(null);ssid(null);sco(false);}
      const entries=Array.isArray(history)?history:[];
      React.useEffect(()=>{if(!sid)return;if(!entries.some(e=>e.id===sid)){ssid(null);scd(null);slo("");sco(false);}},[entries,sid]);
      const selEntry=entry=>{if(!entry)return;ssid(entry.id);slo(entry?.result||"");if(entry&&typeof entry.y==="number")scd({y:entry.y,m:entry.m,d:entry.d});if(document.activeElement)document.activeElement.blur();};
      const clearHist=()=>{if(onClearHistory)onClearHistory();ssid(null);scd(null);slo("");sco(false);};
      const hasHist=entries.length>0;
      return(
        <div className="mt-1 space-y-4">
          <div className="rounded-2xl panel p-4 space-y-4">
            <div className="flex flex-wrap items-stretch gap-2">
              <input value={li} onChange={e=>sli(e.target.value)} placeholder="e.g., 7/4/1776" className="panel rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-400 flex-1 min-w-0"/>
              <button type="button" onClick={runLookup} className="px-4 py-2 rounded-xl btn-solid text-sm font-medium">Lookup</button>
              <button type="button" onClick={clearLookup} className="px-4 py-2 rounded-xl bg-zinc-700 text-white text-sm font-medium">Clear</button>
            </div>
            {lo&&<div className="text-sm">{lo}</div>}
            <ul className="text-xs text-purple-100/90 space-y-1 list-disc list-inside">
              <li>Format: <b>month/day/year</b> (e.g., <b>7/4/1776</b>)</li>
              <li>BC years: leading minus (e.g., <b>-1</b> = 1 BC). No year 0.</li>
              <li>Range: <b>−10000…10000</b></li>
            </ul>
          </div>
          <div className="rounded-2xl panel p-4 space-y-4">
            <div className="flex items-center justify-between text-[11px] uppercase tracking-wide text-purple-200/70">
              <span>History</span>
              {hasHist&&(<button type="button" onClick={clearHist} className="text-purple-200/70 font-medium">Clear history</button>)}
            </div>
            {hasHist?(<ul className="space-y-2">{entries.map(e=>(<li key={e.id}><button type="button" onClick={()=>selEntry(e)} className={`w-full text-left px-3 py-2 rounded-xl panel flex items-center justify-between gap-3 text-xs transition ${sid===e.id?"ring-2 ring-purple-400/70 !bg-purple-900/60":"hover:bg-purple-900/60"}`}><span className="block text-[13px] font-medium text-purple-100/90">{e.label}</span><span className="text-[12px] font-semibold text-purple-200/80">{e.weekday}</span></button></li>))}</ul>):(<p className="text-sm text-purple-200/70">No lookups yet.</p>)}
            <MethodBreakdownSection date={cdv} className="pt-4 border-t border-purple-500/40" buttonClassName="w-full px-4 py-2 rounded-xl btn-solid text-sm font-medium" contentClassName="mt-3 rounded-xl panel p-3" open={cov} onOpenChange={sco}/>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
